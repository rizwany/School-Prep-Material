  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4361EE;
      --accent-dark: #3451d1;
      --ink: #1a1f36;
      --muted: #5a6076;
      --bg: #f4f6fb;
      --card: #ffffff;
      --border: #e2e6f0;
      --radius: 18px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(circle, #E8EDF5 1.5px, transparent 1.5px);
      background-size: 20px 20px;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .error-card {
      max-width: 560px;
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .error-emoji { font-size: 3.2rem; margin-bottom: 14px; }
    .error-code {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: #eef1fd;
      display: inline-block;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }
    .error-card h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; line-height: 1.3; }
    .error-card p  { font-size: 0.95rem; color: var(--muted); font-weight: 600; line-height: 1.6; margin-bottom: 28px; }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 0.9rem;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      transition: background .15s, transform .1s, border-color .15s, color .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { background: #fff; color: var(--accent); border: 2px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn:active { transform: scale(0.97); }

    .quick-links {
      border-top: 2px solid var(--border);
      padding-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      justify-content: center;
    }
    .quick-links a {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
    }
    .quick-links a:hover { color: var(--accent); text-decoration: underline; }
  </style>
<style id="burger-menu-styles">
/* ── Burger Menu ── */
.burger-btn{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;transition:background .15s;flex-shrink:0}
.burger-btn:hover{background:#eef1fd}
.burger-btn span{display:block;width:22px;height:2px;background:#1a1f36;border-radius:2px;transition:transform .25s ease,opacity .25s ease;pointer-events:none}
.burger-btn.is-open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger-btn.is-open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger-btn.is-open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
</style>
