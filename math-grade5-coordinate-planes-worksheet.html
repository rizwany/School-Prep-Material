  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1f36; --muted: #5a6076; --accent: #4361EE; --accent-dark: #3451d1; --green: #06d6a0; --orange: #fb8500; --red: #ef233c; --bg: #f4f6fb; --card: #ffffff; --border: #e2e6f0; --radius: 14px; --mono: 'JetBrains Mono', monospace; }

    header { background: var(--card); border-bottom: 2px solid var(--border); padding: 0 24px; }

    nav a:hover { color: var(--accent); }

    .breadcrumb a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .breadcrumb span { margin: 0 6px; }
    .hero { max-width: 860px; margin: 0 auto; padding: 24px 24px 0; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .hero-icon { width: 64px; height: 64px; border-radius: 18px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.8rem; }
    .hero h1 { font-size: 1.7rem; font-weight: 900; line-height: 1.2; }
    .hero p { font-size: 0.95rem; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .controls { max-width: 860px; margin: 18px auto 0; padding: 0 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .diff-group { display: flex; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; }
    .diff-btn { padding: 8px 18px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.88rem; border: none; cursor: pointer; background: var(--card); color: var(--muted); transition: all .15s; }
    .diff-btn.active { background: var(--accent); color: #fff; }
    .btn { padding: 9px 18px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.88rem; border: 2px solid var(--border); cursor: pointer; background: var(--card); color: var(--ink); transition: all .15s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); }
    main { max-width: 860px; margin: 20px auto 60px; padding: 0 24px; display: flex; flex-direction: column; gap: 14px; }
    .score-banner { border-radius: var(--radius); padding: 18px 24px; display: none; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .score-banner.show { display: flex; }
    .score-banner.great { background: #e8faf4; border: 2px solid var(--green); }
    .score-banner.ok { background: #fff4e6; border: 2px solid var(--orange); }
    .score-banner.low { background: #fff0f0; border: 2px solid var(--red); }
    .score-text { font-size: 1.1rem; font-weight: 900; }
    .q-card { background: var(--card); border-radius: var(--radius); border: 2px solid var(--border); padding: 22px 24px; }
    .q-card.correct { border-color: var(--green); background: #f0fdf8; }
    .q-card.incorrect { border-color: var(--red); background: #fff5f5; }
    .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .q-num { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 900; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .q-text { font-size: 0.97rem; font-weight: 700; line-height: 1.5; }
    .q-input { width: 110px; padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--ink); outline: none; transition: border-color .15s; }
    .q-input:focus { border-color: var(--accent); }
    .radio-group { display: flex; gap: 10px; margin-top: 4px; }
    .radio-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 700; font-size: 0.9rem; padding: 8px 16px; border: 2px solid var(--border); border-radius: 8px; transition: all .15s; }
    .radio-label input { display: none; }
    .radio-label.selected { border-color: var(--accent); background: #eef1fd; color: var(--accent); }
    .select-input { padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--ink); outline: none; cursor: pointer; }
    .select-input:focus { border-color: var(--accent); }

    .feedback.show { display: block; }
    .feedback.correct { color: #05a07a; }
    .feedback.incorrect { color: var(--red); }
    .submit-row { display: flex; justify-content: center; margin-top: 10px; }
    .btn-submit { padding: 14px 40px; border-radius: 12px; background: var(--accent); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.05rem; border: none; cursor: pointer; transition: background .15s; }
    .btn-submit:hover { background: var(--accent-dark); }
    footer { text-align: center; padding: 24px; font-size: 0.8rem; color: var(--muted); font-weight: 600; }

  <div class="diff-group">
    <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">Easy</button>

<main>
  <div class="score-banner" id="score-banner">
    <span class="score-text" id="score-text"></span>
    <button class="btn btn-primary" onclick="newWorksheet()">Try Again</button>
  </div>
  <div id="questions"></div>
  <div class="submit-row"><button class="btn-submit" onclick="submitAll()">Check My Answers</button></div>
</main>
<footer>© 2025 LearnBright · Free printable &amp; interactive school worksheets</footer>
<script>
(function(){
  const STATS_KEY = 'ws_math_grade5_coordinate-planes_stats';
  let difficulty = 'easy';
  let questions = [];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rnd(0,arr.length-1)]; }

  function answersMatch(user,correct){
    if(user.trim().toLowerCase()===String(correct).toLowerCase()) return true;
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<0.001;
    return false;
  }

  function makeReadXQ(easy){
    const x=rnd(0,easy?6:10), y=rnd(0,easy?6:10);
    return { text:`A point is at (${x}, ${y}). What is its x-coordinate?`, answer:x, type:'number' };
  }

  function makeReadYQ(easy){
    const x=rnd(0,easy?6:10), y=rnd(0,easy?6:10);
    return { text:`A point is at (${x}, ${y}). What is its y-coordinate?`, answer:y, type:'number' };
  }

  function makeMoveRightQ(easy){
    const x=rnd(1,easy?5:9), y=rnd(0,easy?5:9);
    return { text:`To plot the point (${x}, ${y}), you start at the origin and move ${x} units to the right. How many units up do you then move?`, answer:y, type:'number' };
  }

  function makeTFCoordQ(easy){
    const x=rnd(0,easy?5:9), y=rnd(0,easy?5:9);
    const isRight=rnd(0,1)===1;
    const shownX=isRight?x:x+rnd(1,3);
    return { text:`True or False: The point ${shownX} units right and ${y} units up from the origin has coordinates (${shownX}, ${y}).`, answer:'True', type:'radio' };
  }

  function makeTFOrderQ(easy){
    const x=rnd(1,easy?5:8), y=rnd(1,easy?5:8);
    const isRight=rnd(0,1)===1;
    const described=isRight?`(${x}, ${y})`:`(${y}, ${x})`;
    const actual=`(${x}, ${y})`;
    return { text:`True or False: "Go ${x} right then ${y} up" gives the point ${described}.`, answer:isRight?'True':'False', type:'radio' };
  }

  function makeAxisQ(easy){
    const opts=['x-axis','y-axis'];
    const ans=pick(opts);
    const desc=ans==='x-axis'?'runs horizontally (left to right)':'runs vertically (up and down)';
    return { text:`Which axis ${desc}?`, answer:ans, type:'select', options:opts };
  }

  function makeOriginQ(easy){
    return { text:`What are the coordinates of the origin?`, answer:'(0, 0)', type:'number', freeText:true };
  }

  function makeDistanceQ(easy){
    const y=rnd(1,easy?6:10);
    return { text:`A point is at (0, ${y}). How far is it from the origin? (How many units away along the y-axis?)`, answer:y, type:'number' };
  }

  function makeSquareSideQ(easy){
    const x1=rnd(0,easy?3:5), y1=rnd(0,easy?3:5);
    const side=rnd(2,easy?5:8);
    const x2=x1+side;
    return { text:`A square has one corner at (${x1}, ${y1}) and the next corner at (${x2}, ${y1}). What is the side length of the square?`, answer:side, type:'number' };
  }

  function makeMCCoordQ(easy){
    const x=rnd(1,easy?5:9), y=rnd(1,easy?5:9);
    const correct=`(${x}, ${y})`;
    const w1=`(${y}, ${x})`, w2=`(${x}, ${y+1})`, w3=`(${x-1}, ${y})`;
    const opts=[w1,w2,w3].filter(v=>v!==correct).slice(0,3);
    opts.push(correct);
    opts.sort(()=>Math.random()-0.5);
    return { text:`Which ordered pair describes the point ${x} right and ${y} up from the origin?`, answer:correct, type:'select', options:opts };
  }

  const generators = [
    makeReadXQ, makeReadYQ, makeMoveRightQ, makeTFCoordQ, makeTFOrderQ,
    makeAxisQ, makeOriginQ, makeDistanceQ, makeSquareSideQ, makeMCCoordQ
  ];

  function generate(){
    const shuffled=[...generators].sort(()=>Math.random()-0.5);
    questions=shuffled.slice(0,10).map(fn=>{ try{ return fn(difficulty==='easy'); }catch(e){ return makeReadXQ(difficulty==='easy'); } });
  }

  function setDiff(d){ difficulty=d; document.getElementById('btn-easy').classList.toggle('active',d==='easy'); document.getElementById('btn-hard').classList.toggle('active',d==='hard'); newWorksheet(); }

  function render(){
    const container=document.getElementById('questions');
    container.innerHTML='';
    questions.forEach((q,i)=>{
      const card=document.createElement('div');
      card.className='q-card'; card.id='q-'+i;
      let inputHtml='';
      if(q.freeText){
        inputHtml=`<input class="q-input" type="text" id="ans-${i}" placeholder="(x, y)" autocomplete="off" style="width:140px"/>`;
      } else if(q.type==='number'){
        inputHtml=`<input class="q-input" type="number" id="ans-${i}" placeholder="?" autocomplete="off"/>`;
      } else if(q.type==='radio'){
        inputHtml=`<div class="radio-group"><label class="radio-label" id="rl-${i}-T"><input type="radio" name="q${i}" value="True" onchange="selectRadio(${i},'T')">True</label><label class="radio-label" id="rl-${i}-F"><input type="radio" name="q${i}" value="False" onchange="selectRadio(${i},'F')">False</label></div>`;
      } else {
        const opts=q.options.map(o=>`<option value="${o}">${o}</option>`).join('');
        inputHtml=`<select class="select-input" id="ans-${i}"><option value="">-- choose --</option>${opts}</select>`;
      }
      card.innerHTML=`<div class="q-header"><div class="q-num">${i+1}</div><div class="q-text">${q.text}</div></div>${inputHtml}<div class="feedback" id="fb-${i}"></div>`;
      container.appendChild(card);
    });
    document.getElementById('score-banner').classList.remove('show');
  }

  function selectRadio(i,val){ document.getElementById('rl-'+i+'-T').classList.toggle('selected',val==='T'); document.getElementById('rl-'+i+'-F').classList.toggle('selected',val==='F'); }
  function getUserAnswer(i,q){ if(q.type==='radio'){ const el=document.querySelector(`input[name="q${i}"]:checked`); return el?el.value:''; } return (document.getElementById('ans-'+i)||{value:''}).value; }

  function submitAll(){
    let correct=0;
    questions.forEach((q,i)=>{
      const user=getUserAnswer(i,q), card=document.getElementById('q-'+i), fb=document.getElementById('fb-'+i);
      if(!user){ fb.textContent='⚠ Please answer this question.'; fb.className='feedback show incorrect'; return; }
      if(answersMatch(user,q.answer)){ correct++; card.className='q-card correct'; fb.textContent='✓ Correct!'; fb.className='feedback show correct'; }
      else { card.className='q-card incorrect'; fb.textContent=`✗ Not quite. The answer is ${q.answer}.`; fb.className='feedback show incorrect'; }
    });
    const banner=document.getElementById('score-banner'), scoreText=document.getElementById('score-text');
    banner.classList.add('show');
    if(correct>=8){ banner.className='score-banner show great'; scoreText.textContent=`🎉 ${correct}/10 — Excellent work!`; }
    else if(correct>=5){ banner.className='score-banner show ok'; scoreText.textContent=`👍 ${correct}/10 — Good effort! Keep practising.`; }
    else { banner.className='score-banner show low'; scoreText.textContent=`💪 ${correct}/10 — Review the help page and try again!`; }
    saveStats(correct); banner.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function showAnswers(){ questions.forEach((q,i)=>{ const fb=document.getElementById('fb-'+i); fb.textContent=`Answer: ${q.answer}`; fb.className='feedback show incorrect'; }); }
  function shareResults(){ if(navigator.share){ navigator.share({title:'LearnBright',text:'I practised Coordinate Planes on LearnBright!',url:location.href}); } else { navigator.clipboard.writeText(location.href).then(()=>alert('Link copied!')); } }
  function saveStats(score){ try{ const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"attempts":0,"totalScore":0}'); s.attempts++; s.totalScore+=score; localStorage.setItem(STATS_KEY,JSON.stringify(s)); }catch(e){} }
  function newWorksheet(){ generate(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  window.setDiff=setDiff; window.newWorksheet=newWorksheet; window.showAnswers=showAnswers;
  window.shareResults=shareResults; window.submitAll=submitAll; window.selectRadio=selectRadio;
  generate(); render();
})();
</script>
</body>
