<script>
(function(){
  const STATS_KEY = 'ws_math_grade4_fractions-equivalent_stats';
  let difficulty = 'easy';
  let questions = [];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rnd(0,arr.length-1)]; }
  function gcd(a,b){ return b===0?a:gcd(b,a%b); }

  function answersMatch(user, correct){
    if(user.trim().toLowerCase()===String(correct).toLowerCase()) return true;
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<0.001;
    return false;
  }

  /* simple fractions pool for easy mode */
  const SIMPLE_FRACS = [
    {n:1,d:2},{n:1,d:3},{n:2,d:3},{n:1,d:4},{n:3,d:4},{n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5}
  ];

  function makeEquivMissingQ(easy){
    const f = easy ? pick(SIMPLE_FRACS) : pick(SIMPLE_FRACS);
    const mult = easy ? pick([2,3]) : pick([3,4,5,6]);
    const newN = f.n*mult, newD = f.d*mult;
    const hide = rnd(0,1)===0;
    if(hide){
      return { text:`${f.n}/${f.d} = ___/${newD}. What is the missing numerator?`, answer:newN, type:'number' };
    } else {
      return { text:`${f.n}/${f.d} = ${newN}/___. What is the missing denominator?`, answer:newD, type:'number' };
    }
  }

  function makeTFEquivQ(easy){
    const f = pick(SIMPLE_FRACS);
    const mult = pick([2,3,4]);
    const correct = {n:f.n*mult, d:f.d*mult};
    const isTrue = rnd(0,1)===1;
    const shown = isTrue ? correct : {n:f.n*mult+1, d:f.d*mult};
    return { text:`True or False: ${f.n}/${f.d} is equivalent to ${shown.n}/${shown.d}.`, answer:isTrue?'True':'False', type:'radio' };
  }

  function makeSimplifyQ(){
    const bases = [{n:1,d:2},{n:1,d:3},{n:2,d:3},{n:1,d:4},{n:3,d:4},{n:1,d:5},{n:2,d:5}];
    const f = pick(bases);
    const mult = pick([2,3,4,5]);
    const bigN = f.n*mult, bigD = f.d*mult;
    return { text:`Simplify ${bigN}/${bigD} to its simplest form. Write the numerator only. (Hint: the denominator will be ${f.d})`, answer:f.n, type:'number' };
  }

  function makeCompareQ(){
    const pairs = [
      {a:{n:1,d:2},b:{n:1,d:3},ans:'>'},{a:{n:2,d:3},b:{n:3,d:5},ans:'>'},{a:{n:1,d:4},b:{n:1,d:3},ans:'<'},
      {a:{n:3,d:4},b:{n:2,d:3},ans:'>'},{a:{n:1,d:2},b:{n:2,d:4},ans:'='},{a:{n:2,d:5},b:{n:3,d:10},ans:'>'},
      {a:{n:1,d:3},b:{n:2,d:6},ans:'='}
    ];
    const p = pick(pairs);
    const opts = ['>','<','='];
    return { text:`Compare: ${p.a.n}/${p.a.d} ___ ${p.b.n}/${p.b.d}. Choose >, <, or =`, answer:p.ans, type:'select', options:opts };
  }

  function makeMCEquivQ(){
    const f = pick(SIMPLE_FRACS);
    const mult = pick([2,3,4]);
    const correct = `${f.n*mult}/${f.d*mult}`;
    const wrong1 = `${f.n*mult+1}/${f.d*mult}`;
    const wrong2 = `${f.n}/${f.d+mult}`;
    const wrong3 = `${f.n+1}/${f.d*mult}`;
    const opts = [correct, wrong1, wrong2, wrong3].sort(()=>Math.random()-0.5);
    return { text:`Which fraction is equivalent to ${f.n}/${f.d}?`, answer:correct, type:'select', options:opts };
  }

  function makeWordFracQ(easy){
    const nums = easy ? [{n:1,d:2},{n:1,d:4},{n:3,d:4}] : [{n:2,d:3},{n:3,d:5},{n:4,d:5}];
    const f = pick(nums);
    const total = f.d * pick([2,3,4]);
    const eaten = f.n * (total/f.d);
    return { text:`A pizza has ${total} slices. ${eaten} slices were eaten. What fraction of the pizza was eaten? Write the numerator of the simplified fraction. (Denominator: ${f.d})`, answer:f.n, type:'number' };
  }

  function makeIsSimplestQ(){
    const fracs = [
      {n:1,d:2,simplest:true},{n:2,d:4,simplest:false},{n:3,d:4,simplest:true},{n:2,d:6,simplest:false},
      {n:1,d:3,simplest:true},{n:3,d:9,simplest:false},{n:2,d:3,simplest:true},{n:4,d:8,simplest:false}
    ];
    const f = pick(fracs);
    return { text:`True or False: ${f.n}/${f.d} is already in its simplest form.`, answer:f.simplest?'True':'False', type:'radio' };
  }

  function makeOrderQ(){
    const sets = [
      {fracs:['1/4','3/8','1/2'],sorted:'1/4, 3/8, 1/2'},
      {fracs:['2/3','1/2','3/4'],sorted:'1/2, 2/3, 3/4'},
      {fracs:['1/5','2/5','3/5'],sorted:'1/5, 2/5, 3/5'},
    ];
    const s = pick(sets);
    const shuffled = [...s.fracs].sort(()=>Math.random()-0.5);
    return { text:`Order these fractions from smallest to largest: ${shuffled.join(', ')}. Select the correct order.`, answer:s.sorted, type:'select', options:[s.sorted, s.fracs.sort(()=>Math.random()-0.5).join(', '), [...s.fracs].reverse().join(', ')].filter((v,i,a)=>a.indexOf(v)===i).slice(0,3) };
  }

  function makeMultipleOfQ(){
    const f = pick(SIMPLE_FRACS);
    const howMany = rnd(2,5);
    const ans = f.n*howMany;
    const outOf = f.d;
    return { text:`What is ${howMany} copies of ${f.n}/${outOf}? (Multiply numerator by ${howMany}, keep denominator.) Write the numerator.`, answer:ans, type:'number' };
  }

  const generators = [
    makeEquivMissingQ, makeTFEquivQ, makeSimplifyQ, makeCompareQ, makeMCEquivQ,
    makeWordFracQ, makeIsSimplestQ, makeOrderQ, makeMultipleOfQ, makeEquivMissingQ
  ];

  function generate(){
    const shuffled = [...generators].sort(()=>Math.random()-0.5);
    questions = shuffled.slice(0,10).map(fn=>{
      try { return fn(difficulty==='easy'); } catch(e){ return makeEquivMissingQ(difficulty==='easy'); }
    });
  }

  function setDiff(d){
    difficulty = d;
    document.getElementById('btn-easy').classList.toggle('active', d==='easy');
    document.getElementById('btn-hard').classList.toggle('active', d==='hard');
    newWorksheet();
  }

  function render(){
    const container = document.getElementById('questions');
    container.innerHTML = '';
    questions.forEach((q,i)=>{
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'q-'+i;
      let inputHtml = '';
      if(q.type==='number'){
        inputHtml = `<input class="q-input" type="number" id="ans-${i}" placeholder="?" autocomplete="off" />`;
      } else if(q.type==='radio'){
        inputHtml = `<div class="radio-group">
          <label class="radio-label" id="rl-${i}-T"><input type="radio" name="q${i}" value="True" onchange="selectRadio(${i},'T')">True</label>
          <label class="radio-label" id="rl-${i}-F"><input type="radio" name="q${i}" value="False" onchange="selectRadio(${i},'F')">False</label>
        </div>`;
      } else {
        const opts = q.options.map(o=>`<option value="${o}">${o}</option>`).join('');
        inputHtml = `<select class="select-input" id="ans-${i}"><option value="">-- choose --</option>${opts}</select>`;
      }
      card.innerHTML = `
        <div class="q-header">
          <div class="q-num">${i+1}</div>
          <div class="q-text">${q.text}</div>
        </div>
        ${inputHtml}
        <div class="feedback" id="fb-${i}"></div>`;
      container.appendChild(card);
    });
    document.getElementById('score-banner').classList.remove('show');
  }

  function selectRadio(i, val){
    document.getElementById('rl-'+i+'-T').classList.toggle('selected', val==='T');
    document.getElementById('rl-'+i+'-F').classList.toggle('selected', val==='F');
  }

  function getUserAnswer(i, q){
    if(q.type==='radio'){
      const el = document.querySelector(`input[name="q${i}"]:checked`);
      return el ? el.value : '';
    }
    return (document.getElementById('ans-'+i)||{value:''}).value;
  }

  function submitAll(){
    let correct = 0;
    questions.forEach((q,i)=>{
      const user = getUserAnswer(i,q);
      const card = document.getElementById('q-'+i);
      const fb = document.getElementById('fb-'+i);
      if(!user){ fb.textContent='⚠ Please answer this question.'; fb.className='feedback show incorrect'; return; }
      if(answersMatch(user, q.answer)){
        correct++;
        card.className='q-card correct';
        fb.textContent='✓ Correct!';
        fb.className='feedback show correct';
      } else {
        card.className='q-card incorrect';
        fb.textContent=`✗ Not quite. The answer is ${q.answer}.`;
        fb.className='feedback show incorrect';
      }
    });
    const banner = document.getElementById('score-banner');
    const scoreText = document.getElementById('score-text');
    banner.classList.add('show');
    if(correct>=8){ banner.className='score-banner show great'; scoreText.textContent=`🎉 ${correct}/10 — Excellent work!`; }
    else if(correct>=5){ banner.className='score-banner show ok'; scoreText.textContent=`👍 ${correct}/10 — Good effort! Keep practising.`; }
    else { banner.className='score-banner show low'; scoreText.textContent=`💪 ${correct}/10 — Review the help page and try again!`; }
    saveStats(correct);
    banner.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function showAnswers(){
    questions.forEach((q,i)=>{
      const fb = document.getElementById('fb-'+i);
      fb.textContent=`Answer: ${q.answer}`;
      fb.className='feedback show incorrect';
    });
  }

  function shareResults(){
    const text = `I just practised Equivalent Fractions on LearnBright! Check it out.`;
    if(navigator.share){ navigator.share({title:'LearnBright',text,url:location.href}); }
    else { navigator.clipboard.writeText(location.href).then(()=>alert('Link copied!')); }
  }

  function saveStats(score){
    try{
      const s = JSON.parse(localStorage.getItem(STATS_KEY)||'{"attempts":0,"totalScore":0}');
      s.attempts++; s.totalScore+=score;
      localStorage.setItem(STATS_KEY, JSON.stringify(s));
    }catch(e){}
  }

  function newWorksheet(){ generate(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  window.setDiff = setDiff;
  window.newWorksheet = newWorksheet;
  window.showAnswers = showAnswers;
  window.shareResults = shareResults;
  window.submitAll = submitAll;
  window.selectRadio = selectRadio;

  generate(); render();
})();
</script>
