<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Nastaliq Urdu',serif;background:#f0f4ff;color:#1a1a2e;direction:rtl;line-height:2.2}.top-bar{background:#1a1a2e;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-direction:row-reverse}.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.85rem;flex-direction:row-reverse}.breadcrumb a{color:#a0aec0;text-decoration:none}.breadcrumb span{color:#a0aec0}.lang-btn{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:.85rem;font-family:Arial,sans-serif}.hero{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:30px 20px;text-align:center}.hero h1{font-size:1.8rem;margin-bottom:6px}.hero p{color:#a0aec0;font-size:.95rem}.container{max-width:760px;margin:0 auto;padding:20px}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}.modal{background:#fff;border-radius:16px;padding:32px;width:90%;max-width:420px;text-align:center}.modal h2{font-size:1.4rem;margin-bottom:12px}.modal input{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:1rem;margin:12px 0;text-align:right;font-family:'Noto Nastaliq Urdu',serif;direction:rtl}.modal button{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:12px 32px;font-size:1rem;cursor:pointer;font-family:'Noto Nastaliq Urdu',serif}.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}.stat-card{background:#fff;border-radius:10px;padding:12px 16px;flex:1;min-width:100px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}.stat-card .val{font-size:1.5rem;font-weight:700;color:#3b82f6}.stat-card .lbl{font-size:.8rem;color:#64748b}.diff-row{display:flex;gap:10px;margin-bottom:16px;justify-content:flex-end}.pill{padding:6px 18px;border-radius:20px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.9rem;font-family:'Noto Nastaliq Urdu',serif}.pill.active{background:#3b82f6;color:#fff;border-color:#3b82f6}.progress-wrap{background:#e2e8f0;border-radius:8px;height:8px;margin-bottom:20px}.progress-bar{background:linear-gradient(90deg,#3b82f6,#8b5cf6);height:8px;border-radius:8px;transition:width .4s}.q-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px}.q-num{font-size:.85rem;color:#64748b;margin-bottom:8px;text-align:right}.q-text{font-size:1.1rem;margin-bottom:18px;text-align:right;font-weight:600}.opts{display:flex;flex-direction:column;gap:10px}.opt-btn{padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:1rem;text-align:right;font-family:'Noto Nastaliq Urdu',serif;transition:all .2s}.opt-btn:hover{border-color:#3b82f6;background:#eff6ff}.opt-btn.correct{background:#dcfce7;border-color:#16a34a;color:#15803d}.opt-btn.wrong{background:#fee2e2;border-color:#dc2626;color:#dc2626}.tf-row{display:flex;gap:12px;justify-content:flex-end}.tf-btn{padding:12px 32px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:1.1rem;font-family:'Noto Nastaliq Urdu',serif;transition:all .2s}.tf-btn:hover{border-color:#3b82f6}.tf-btn.correct{background:#dcfce7;border-color:#16a34a}.tf-btn.wrong{background:#fee2e2;border-color:#dc2626}.fill-row{display:flex;gap:10px;align-items:center;flex-direction:row-reverse}.fill-inp{flex:1;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:1.1rem;text-align:right;font-family:'Noto Nastaliq Urdu',serif;direction:rtl}.fill-inp.correct{border-color:#16a34a;background:#dcfce7}.fill-inp.wrong{border-color:#dc2626;background:#fee2e2}.fill-btn{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px 20px;cursor:pointer;font-size:1rem;font-family:'Noto Nastaliq Urdu',serif}.feedback{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:.95rem;text-align:right;display:none}.feedback.show{display:block}.feedback.ok{background:#dcfce7;color:#15803d}.feedback.bad{background:#fee2e2;color:#dc2626}.nav-row{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}.nav-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-family:'Noto Nastaliq Urdu',serif}.nav-btn.prev{background:#e2e8f0;color:#1a1a2e}.nav-btn.next{background:#3b82f6;color:#fff}.score-card{background:#fff;border-radius:14px;padding:32px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);display:none}.score-card h2{font-size:1.6rem;margin-bottom:8px}.score-card .big{font-size:3rem;font-weight:700;color:#3b82f6;margin:12px 0}.score-card p{color:#64748b;margin-bottom:20px}.score-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.score-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:1rem;font-family:'Noto Nastaliq Urdu',serif}.score-btn.primary{background:#3b82f6;color:#fff}.score-btn.secondary{background:#e2e8f0;color:#1a1a2e}.cv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;overflow-y:auto;padding:20px}.cv-box{background:#fff;border-radius:14px;max-width:700px;margin:0 auto;padding:24px}.cv-box h2{text-align:right;margin-bottom:16px}.cv-item{padding:14px;border-radius:8px;margin-bottom:10px;text-align:right}.cv-item.cv-ok{background:#dcfce7}.cv-item.cv-bad{background:#fee2e2}.cv-close{display:block;margin:16px auto 0;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 28px;cursor:pointer;font-family:'Noto Nastaliq Urdu',serif;font-size:1rem}@media print{.top-bar,.stats-bar,.diff-row,.nav-row,.score-btns{display:none}}</style>

<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PD85WRBD" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div class="top-bar">
  <div class="breadcrumb"><a href="index.html">ہوم</a><span>›</span><span>جماعت ۸</span><span>›</span><span>قوانین قوت</span></div>
  <button class="lang-btn" onclick="location.href='math-grade8-exponents-laws-worksheet.html'">English</button>
</div>
<div class="hero"><h1>قوانین قوت – ورک شیٹ</h1><p>جماعت ۸</p></div>
<div class="container">
  <div id="nameModal" class="modal-overlay">
    <div class="modal"><h2>اپنا نام لکھیں</h2><input id="nameInp" type="text" placeholder="نام یہاں لکھیں"><button onclick="startWS()">شروع کریں</button></div>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="val" id="stTotal">0</div><div class="lbl">کُل</div></div>
    <div class="stat-card"><div class="val" id="stCorrect">0</div><div class="lbl">درست</div></div>
    <div class="stat-card"><div class="val" id="stPct">0%</div><div class="lbl">اسکور</div></div>
    <div class="stat-card"><div class="val" id="stStreak">0</div><div class="lbl">سلسلہ</div></div>
  </div>
  <div class="diff-row">
    <button class="pill active" id="pillE" onclick="setDiff('easy')">آسان</button>
    <button class="pill" id="pillH" onclick="setDiff('hard')">مشکل</button>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progBar" style="width:0%"></div></div>
  <div id="qArea"></div>
  <div class="score-card" id="scoreCard">
    <h2>ورک شیٹ مکمل!</h2><div class="big" id="scBig"></div><p id="scMsg"></p>
    <div class="score-btns">
      <button class="score-btn primary" onclick="restart()">دوبارہ کریں</button>
      <button class="score-btn secondary" onclick="showCV()">جائزہ لیں</button>
    </div>
  </div>
  <div class="cv-overlay" id="cvOverlay">
    <div class="cv-box"><h2>سوالات کا جائزہ</h2><div id="cvList"></div>
    <button class="cv-close" onclick="document.getElementById('cvOverlay').style.display='none'">بند کریں</button></div>
  </div>
</div>
<script>
const STATS_KEY='ws_math_grade8_exponents-laws_stats';
let diff='easy',qs=[],idx=0,score=0,answered=[],userName='';
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function pow(b,e){return Math.pow(b,e);}

function makeZeroExpE(){const b=r(2,9);return{type:'fill',q:`${b}⁰ = ؟`,ans:'1'};}
function makeMulLawE(){const b=r(2,4);const m=r(1,3);const n=r(1,3);return{type:'fill',q:`${b}^${m} × ${b}^${n} = ${b}^؟ (قوت بتائیں)`,ans:String(m+n)};}
function makeDivLawE(){const b=r(2,4);const m=r(3,6);const n=r(1,m-1);return{type:'fill',q:`${b}^${m} ÷ ${b}^${n} = ${b}^؟ (قوت بتائیں)`,ans:String(m-n)};}
function makeMulTFE(){const b=r(2,4);const m=r(2,4);const n=r(2,4);return{type:'tf',q:`${b}^${m} × ${b}^${n} = ${b}^${m*n}`,ans:false};}
function makeEvalE(){const b=r(2,3);const e=r(2,4);return{type:'fill',q:`${b}^${e} = ؟`,ans:String(pow(b,e))};}

function makePowLawH(){const b=r(2,3);const m=r(2,3);const n=r(2,3);return{type:'fill',q:`(${b}^${m})^${n} = ${b}^؟ (قوت بتائیں)`,ans:String(m*n)};}
function makeNegExpH(){const b=r(2,4);const e=r(1,3);const val=pow(b,e);return{type:'mc',q:`${b}^−${e} = ؟`,opts:shuffleArr(['1/'+val,'−'+val,'1/'+b,String(val)]),ans:'1/'+val};}
function makeSciNotH(){const pairs=[['3200000','3.2 × 10⁶'],['45000','4.5 × 10⁴'],['0.00067','6.7 × 10⁻⁴'],['120000','1.2 × 10⁵']];const p=pairs[r(0,pairs.length-1)];return{type:'mc',q:`${p[0]} کو سائنسی اظہاریہ میں لکھیں`,opts:shuffleArr([p[1],'3.2 × 10⁵','3.2 × 10⁷','32 × 10⁵']),ans:p[1]};}
function makeMulDivH(){const b=r(2,3);const m=r(3,5);const n=r(1,m-1);return{type:'fill',q:`${b}^${m} × ${b}^${n} ÷ ${b}^${n} = ${b}^؟`,ans:String(m)};}
function makeNegExpTFH(){const b=r(2,4);const e=r(1,2);const val=pow(b,e);return{type:'tf',q:`${b}^−${e} = −${val}`,ans:false};}

function buildQuestions(){
  const easyFns=[makeZeroExpE,makeMulLawE,makeDivLawE,makeMulTFE,makeEvalE];
  const hardFns=[makePowLawH,makeNegExpH,makeSciNotH,makeMulDivH,makeNegExpTFH];
  const fns=diff==='easy'?easyFns:hardFns;
  const out=[];for(let i=0;i<10;i++)out.push(fns[i%fns.length]());
  return shuffleArr(out);
}
function loadStats(){const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"total":0,"correct":0,"streak":0}');document.getElementById('stTotal').textContent=s.total;document.getElementById('stCorrect').textContent=s.correct;document.getElementById('stPct').textContent=s.total?Math.round(s.correct/s.total*100)+'%':'0%';document.getElementById('stStreak').textContent=s.streak;}
function saveStats(cor){const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"total":0,"correct":0,"streak":0}');s.total++;if(cor){s.correct++;s.streak++;}else s.streak=0;localStorage.setItem(STATS_KEY,JSON.stringify(s));loadStats();}
function startWS(){const v=document.getElementById('nameInp').value.trim();if(!v)return;userName=v;document.getElementById('nameModal').style.display='none';qs=buildQuestions();idx=0;score=0;answered=[];document.getElementById('scoreCard').style.display='none';renderQ();}
function setDiff(d){diff=d;document.getElementById('pillE').classList.toggle('active',d==='easy');document.getElementById('pillH').classList.toggle('active',d==='hard');qs=buildQuestions();idx=0;score=0;answered=[];document.getElementById('scoreCard').style.display='none';renderQ();}
function renderQ(){const q=qs[idx];document.getElementById('progBar').style.width=((idx/qs.length)*100)+'%';let html=`<div class="q-card"><div class="q-num">سوال ${idx+1} / ${qs.length}</div><div class="q-text">${q.q}</div>`;if(q.type==='mc'){html+='<div class="opts">';q.opts.forEach((o,i)=>html+=`<button class="opt-btn" id="opt${i}" onclick="pickMC(${i},'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}')">${o}</button>`);html+='</div>';}else if(q.type==='tf'){html+=`<div class="tf-row"><button class="tf-btn" id="tfT" onclick="pickTF(true,${q.ans})">درست</button><button class="tf-btn" id="tfF" onclick="pickTF(false,${q.ans})">غلط</button></div>`;}else{html+=`<div class="fill-row"><button class="fill-btn" onclick="submitFill()">چیک کریں</button><input class="fill-inp" id="fillInp" type="text" placeholder="جواب لکھیں" onkeydown="if(event.key==='Enter')submitFill()"></div>`;}html+=`<div class="feedback" id="fb"></div><div class="nav-row">`;if(idx>0)html+=`<button class="nav-btn prev" onclick="prevQ()">← پچھلا</button>`;html+=`<button class="nav-btn next" id="nextBtn" onclick="nextQ()" style="display:none">اگلا ←</button></div></div>`;document.getElementById('qArea').innerHTML=html;restoreAnswer();}
function showFeedback(cor,msg){const fb=document.getElementById('fb');fb.className='feedback show '+(cor?'ok':'bad');fb.textContent=(cor?'✓ شاباش! ':'✗ ')+msg;document.getElementById('nextBtn').style.display='inline-block';}
function pickMC(i,val,ans){if(answered[idx]!==undefined)return;const cor=val===ans;answered[idx]={cor,val,ans};saveStats(cor);if(cor)score++;document.querySelectorAll('.opt-btn').forEach((b,j)=>{if(b.id==='opt'+i)b.classList.add(cor?'correct':'wrong');if(qs[idx].opts[j]===ans)b.classList.add('correct');b.disabled=true;});showFeedback(cor,cor?'بالکل درست!':'درست جواب: '+ans);}
function pickTF(val,ans){if(answered[idx]!==undefined)return;const cor=val===ans;answered[idx]={cor,val,ans};saveStats(cor);if(cor)score++;document.getElementById('tfT').classList.add(ans?'correct':'wrong');document.getElementById('tfF').classList.add(!ans?'correct':'wrong');document.getElementById('tfT').disabled=true;document.getElementById('tfF').disabled=true;showFeedback(cor,cor?'بالکل درست!':'درست جواب: '+(ans?'درست':'غلط'));}
function submitFill(){if(answered[idx]!==undefined)return;const inp=document.getElementById('fillInp');const val=inp.value.trim();const ans=qs[idx].ans;const cor=val===ans;answered[idx]={cor,val,ans};saveStats(cor);if(cor)score++;inp.classList.add(cor?'correct':'wrong');inp.disabled=true;showFeedback(cor,cor?'بالکل درست!':'درست جواب: '+ans);}
function restoreAnswer(){const a=answered[idx];if(!a)return;const q=qs[idx];if(q.type==='mc'){document.querySelectorAll('.opt-btn').forEach((b,j)=>{if(q.opts[j]===a.ans)b.classList.add('correct');if(q.opts[j]===a.val&&!a.cor)b.classList.add('wrong');b.disabled=true;});}else if(q.type==='tf'){document.getElementById('tfT').classList.add(a.ans?'correct':'wrong');document.getElementById('tfF').classList.add(!a.ans?'correct':'wrong');document.getElementById('tfT').disabled=true;document.getElementById('tfF').disabled=true;}else{const inp=document.getElementById('fillInp');inp.value=a.val;inp.classList.add(a.cor?'correct':'wrong');inp.disabled=true;}showFeedback(a.cor,a.cor?'بالکل درست!':'درست جواب: '+a.ans);document.getElementById('nextBtn').style.display='inline-block';}
function nextQ(){if(idx<qs.length-1){idx++;renderQ();}else showScore();}
function prevQ(){if(idx>0){idx--;renderQ();}}
function showScore(){document.getElementById('qArea').innerHTML='';const pct=Math.round(score/qs.length*100);const sc=document.getElementById('scoreCard');sc.style.display='block';document.getElementById('scBig').textContent=score+'/'+qs.length;document.getElementById('scMsg').textContent=pct>=80?'شاباش '+userName+'! بہترین!':pct>=50?'اچھا کام '+userName+'!':userName+'، مدد کا صفحہ دیکھیں۔';document.getElementById('progBar').style.width='100%';}
function restart(){qs=buildQuestions();idx=0;score=0;answered=[];document.getElementById('scoreCard').style.display='none';renderQ();}
function showCV(){const list=document.getElementById('cvList');list.innerHTML='';qs.forEach((q,i)=>{const a=answered[i];if(!a)return;const d=document.createElement('div');d.className='cv-item '+(a.cor?'cv-ok':'cv-bad');d.innerHTML=`<strong>س ${i+1}:</strong> ${q.q}<br><strong>آپ کا جواب:</strong> ${a.val} ${a.cor?'✓':'✗'}`+(a.cor?'':'<br><strong>درست:</strong> '+a.ans);list.appendChild(d);});document.getElementById('cvOverlay').style.display='block';}
loadStats();
</script>
</body>
</html>
