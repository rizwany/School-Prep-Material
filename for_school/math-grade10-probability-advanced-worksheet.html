<script>
(function(){
  const STATS_KEY = 'ws_math_grade10_probability-advanced_stats';
  const TOL = 0.005;
  let difficulty = 'easy';
  let questions = [];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rnd(0,arr.length-1)]; }
  function r3(x){ return Math.round(x*1000)/1000; }

  function answersMatch(user,correct){
    if(user.trim().toLowerCase()===String(correct).toLowerCase()) return true;
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<TOL;
    return false;
  }

  // 1. Die probability
  function makeDieQ(easy){
    const easyEvents = [
      {desc:'an even number (2, 4, or 6)', ans:0.5},
      {desc:'an odd number (1, 3, or 5)', ans:0.5},
      {desc:'a prime number (2, 3, or 5)', ans:0.5},
      {desc:'a number greater than 3', ans:0.5},
      {desc:'the number 1', ans:r3(1/6)},
    ];
    const hardEvents = [
      {desc:'a multiple of 3 (3 or 6)', ans:r3(2/6)},
      {desc:'a factor of 6 (1, 2, 3, or 6)', ans:r3(4/6)},
      {desc:'a number less than 3 (1 or 2)', ans:r3(2/6)},
      {desc:'not getting a 6', ans:r3(5/6)},
    ];
    const e = pick(easy ? easyEvents : hardEvents);
    return { text:`A fair six-sided die is rolled once. Find the probability of getting ${e.desc}. (Give your answer as a decimal, rounded to 3 decimal places if needed.)`, answer:e.ans, type:'number' };
  }

  // 2. Card probability (standard 52-card deck)
  function makeCardQ(easy){
    const easyEvents = [
      {desc:'a red card', ans:0.5},
      {desc:'a black card', ans:0.5},
      {desc:'a heart', ans:0.25},
      {desc:'a spade', ans:0.25},
    ];
    const hardEvents = [
      {desc:'a king', ans:r3(4/52)},
      {desc:'a face card (Jack, Queen, or King)', ans:r3(12/52)},
      {desc:'an ace', ans:r3(4/52)},
      {desc:'a heart or a diamond', ans:0.5},
    ];
    const e = pick(easy ? easyEvents : hardEvents);
    return { text:`A card is drawn at random from a standard 52-card deck. Find P(${e.desc}).`, answer:e.ans, type:'number' };
  }

  // 3. Complement rule: P(E') = 1 − P(E)
  function makeComplementQ(easy){
    const sets = easy ? [
      {pa:0.3, comp:0.7}, {pa:0.4, comp:0.6}, {pa:0.25, comp:0.75},
      {pa:0.6, comp:0.4}, {pa:0.7, comp:0.3},
    ] : [
      {pa:0.35, comp:0.65}, {pa:0.65, comp:0.35},
      {pa:r3(1/3), comp:r3(2/3)}, {pa:r3(2/3), comp:r3(1/3)},
    ];
    const s = pick(sets);
    return { text:`If P(A) = ${s.pa}, find P(A′) using the complement rule P(E′) = 1 − P(E).`, answer:s.comp, type:'number' };
  }

  // 4. Mutually exclusive events: P(A ∪ B) = P(A) + P(B)
  function makeMutuallyExclusiveQ(easy){
    const sets = easy ? [
      {pa:0.3, pb:0.4, ans:0.7},
      {pa:0.25, pb:0.35, ans:0.6},
      {pa:0.2, pb:0.5, ans:0.7},
      {pa:0.15, pb:0.45, ans:0.6},
    ] : [
      {pa:0.35, pb:0.25, ans:0.6},
      {pa:0.45, pb:0.3,  ans:0.75},
      {pa:0.15, pb:0.6,  ans:0.75},
      {pa:0.28, pb:0.42, ans:0.7},
    ];
    const s = pick(sets);
    return { text:`Events A and B are mutually exclusive. P(A) = ${s.pa} and P(B) = ${s.pb}. Find P(A or B).`, answer:s.ans, type:'number' };
  }

  // 5. General addition rule: P(A ∪ B) = P(A) + P(B) − P(A ∩ B)
  function makeGeneralAdditionQ(easy){
    const sets = easy ? [
      {pa:0.4, pb:0.5, pab:0.2, ans:0.7},
      {pa:0.6, pb:0.4, pab:0.3, ans:0.7},
      {pa:0.5, pb:0.3, pab:0.1, ans:0.7},
    ] : [
      {pa:0.55, pb:0.45, pab:0.25, ans:0.75},
      {pa:0.6,  pb:0.5,  pab:0.35, ans:0.75},
      {pa:0.7,  pb:0.4,  pab:0.2,  ans:0.9},
    ];
    const s = pick(sets);
    return { text:`P(A) = ${s.pa}, P(B) = ${s.pb}, and P(A ∩ B) = ${s.pab}. Find P(A ∪ B) using the general addition rule.`, answer:s.ans, type:'number' };
  }

  // 6. Independent events: P(A ∩ B) = P(A) × P(B)
  function makeIndependentQ(easy){
    const sets = easy ? [
      {pa:0.4, pb:0.5, ans:0.2},
      {pa:0.5, pb:0.6, ans:0.3},
      {pa:0.3, pb:0.5, ans:0.15},
      {pa:0.4, pb:0.25, ans:0.1},
    ] : [
      {pa:0.4, pb:0.3,  ans:0.12},
      {pa:0.6, pb:0.5,  ans:0.3},
      {pa:0.35, pb:0.4, ans:0.14},
      {pa:0.45, pb:0.4, ans:0.18},
    ];
    const s = pick(sets);
    return { text:`Events A and B are independent. P(A) = ${s.pa} and P(B) = ${s.pb}. Find P(A and B).`, answer:s.ans, type:'number' };
  }

  // 7. Ball bag probability
  function makeBagQ(easy){
    const sets = easy ? [
      {r:2, b:3, g:5, ask:'red',   ans:0.2},
      {r:4, b:6, g:0, ask:'red',   ans:0.4},
      {r:3, b:5, g:2, ask:'blue',  ans:0.5},
      {r:5, b:3, g:2, ask:'green', ans:0.2},
      {r:6, b:4, g:0, ask:'blue',  ans:0.4},
    ] : [
      {r:4, b:5, g:3, ask:'red',   ans:r3(4/12)},
      {r:3, b:7, g:5, ask:'blue',  ans:r3(7/15)},
      {r:6, b:4, g:5, ask:'green', ans:r3(5/15)},
      {r:5, b:4, g:3, ask:'red',   ans:r3(5/12)},
    ];
    const s = pick(sets);
    const total = s.r + s.b + s.g;
    const desc = s.g > 0 ? `${s.r} red, ${s.b} blue, and ${s.g} green balls` : `${s.r} red and ${s.b} blue balls`;
    return { text:`A bag contains ${desc}. One ball is picked at random. Find P(${s.ask}).`, answer:s.ans, type:'number' };
  }

  // 8. True / False on probability rules
  function makeTFProbQ(easy){
    const easyItems = [
      {stmt:'P(certain event) = 1.', ans:'True'},
      {stmt:'P(impossible event) = 0.', ans:'True'},
      {stmt:'For any event E, P(E) + P(E′) = 1.', ans:'True'},
      {stmt:'Probability of any event is always between 0 and 1 inclusive.', ans:'True'},
    ];
    const hardItems = [
      {stmt:'For mutually exclusive events A and B, P(A ∩ B) = 0.', ans:'True'},
      {stmt:'P(A ∪ B) = P(A) + P(B) is true for all events A and B.', ans:'False'},
      {stmt:'Independent events and mutually exclusive events are always the same.', ans:'False'},
      {stmt:'For independent events A and B, P(A ∩ B) = P(A) × P(B).', ans:'True'},
    ];
    const item = pick(easy ? easyItems : hardItems);
    return { text:`True or False: ${item.stmt}`, answer:item.ans, type:'radio' };
  }

  // 9. Multiple-choice on probability formulas
  function makeMCProbQ(easy){
    const easyQs = [
      { text:'The complement of event A is written as A′. P(A′) equals:',
        options:['1 − P(A)', 'P(A) + 1', 'P(A) × 2', 'P(A) − 1'],
        answer:'1 − P(A)' },
      { text:'For any event E, P(E) + P(E′) always equals:',
        options:['1', '0', '0.5', '2'],
        answer:'1' },
      { text:'For mutually exclusive events A and B, P(A or B) equals:',
        options:['P(A) + P(B)', 'P(A) × P(B)', 'P(A) + P(B) − P(A∩B)', '1 − P(A)'],
        answer:'P(A) + P(B)' },
    ];
    const hardQs = [
      { text:'For two independent events A and B, P(A ∩ B) equals:',
        options:['P(A) × P(B)', 'P(A) + P(B)', 'P(A) + P(B) − P(A∩B)', '1 − P(A)·P(B)'],
        answer:'P(A) × P(B)' },
      { text:'The general addition rule states P(A ∪ B) equals:',
        options:['P(A) + P(B) − P(A∩B)', 'P(A) + P(B)', 'P(A) × P(B)', '1 − P(A∩B)'],
        answer:'P(A) + P(B) − P(A∩B)' },
      { text:'Classical probability is defined as:',
        options:['Favourable outcomes / Total equally likely outcomes', 'Total outcomes / Favourable outcomes', 'Favourable outcomes × Total outcomes', '1 − Favourable outcomes'],
        answer:'Favourable outcomes / Total equally likely outcomes' },
    ];
    const q = pick(easy ? easyQs : hardQs);
    return { text:q.text, options:q.options, answer:q.answer, type:'select' };
  }

  // 10. Word problem
  function makeWordProbQ(easy){
    const sets = easy ? [
      { text:'A box contains 3 defective and 7 non-defective light bulbs. One bulb is chosen at random. Find P(defective).', ans:0.3 },
      { text:'A class has 12 boys and 18 girls. One student is chosen at random. Find P(boy).', ans:0.4 },
      { text:'In a survey, 40 out of 100 people preferred brand X. Find P(person prefers brand X).', ans:0.4 },
      { text:'A spinner has 5 equal sections numbered 1 to 5. Find P(landing on an even number).', ans:0.4 },
    ] : [
      { text:'Two fair coins are tossed together. Using P(A∩B) = P(A)×P(B) for independent events, find P(both heads).', ans:0.25 },
      { text:'A bag has 5 red and 10 blue pens. 2 red pens are removed. Find P(red) on the next draw from the remaining 13 pens.', ans:r3(3/13) },
      { text:'A box has 6 red and 4 blue balls. P(A) = P(red) and P(B) = P(blue). Find P(A ∪ B) if A and B are mutually exclusive.', ans:1 },
    ];
    const s = pick(sets);
    return { text:s.text, answer:s.ans, type:'number' };
  }

  const generators = [
    makeDieQ, makeCardQ, makeComplementQ, makeMutuallyExclusiveQ,
    makeGeneralAdditionQ, makeIndependentQ, makeBagQ,
    makeTFProbQ, makeMCProbQ, makeWordProbQ
  ];

  function generate(){
    const shuffled=[...generators].sort(()=>Math.random()-0.5);
    questions=shuffled.slice(0,10).map(fn=>{ try{ return fn(difficulty==='easy'); }catch(e){ return makeComplementQ(difficulty==='easy'); } });
  }

  function setDiff(d){ difficulty=d; document.getElementById('btn-easy').classList.toggle('active',d==='easy'); document.getElementById('btn-hard').classList.toggle('active',d==='hard'); newWorksheet(); }

  function render(){
    const container=document.getElementById('questions');
    container.innerHTML='';
    questions.forEach((q,i)=>{
      const card=document.createElement('div');
      card.className='q-card'; card.id='q-'+i;
      let inputHtml='';
      if(q.type==='number'){
        inputHtml=`<input class="q-input" type="number" step="any" id="ans-${i}" placeholder="?" autocomplete="off"/>`;
      } else if(q.type==='radio'){
        inputHtml=`<div class="radio-group"><label class="radio-label" id="rl-${i}-T"><input type="radio" name="q${i}" value="True" onchange="selectRadio(${i},'T')">True</label><label class="radio-label" id="rl-${i}-F"><input type="radio" name="q${i}" value="False" onchange="selectRadio(${i},'F')">False</label></div>`;
      } else {
        const opts=q.options.map(o=>`<option value="${o}">${o}</option>`).join('');
        inputHtml=`<select class="select-input" id="ans-${i}"><option value="">-- choose --</option>${opts}</select>`;
      }
      card.innerHTML=`<div class="q-header"><div class="q-num">${i+1}</div><div class="q-text">${q.text}</div></div>${inputHtml}<div class="feedback" id="fb-${i}"></div>`;
      container.appendChild(card);
    });
    document.getElementById('score-banner').classList.remove('show');
  }

  function selectRadio(i,val){ document.getElementById('rl-'+i+'-T').classList.toggle('selected',val==='T'); document.getElementById('rl-'+i+'-F').classList.toggle('selected',val==='F'); }
  function getUserAnswer(i,q){ if(q.type==='radio'){ const el=document.querySelector(`input[name="q${i}"]:checked`); return el?el.value:''; } return (document.getElementById('ans-'+i)||{value:''}).value; }

  function submitAll(){
    let correct=0;
    questions.forEach((q,i)=>{
      const user=getUserAnswer(i,q), card=document.getElementById('q-'+i), fb=document.getElementById('fb-'+i);
      if(!user){ fb.textContent='⚠ Please answer this question.'; fb.className='feedback show incorrect'; return; }
      if(answersMatch(user,q.answer)){ correct++; card.className='q-card correct'; fb.textContent='✓ Correct!'; fb.className='feedback show correct'; }
      else { card.className='q-card incorrect'; fb.textContent=`✗ Not quite. The answer is ${q.answer}.`; fb.className='feedback show incorrect'; }
    });
    const banner=document.getElementById('score-banner'), scoreText=document.getElementById('score-text');
    banner.classList.add('show');
    if(correct>=8){ banner.className='score-banner show great'; scoreText.textContent=`🎉 ${correct}/10 — Excellent work!`; }
    else if(correct>=5){ banner.className='score-banner show ok'; scoreText.textContent=`👍 ${correct}/10 — Good effort! Keep practising.`; }
    else { banner.className='score-banner show low'; scoreText.textContent=`💪 ${correct}/10 — Review the help page and try again!`; }
    saveStats(correct); banner.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function showAnswers(){ questions.forEach((q,i)=>{ const fb=document.getElementById('fb-'+i); fb.textContent=`Answer: ${q.answer}`; fb.className='feedback show incorrect'; }); }
  function shareResults(){ if(navigator.share){ navigator.share({title:'LearnBright',text:'I practised Probability Advanced on LearnBright!',url:location.href}); } else { navigator.clipboard.writeText(location.href).then(()=>alert('Link copied!')); } }
  function saveStats(score){ try{ const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"attempts":0,"totalScore":0}'); s.attempts++; s.totalScore+=score; localStorage.setItem(STATS_KEY,JSON.stringify(s)); }catch(e){} }
  function newWorksheet(){ generate(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  window.setDiff=setDiff; window.newWorksheet=newWorksheet; window.showAnswers=showAnswers;
  window.shareResults=shareResults; window.submitAll=submitAll; window.selectRadio=selectRadio;

  var cvQuestions=[],cvIdx=0,cvCorrect=0,cvAnswering=false,cvLog=[];
  function cvAnswersMatch(u,c){ var us=String(u).trim().toLowerCase(),cs=String(c).trim().toLowerCase(); if(us===cs)return true; var un=parseFloat(us),cn=parseFloat(cs); if(!isNaN(un)&&!isNaN(cn))return Math.abs(un-cn)<TOL; return false; }
  function openCompactView(){ var shuffled=[].concat(generators).sort(function(){return Math.random()-0.5;}); cvQuestions=shuffled.slice(0,10).map(function(fn){try{return fn(difficulty==='easy');}catch(e){return generators[2](difficulty==='easy');}}); cvIdx=0;cvCorrect=0;cvAnswering=false;cvLog=[]; document.getElementById('cvOverlay').classList.remove('hidden'); document.getElementById('cvQuestionSection').classList.remove('hidden'); document.getElementById('cvResultSection').classList.add('hidden'); document.getElementById('cvFooter').classList.remove('hidden'); document.body.style.overflow='hidden'; cvRenderQuestion(); }
  function exitCompactView(){document.getElementById('cvOverlay').classList.add('hidden');document.body.style.overflow='';}
  function cvUpdateHeader(){ document.getElementById('cvQNum').textContent=Math.min(cvIdx+1,10); document.getElementById('cvScoreChip').textContent=cvCorrect+' ✓'; document.getElementById('cvProgressFill').style.width=(cvIdx/10*100)+'%'; }
  function cvRenderQuestion(){
    if(cvIdx>=10){cvShowResult();return;}
    var q=cvQuestions[cvIdx]; cvAnswering=false;
    var card=document.getElementById('cvCard'); card.className='cv-card';void card.offsetWidth;card.classList.add('cv-slide-in');
    document.getElementById('cvQLabel').textContent='Question '+(cvIdx+1)+' of 10';
    document.getElementById('cvQuestionText').innerHTML=q.text;
    var fb=document.getElementById('cvFeedback');fb.className='cv-feedback';fb.textContent='';
    var area=document.getElementById('cvInputArea'); var opts=q.options||[];
    if(q.type==='number'){ area.innerHTML='<input class="cv-input" type="number" step="any" id="cvNumInput" autocomplete="off" placeholder="?"/>'; setTimeout(function(){var el=document.getElementById('cvNumInput');if(el)el.focus();},80); var inp=document.getElementById('cvNumInput'); if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')cvSubmit();}); }
    else if(q.type==='radio'){ area.innerHTML='<div class="cv-radio-group" role="radiogroup"><label class="cv-radio-label"><input type="radio" name="cvradio" value="True"/>True</label><label class="cv-radio-label"><input type="radio" name="cvradio" value="False"/>False</label></div>'; }
    else if(q.type==='select'){ area.innerHTML='<select class="cv-select" id="cvNumInput"><option value="" disabled selected>-- choose --</option>'+opts.map(function(o){return'<option value="'+o+'">'+o+'</option>';}).join('')+'</select>'; }
    else{ area.innerHTML='<input class="cv-input" type="number" id="cvNumInput" autocomplete="off" placeholder="?"/>'; setTimeout(function(){var el=document.getElementById('cvNumInput');if(el)el.focus();},80); }
    document.getElementById('cvSubmitBtn').disabled=false; document.getElementById('cvSkipBtn').disabled=false; cvUpdateHeader();
  }
  function cvGetAnswer(){ var q=cvQuestions[cvIdx]; if(q.type==='radio'){var c=document.querySelector('input[name="cvradio"]:checked');return c?c.value:'';} var el=document.getElementById('cvNumInput');return el?el.value.trim():''; }
  function cvSubmit(){ if(cvAnswering)return; var ua=cvGetAnswer(); if(!ua){var inp=document.getElementById('cvNumInput');var grp=document.querySelector('.cv-radio-group');var target=inp||grp;if(target){target.classList.add('cv-shake');setTimeout(function(){target.classList.remove('cv-shake');},500);}return;} cvAnswering=true; var q=cvQuestions[cvIdx];var ok=cvAnswersMatch(ua,q.answer); if(ok)cvCorrect++;cvLog.push({correct:ok,skipped:false}); var card=document.getElementById('cvCard');card.classList.add(ok?'cv-correct':'cv-wrong'); var fb=document.getElementById('cvFeedback'); fb.className='cv-feedback show '+(ok?'cv-fb-correct':'cv-fb-wrong'); fb.textContent=ok?'✅ Correct!':'❌ Correct answer: '+q.answer; document.getElementById('cvSubmitBtn').disabled=true;document.getElementById('cvSkipBtn').disabled=true; cvUpdateHeader();setTimeout(function(){cvIdx++;cvRenderQuestion();},1400); }
  function cvSkip(){if(cvAnswering)return;cvAnswering=true;cvLog.push({correct:false,skipped:true});cvIdx++;cvRenderQuestion();}
  function cvShowResult(){ document.getElementById('cvProgressFill').style.width='100%'; document.getElementById('cvQuestionSection').classList.add('hidden'); document.getElementById('cvFooter').classList.add('hidden'); document.getElementById('cvResultScore').textContent=cvCorrect+'/10'; var msgs=['😢 No worries!','🐣 A good start!','😅 Keep practising!','😅 Keep practising!','🤔 Getting there!','🤔 Half right!','👍 More than half!','👏 Great job!','😎 Fantastic!','🔥 Almost flawless!','🏆 PERFECT SCORE!']; document.getElementById('cvResultMsg').textContent=msgs[cvCorrect]||'Great effort!'; document.getElementById('cvResultDots').innerHTML=cvLog.map(function(r,i){return'<div class="cv-result-dot '+(r.correct?'dot-correct':r.skipped?'dot-skipped':'dot-wrong')+'" title="Q'+(i+1)+'">'+(r.correct?'✅':r.skipped?'⭕':'❌')+'</div>';}).join(''); document.getElementById('cvResultSection').classList.remove('hidden'); saveStats(cvCorrect); }
  function cvPlayAgain(){ document.getElementById('cvResultSection').classList.add('hidden'); document.getElementById('cvQuestionSection').classList.remove('hidden'); document.getElementById('cvFooter').classList.remove('hidden'); var shuffled=[].concat(generators).sort(function(){return Math.random()-0.5;}); cvQuestions=shuffled.slice(0,10).map(function(fn){try{return fn(difficulty==='easy');}catch(e){return generators[2](difficulty==='easy');}}); cvIdx=0;cvCorrect=0;cvAnswering=false;cvLog=[];cvRenderQuestion(); }
  function cvShareResults(){ var dl=difficulty==='easy'?'Easy':'Hard'; var emojis=cvLog.map(function(r){return r.correct?'✅':r.skipped?'⭕':'❌';}).join(''); var text='📱 Math Worksheet\nScored '+cvCorrect+'/10 on '+dl+' mode!\n'+emojis+'\n🔗 '+location.href; if(navigator.share)navigator.share({title:'Math Worksheet',text:text,url:location.href}).catch(function(){}); else if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){alert('Copied! 📤');}); else alert('Copy the URL to share 🔗'); }
  window.openCompactView=openCompactView;window.exitCompactView=exitCompactView;
  window.cvSubmit=cvSubmit;window.cvSkip=cvSkip;window.cvPlayAgain=cvPlayAgain;window.cvShareResults=cvShareResults;
  generate(); render();
})();
</script>
