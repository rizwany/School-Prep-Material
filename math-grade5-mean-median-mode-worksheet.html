<script>
(function(){
  const STATS_KEY = 'ws_math_grade5_mean-median-mode_stats';
  let difficulty = 'easy';
  let questions = [];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rnd(0,arr.length-1)]; }

  function answersMatch(user,correct){
    if(user.trim().toLowerCase()===String(correct).toLowerCase()) return true;
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<0.001;
    return false;
  }

  function makeDataSet(easy){
    const n=easy?5:7;
    return Array.from({length:n},()=>rnd(easy?1:1,easy?10:20));
  }

  function mean(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }
  function median(arr){ const s=[...arr].sort((a,b)=>a-b); const m=Math.floor(s.length/2); return s.length%2===0?(s[m-1]+s[m])/2:s[m]; }
  function mode(arr){
    const freq={}; arr.forEach(v=>{ freq[v]=(freq[v]||0)+1; });
    const max=Math.max(...Object.values(freq));
    const modes=Object.keys(freq).filter(k=>freq[k]===max).map(Number);
    return modes.length===arr.length?null:modes[0];
  }
  function range(arr){ return Math.max(...arr)-Math.min(...arr); }

  function makeMeanQ(easy){
    const data=makeDataSet(easy);
    const m=mean(data);
    if(!Number.isInteger(m)) return makeMeanQ(easy);
    return { text:`Find the mean (average) of: ${data.join(', ')}`, answer:m, type:'number' };
  }

  function makeMedianOddQ(easy){
    let data;
    do { data=makeDataSet(easy); } while(data.length%2===0);
    const m=median(data);
    return { text:`Find the median of: ${data.join(', ')} (Hint: sort them first!)`, answer:m, type:'number' };
  }

  function makeMedianEvenQ(easy){
    const n=easy?4:6;
    const data=Array.from({length:n},()=>rnd(easy?1:1,easy?10:20));
    const m=median(data);
    if(!Number.isInteger(m)) return makeMedianEvenQ(easy);
    return { text:`Find the median of: ${data.join(', ')} (Even count — take the mean of the two middle values)`, answer:m, type:'number' };
  }

  function makeModeQ(easy){
    const base=makeDataSet(easy);
    const repeated=rnd(1,easy?9:15);
    base.push(repeated, repeated);
    const data=base.sort(()=>Math.random()-0.5);
    const m=mode(data);
    if(m===null) return makeModeQ(easy);
    return { text:`Find the mode of: ${data.join(', ')}`, answer:m, type:'number' };
  }

  function makeRangeQ(easy){
    const data=makeDataSet(easy);
    return { text:`Find the range of: ${data.join(', ')}`, answer:range(data), type:'number' };
  }

  function makeTFMeanQ(easy){
    const data=makeDataSet(easy);
    const m=mean(data);
    if(!Number.isInteger(m)) return makeTFMeanQ(easy);
    const isRight=rnd(0,1)===1;
    const shown=isRight?m:m+rnd(1,3);
    return { text:`True or False: The mean of ${data.join(', ')} is ${shown}.`, answer:isRight?'True':'False', type:'radio' };
  }

  function makeMCMedianQ(easy){
    let data;
    do { data=makeDataSet(easy); } while(data.length%2===0);
    const m=median(data);
    const w=[m+1,m-1,m+2].filter(v=>v>0&&v!==m);
    const opts=w.slice(0,3);
    opts.push(m);
    opts.sort(()=>Math.random()-0.5);
    return { text:`What is the median of: ${data.join(', ')}?`, answer:m, type:'select', options:opts.map(String) };
  }

  function makeWordMeanQ(easy){
    const n=easy?4:5;
    const scores=Array.from({length:n},()=>rnd(easy?4:5,easy?10:20));
    const total=scores.reduce((a,b)=>a+b,0);
    if(total%n!==0) return makeWordMeanQ(easy);
    return { text:`A student scored ${scores.join(', ')} on ${n} tests. What is their average (mean) score?`, answer:total/n, type:'number' };
  }

  function makeMissingMeanQ(easy){
    const n=easy?4:5;
    const target=rnd(easy?4:6,easy?8:12);
    const known=Array.from({length:n-1},()=>rnd(easy?2:2,easy?10:15));
    const missing=target*n-known.reduce((a,b)=>a+b,0);
    if(missing<=0||missing>20) return makeMissingMeanQ(easy);
    return { text:`The mean of ${n} numbers is ${target}. The first ${n-1} numbers are ${known.join(', ')}. What is the missing number?`, answer:missing, type:'number' };
  }

  function makeIdentifyQ(easy){
    const data=[3,7,7,2,5,7,4];
    const opts=['mean','median','mode','range'];
    const ans=pick(opts);
    let val;
    if(ans==='mean') val=mean(data);
    else if(ans==='median') val=median(data);
    else if(ans==='mode') val=mode(data)||7;
    else val=range(data);
    if(!Number.isInteger(val)) return makeIdentifyQ(easy);
    return { text:`For the data set ${data.join(', ')}, which measure equals ${val}?`, answer:ans, type:'select', options:opts };
  }

  const generators = [
    makeMeanQ, makeMedianOddQ, makeMedianEvenQ, makeModeQ, makeRangeQ,
    makeTFMeanQ, makeMCMedianQ, makeWordMeanQ, makeMissingMeanQ, makeIdentifyQ
  ];

  function generate(){
    const shuffled=[...generators].sort(()=>Math.random()-0.5);
    questions=shuffled.slice(0,10).map(fn=>{ try{ return fn(difficulty==='easy'); }catch(e){ return makeMeanQ(difficulty==='easy'); } });
  }

  function setDiff(d){ difficulty=d; document.getElementById('btn-easy').classList.toggle('active',d==='easy'); document.getElementById('btn-hard').classList.toggle('active',d==='hard'); newWorksheet(); }

  function render(){
    const container=document.getElementById('questions');
    container.innerHTML='';
    questions.forEach((q,i)=>{
      const card=document.createElement('div');
      card.className='q-card'; card.id='q-'+i;
      let inputHtml='';
      if(q.type==='number'){
        inputHtml=`<input class="q-input" type="number" id="ans-${i}" placeholder="?" autocomplete="off"/>`;
      } else if(q.type==='radio'){
        inputHtml=`<div class="radio-group"><label class="radio-label" id="rl-${i}-T"><input type="radio" name="q${i}" value="True" onchange="selectRadio(${i},'T')">True</label><label class="radio-label" id="rl-${i}-F"><input type="radio" name="q${i}" value="False" onchange="selectRadio(${i},'F')">False</label></div>`;
      } else {
        const opts=q.options.map(o=>`<option value="${o}">${o}</option>`).join('');
        inputHtml=`<select class="select-input" id="ans-${i}"><option value="">-- choose --</option>${opts}</select>`;
      }
      card.innerHTML=`<div class="q-header"><div class="q-num">${i+1}</div><div class="q-text">${q.text}</div></div>${inputHtml}<div class="feedback" id="fb-${i}"></div>`;
      container.appendChild(card);
    });
    document.getElementById('score-banner').classList.remove('show');
  }

  function selectRadio(i,val){ document.getElementById('rl-'+i+'-T').classList.toggle('selected',val==='T'); document.getElementById('rl-'+i+'-F').classList.toggle('selected',val==='F'); }
  function getUserAnswer(i,q){ if(q.type==='radio'){ const el=document.querySelector(`input[name="q${i}"]:checked`); return el?el.value:''; } return (document.getElementById('ans-'+i)||{value:''}).value; }

  function submitAll(){
    let correct=0;
    questions.forEach((q,i)=>{
      const user=getUserAnswer(i,q), card=document.getElementById('q-'+i), fb=document.getElementById('fb-'+i);
      if(!user){ fb.textContent='⚠ Please answer this question.'; fb.className='feedback show incorrect'; return; }
      if(answersMatch(user,q.answer)){ correct++; card.className='q-card correct'; fb.textContent='✓ Correct!'; fb.className='feedback show correct'; }
      else { card.className='q-card incorrect'; fb.textContent=`✗ Not quite. The answer is ${q.answer}.`; fb.className='feedback show incorrect'; }
    });
    const banner=document.getElementById('score-banner'), scoreText=document.getElementById('score-text');
    banner.classList.add('show');
    if(correct>=8){ banner.className='score-banner show great'; scoreText.textContent=`🎉 ${correct}/10 — Excellent work!`; }
    else if(correct>=5){ banner.className='score-banner show ok'; scoreText.textContent=`👍 ${correct}/10 — Good effort! Keep practising.`; }
    else { banner.className='score-banner show low'; scoreText.textContent=`💪 ${correct}/10 — Review the help page and try again!`; }
    saveStats(correct); banner.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function showAnswers(){ questions.forEach((q,i)=>{ const fb=document.getElementById('fb-'+i); fb.textContent=`Answer: ${q.answer}`; fb.className='feedback show incorrect'; }); }
  function shareResults(){ if(navigator.share){ navigator.share({title:'LearnBright',text:'I practised Mean, Median & Mode on LearnBright!',url:location.href}); } else { navigator.clipboard.writeText(location.href).then(()=>alert('Link copied!')); } }
  function saveStats(score){ try{ const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"attempts":0,"totalScore":0}'); s.attempts++; s.totalScore+=score; localStorage.setItem(STATS_KEY,JSON.stringify(s)); }catch(e){} }
  function newWorksheet(){ generate(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  window.setDiff=setDiff; window.newWorksheet=newWorksheet; window.showAnswers=showAnswers;
  window.shareResults=shareResults; window.submitAll=submitAll; window.selectRadio=selectRadio;
  generate(); render();
})();
</script>
