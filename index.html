      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;

      padding: 7px 18px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--card);
      font-family: inherit;
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--muted);

      transition: all .15s;

    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Grade accordion */
    .grade-block { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .grade-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .grade-header:hover { background: #f8f9ff; }
    .grade-header.open { background: #f8f9ff; }
    .grade-badge {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 0.9rem; flex-shrink: 0;
    }
    .grade-title { font-weight: 900; font-size: 1rem; flex: 1; }
    .grade-count { font-size: 0.75rem; font-weight: 700; color: var(--muted); }
    .grade-chevron { font-size: 0.8rem; color: var(--muted); transition: transform .2s; }
    .grade-header.open .grade-chevron { transform: rotate(180deg); }

    .grade-body { display: none; padding: 0 20px 20px; }
    .grade-body.open { display: block; }

    /* Subject grouping */
    .subject-group { margin-top: 16px; }
    .subject-label {
      font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .subject-label::before {
      content: ''; display: block; width: 10px; height: 10px; border-radius: 3px;
    }
    .subject-label.math::before { background: var(--math-color); }
    .subject-label.english::before { background: var(--english-color); }
    .subject-label.science::before { background: var(--science-color); }

      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .topic-row:last-child { border-bottom: none; }
    .topic-name { font-weight: 700; font-size: 0.88rem; flex: 1; }
    .topic-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .topic-link {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.72rem; font-weight: 800;
      text-decoration: none;
      transition: opacity .15s;

      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;

      font-weight: 900; font-size: 0.95rem; margin-bottom: 12px;

      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--ink);
      background: var(--bg);
      transition: background .15s, color .15s;
    }
    .module-link:hover { background: #eef1fd; color: var(--accent); }
    .module-link.is-index { font-weight: 900; color: var(--accent); background: #eef1fd; }

      display: inline-flex; align-items: center; gap: 6px;

      font-weight: 800; font-size: 0.85rem; color: var(--ink);
      text-decoration: none; transition: border-color .15s, color .15s;

function toTitle(slug) {
  return slug
    .replace(/^\d+-/, '')  // strip leading numbers like "01-"
    .replace(/[-_]/g, ' ')
    .replace(/\b(ai|nlp|2d|3d|ur)\b/gi, s => s.toUpperCase())
    .replace(/\b\w/g, c => c.toUpperCase());
}

function mathUrduSuffix(grade, topic) {
  if (grade === 1) return `-ur`;
  // grade 2+ use -urdu- inline, e.g. math-grade2-addition-carrying-urdu-help.html
  return `-urdu`;
}

function getMathLinks(grade, topic) {
  const base = `for_school/math-grade${grade}-${topic}`;
  if (grade === 1) {
    return {
      help: `${base}-help.html`,
      worksheet: `${base}-worksheet.html`,
      helpUr: `${base}-help-ur.html`,
      worksheetUr: `${base}-worksheet-ur.html`,
    };
  } else {
    return {
      help: `${base}-help.html`,
      worksheet: `${base}-worksheet.html`,
      helpUr: `${base}-urdu-help.html`,
      worksheetUr: `${base}-urdu-worksheet.html`,
    };
  }
}

function getEnglishLinks(grade, topic) {
  const base = `for_school/english-grade${grade}-${topic}`;
  return {
    help: `${base}-help.html`,
    worksheet: `${base}-worksheet.html`,
  };
}

function getScienceLinks(grade, topic) {
  const base = `for_school/science-grade${grade}-${topic}`;
  return {
    help: `${base}-help.html`,
    worksheet: `${base}-worksheet.html`,
    helpUr: `${base}-help-ur.html`,
    worksheetUr: `${base}-worksheet-ur.html`,
  };
}

// ─── BUILD SCHOOL PANEL ──────────────────────────────────────────────────────

function buildTopicRow(label, links) {
  const urPart = links.helpUr ? `
    <a class="topic-link link-help-ur" href="${links.helpUr}">Help UR</a>
    <a class="topic-link link-sheet-ur" href="${links.worksheetUr}">Sheet UR</a>
  ` : '';
  return `
    <div class="topic-row" data-label="${label.toLowerCase()}">
      <span class="topic-name">${label}</span>
      <div class="topic-links">
        <a class="topic-link link-help" href="${links.help}">Help</a>
        <a class="topic-link link-sheet" href="${links.worksheet}">Worksheet</a>
        ${urPart}
      </div>
    </div>`;
}

function buildSubjectSection(subject, label, topics, grade, linkFn) {
  let rows = '';
  const topicList = Array.isArray(topics) ? topics : Object.values(topics).flat();
  const topicSlugs = Array.isArray(topics) ? topics : null;

  if (Array.isArray(topics)) {
    topics.forEach(t => {
      const links = linkFn(grade, t);
      rows += buildTopicRow(toTitle(t), links);
    });
  } else {
    // for grades 9/10 science with sub-subjects
    Object.entries(topics).forEach(([sub, subtopics]) => {
      rows += `<div style="margin-top:10px;margin-bottom:4px;font-size:0.73rem;font-weight:800;color:var(--science-color);text-transform:uppercase;letter-spacing:.07em">${sub.charAt(0).toUpperCase()+sub.slice(1)}</div>`;
      subtopics.forEach(t => {
        const links = getScienceLinks(grade, `${sub}-${t}`);
        rows += buildTopicRow(toTitle(t), links);
      });
    });
  }

  return `
    <div class="subject-group">
      <div class="subject-label ${subject}">${label}</div>
      ${rows}
    </div>`;
}

function buildGradeBlock(grade) {
  const data = SCHOOL_DATA[grade];
  const colorMap = { 1:'#eef1fd', 2:'#e8faf4', 3:'#f0eeff', 4:'#fff4e6', 5:'#fef2f2',
                     6:'#eef1fd', 7:'#e8faf4', 8:'#f0eeff', 9:'#fff4e6', 10:'#fef2f2' };
  const textMap = { 1:'#4361EE', 2:'#059669', 3:'#7c3aed', 4:'#c2410c', 5:'#dc2626',
                    6:'#4361EE', 7:'#059669', 8:'#7c3aed', 9:'#c2410c', 10:'#dc2626' };

  let body = '';
  body += buildSubjectSection('math', 'Math', data.math, grade, getMathLinks);
  body += buildSubjectSection('english', 'English', data.english, grade, getEnglishLinks);
  body += buildSubjectSection('science', 'Science', data.science, grade, getScienceLinks);

  const mathCount = data.math.length;
  const engCount = data.english.length;
  const sciCount = Array.isArray(data.science)
    ? data.science.length
    : Object.values(data.science).flat().length;
  const total = mathCount + engCount + sciCount;

  return `
    <div class="grade-block" data-grade="${grade}">
      <div class="grade-header" onclick="toggleGrade(this)">
        <div class="grade-badge" style="background:${colorMap[grade]};color:${textMap[grade]}">G${grade}</div>
        <div class="grade-title">Grade ${grade}</div>
        <div class="grade-count">${total} topics · Math ${mathCount} · English ${engCount} · Science ${sciCount}</div>
        <span class="grade-chevron">▼</span>
      </div>
      <div class="grade-body">${body}</div>
    </div>`;
}

// ─── BUILD LEARNINGS PANEL ────────────────────────────────────────────────────

function buildLearningsGrid() {
  const grid = document.getElementById('learningsGrid');
  LEARNINGS_DATA.forEach(mod => {
    const topicLinks = mod.topics.map(t =>
      `<a class="module-link" href="${mod.base}${t.slug}.html">${t.label}</a>`

    grid.innerHTML += `

        </div>
        <div class="module-links">
          <a class="module-link is-index" href="${mod.index}">📋 Module Index</a>
          ${topicLinks}
        </div>
      </div>`;
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────

function toggleGrade(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function initSchoolPanel() {
  const acc = document.getElementById('gradeAccordion');
  for (let g = 1; g <= 10; g++) acc.innerHTML += buildGradeBlock(g);
}

// ─── TABS ────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ─── SEARCH ─────────────────────────────────────────────────────────────────

document.getElementById('searchBox').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();

  // School search: show matching topic rows, open parent grade blocks
  document.querySelectorAll('.grade-block').forEach(block => {
    let anyMatch = false;
    block.querySelectorAll('.topic-row').forEach(row => {
      const label = row.dataset.label || '';
      const allText = row.textContent.toLowerCase();
      const match = !q || label.includes(q) || allText.includes(q);
      row.style.display = match ? '' : 'none';
      if (match) anyMatch = true;
    });
    block.style.display = (!q || anyMatch) ? '' : 'none';
    if (q && anyMatch) {
      block.querySelector('.grade-header').classList.add('open');
      block.querySelector('.grade-body').classList.add('open');
    }
  });

  // Learnings search
  document.querySelectorAll('.module-card').forEach(card => {
    const match = !q || card.textContent.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
  });

  // Root links search
  document.querySelectorAll('.root-link').forEach(link => {
    const match = !q || link.textContent.toLowerCase().includes(q);
    link.style.display = match ? '' : 'none';
  });

  const noResults = document.getElementById('noResults');
  const visibleGrades = [...document.querySelectorAll('.grade-block')].filter(b => b.style.display !== 'none');
  noResults.style.display = (q && visibleGrades.length === 0) ? 'block' : 'none';
});
