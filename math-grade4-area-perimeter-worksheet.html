    .score-banner.great { background: #e8faf4; border: 2px solid var(--green); }

    .q-card.incorrect { border-color: var(--red); background: #fff5f5; }
    .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .q-num { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 900; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .q-text { font-size: 0.97rem; font-weight: 700; line-height: 1.5; }
    .q-input { width: 110px; padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--ink); outline: none; transition: border-color .15s; }

<script>
(function(){
  const STATS_KEY = 'ws_math_grade4_area-perimeter_stats';
  let difficulty = 'easy';
  let questions = [];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rnd(0,arr.length-1)]; }

  function answersMatch(user, correct){
    if(user.trim().toLowerCase()===String(correct).toLowerCase()) return true;
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<0.001;
    return false;
  }

  function rL(easy){ return easy ? rnd(2,10) : rnd(8,25); }
  function rW(easy){ return easy ? rnd(2,10) : rnd(4,18); }

  /* ── generators ── */
  function makeAreaQ(easy){
    const l=rL(easy), w=rW(easy);
    return { text:`Find the area of a rectangle with length ${l} cm and width ${w} cm.`, answer:l*w, type:'number' };
  }

  function makePerimeterQ(easy){
    const l=rL(easy), w=rW(easy);
    return { text:`Find the perimeter of a rectangle with length ${l} cm and width ${w} cm.`, answer:2*(l+w), type:'number' };
  }

  function makeSquareQ(easy){
    const s = easy ? rnd(2,10) : rnd(6,20);
    const ask = rnd(0,1)===0;
    if(ask) return { text:`A square has side ${s} cm. What is its area?`, answer:s*s, type:'number' };
    return { text:`A square has side ${s} cm. What is its perimeter?`, answer:4*s, type:'number' };
  }

  function makeMissingSideAreaQ(easy){
    const area = easy ? pick([12,16,20,24,30,36]) : pick([48,56,72,96,100,120]);
    const w = easy ? rnd(2,6) : rnd(4,12);
    if(area % w !== 0){ return makeAreaQ(easy); }
    const l = area/w;
    return { text:`A rectangle has area ${area} cm² and width ${w} cm. What is its length?`, answer:l, type:'number' };
  }

  function makeMissingPerimQ(easy){
    const p = easy ? pick([16,20,24,28,32]) : pick([36,44,52,60,72]);
    const w = easy ? rnd(2,6) : rnd(4,10);
    const l = p/2 - w;
    if(l<=0) return makePerimeterQ(easy);
    return { text:`A rectangle has perimeter ${p} cm and width ${w} cm. What is its length?`, answer:l, type:'number' };
  }

  function makeWordAreaQ(easy){
    const l=rL(easy), w=rW(easy);
    const contexts = [
      {name:'garden',measure:'tiles',unit:'m'},
      {name:'classroom floor',measure:'tiles',unit:'m'},
      {name:'wall',measure:'paint',unit:'m'},
    ];
    const c = pick(contexts);
    return { text:`A ${c.name} is ${l} ${c.unit} long and ${w} ${c.unit} wide. What is its area?`, answer:l*w, type:'number' };
  }

  function makeWordPerimQ(easy){
    const l=rL(easy), w=rW(easy);
    const contexts = [
      {name:'garden','action':'fence'},
      {name:'field','action':'fence'},
      {name:'room','action':'border'},
    ];
    const c = pick(contexts);
    return { text:`A ${c.name} is ${l} m long and ${w} m wide. How much ${c.action} is needed to go all the way around?`, answer:2*(l+w), type:'number' };
  }

  function makeTFQ(easy){
    const l=rL(easy), w=rW(easy);
    const isArea = rnd(0,1)===0;
    const correct = isArea ? l*w : 2*(l+w);
    const wrong = correct + pick([2,4,6,-2,-4]);
    const isTrue = rnd(0,1)===1;
    const shown = isTrue ? correct : wrong;
    const what = isArea ? 'area' : 'perimeter';
    return { text:`True or False: A rectangle with length ${l} cm and width ${w} cm has ${what} = ${shown}.`, answer:isTrue?'True':'False', type:'radio' };
  }

  function makeMCQ(easy){
    const l=rL(easy), w=rW(easy);
    const isArea = rnd(0,1)===0;
    const correct = isArea ? l*w : 2*(l+w);
    const wrong1 = isArea ? l+w : l*w;
    const wrong2 = correct + pick([4,8,10,-4]);
    const wrong3 = correct * 2;
    const opts = [...new Set([correct,wrong1,wrong2,wrong3].map(Math.abs))].sort(()=>Math.random()-0.5).slice(0,4);
    if(!opts.includes(correct)) opts[0]=correct;
    return { text:`What is the ${isArea?'area':'perimeter'} of a rectangle ${l} cm × ${w} cm?`, answer:String(correct), type:'select', options:opts.map(String) };
  }

  function makeCompareQ(easy){
    const l1=rL(easy), w1=rW(easy);
    const l2=rL(easy), w2=rW(easy);
    const a1=l1*w1, a2=l2*w2;
    if(a1===a2) return makeAreaQ(easy);
    const bigger = a1>a2 ? 'A' : 'B';
    return { text:`Rectangle A is ${l1}×${w1} cm. Rectangle B is ${l2}×${w2} cm. Which has the larger area?`, answer:bigger, type:'select', options:['A','B','same'] };
  }

  function makeUnitsQ(){
    const items = [
      {q:'The distance around a football field.',ans:'perimeter'},
      {q:'The number of tiles needed to cover a floor.',ans:'area'},
      {q:'The length of fencing for a garden.',ans:'perimeter'},
      {q:'The amount of carpet needed for a room.',ans:'area'},
      {q:'The distance around a swimming pool.',ans:'perimeter'},
    ];
    const item = pick(items);
    return { text:`Would you calculate area or perimeter? "${item.q}"`, answer:item.ans, type:'select', options:['area','perimeter'] };
  }

  const generators = [
    makeAreaQ, makePerimeterQ, makeSquareQ, makeMissingSideAreaQ, makeMissingPerimQ,
    makeWordAreaQ, makeWordPerimQ, makeTFQ, makeMCQ, makeCompareQ
  ];

  function generate(){
    const shuffled = [...generators].sort(()=>Math.random()-0.5);
    const pool = [...shuffled.slice(0,9), makeUnitsQ];
    questions = pool.slice(0,10).map(fn=>{
      try{ return fn(difficulty==='easy'); }catch(e){ return makeAreaQ(difficulty==='easy'); }
    });
  }

  function setDiff(d){
    difficulty = d;
    document.getElementById('btn-easy').classList.toggle('active', d==='easy');
    document.getElementById('btn-hard').classList.toggle('active', d==='hard');
    newWorksheet();
  }

  function render(){
    const container = document.getElementById('questions');
    container.innerHTML = '';
    questions.forEach((q,i)=>{
      const card = document.createElement('div');
      card.className = 'q-card'; card.id = 'q-'+i;
      let inputHtml = '';
      if(q.type==='number'){
        inputHtml = `<input class="q-input" type="number" id="ans-${i}" placeholder="?" autocomplete="off" />`;
      } else if(q.type==='radio'){
        inputHtml = `<div class="radio-group">
          <label class="radio-label" id="rl-${i}-T"><input type="radio" name="q${i}" value="True" onchange="selectRadio(${i},'T')">True</label>
          <label class="radio-label" id="rl-${i}-F"><input type="radio" name="q${i}" value="False" onchange="selectRadio(${i},'F')">False</label>
        </div>`;
      } else {
        const opts = q.options.map(o=>`<option value="${o}">${o}</option>`).join('');
        inputHtml = `<select class="select-input" id="ans-${i}"><option value="">-- choose --</option>${opts}</select>`;
      }
      card.innerHTML = `<div class="q-header"><div class="q-num">${i+1}</div><div class="q-text">${q.text}</div></div>${inputHtml}<div class="feedback" id="fb-${i}"></div>`;
      container.appendChild(card);
    });
    document.getElementById('score-banner').classList.remove('show');
  }

  function selectRadio(i,val){
    document.getElementById('rl-'+i+'-T').classList.toggle('selected',val==='T');
    document.getElementById('rl-'+i+'-F').classList.toggle('selected',val==='F');
  }

  function getUserAnswer(i,q){
    if(q.type==='radio'){ const el=document.querySelector(`input[name="q${i}"]:checked`); return el?el.value:''; }
    return (document.getElementById('ans-'+i)||{value:''}).value;
  }

  function submitAll(){
    let correct=0;
    questions.forEach((q,i)=>{
      const user=getUserAnswer(i,q), card=document.getElementById('q-'+i), fb=document.getElementById('fb-'+i);
      if(!user){ fb.textContent='⚠ Please answer this question.'; fb.className='feedback show incorrect'; return; }
      if(answersMatch(user,q.answer)){ correct++; card.className='q-card correct'; fb.textContent='✓ Correct!'; fb.className='feedback show correct'; }
      else { card.className='q-card incorrect'; fb.textContent=`✗ Not quite. The answer is ${q.answer}.`; fb.className='feedback show incorrect'; }
    });
    const banner=document.getElementById('score-banner'), scoreText=document.getElementById('score-text');
    banner.classList.add('show');
    if(correct>=8){ banner.className='score-banner show great'; scoreText.textContent=`🎉 ${correct}/10 — Excellent work!`; }
    else if(correct>=5){ banner.className='score-banner show ok'; scoreText.textContent=`👍 ${correct}/10 — Good effort! Keep practising.`; }
    else { banner.className='score-banner show low'; scoreText.textContent=`💪 ${correct}/10 — Review the help page and try again!`; }
    saveStats(correct); banner.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function showAnswers(){ questions.forEach((q,i)=>{ const fb=document.getElementById('fb-'+i); fb.textContent=`Answer: ${q.answer}`; fb.className='feedback show incorrect'; }); }
  function shareResults(){ if(navigator.share){ navigator.share({title:'LearnBright',text:'I practised Area & Perimeter on LearnBright!',url:location.href}); } else { navigator.clipboard.writeText(location.href).then(()=>alert('Link copied!')); } }
  function saveStats(score){ try{ const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"attempts":0,"totalScore":0}'); s.attempts++; s.totalScore+=score; localStorage.setItem(STATS_KEY,JSON.stringify(s)); }catch(e){} }
  function newWorksheet(){ generate(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  window.setDiff=setDiff; window.newWorksheet=newWorksheet; window.showAnswers=showAnswers;
  window.shareResults=shareResults; window.submitAll=submitAll; window.selectRadio=selectRadio;
  generate(); render();
})();
</script>
