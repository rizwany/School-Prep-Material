  <style>

<script>
/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
const pick    = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => [...a].sort(() => Math.random() - .5);
const VOWELS  = new Set('aeiou');
const isVowel = c => VOWELS.has(c.toLowerCase());

/* ═══════════════════════════════════════════
   RULE DEFINITIONS  (11 rules, 4 picked per game)
═══════════════════════════════════════════ */
const RULES = [
  {
    id: 'remove_m',
    label: "Remove all m's",
    fn: w => w.replace(/m/g, ''),
    pool: ['memo','meme','minimum','moment','mammoth','mammal','medium','maximum','mushroom','phantom','diagram','madam'],
  },
  {
    id: 'remove_s',
    label: "Remove all s's",
    fn: w => w.replace(/s/g, ''),
    pool: ['stress','success','sunset','season','sister','thesis','status','lesson','assist','bliss','basis','oasis'],
  },
  {
    id: 'remove_t',
    label: "Remove all t's",
    fn: w => w.replace(/t/g, ''),
    pool: ['bottle','battle','butter','litter','kitten','talent','tablet','teeth','intent','bitter','cotton','letter'],
  },
  {
    id: 'remove_l',
    label: "Remove all l's",
    fn: w => w.replace(/l/g, ''),
    pool: ['hello','llama','spell','label','level','loyal','allow','pillar','collar','valley','bullet','dollar'],
  },
  {
    id: 'remove_r',
    label: "Remove all r's",
    fn: w => w.replace(/r/g, ''),
    pool: ['river','mirror','horror','armor','error','parrot','quarter','record','razor','radar','horror','roar'],
  },
  {
    id: 'remove_vowels',
    label: "Remove all vowels",
    fn: w => w.replace(/[aeiou]/g, ''),
    pool: ['hello','bright','spring','python','strong','world','crisp','trunk','dream','bloom','swift','rhythm'],
  },
  {
    id: 'keep_vowels',
    label: "Keep only vowels",
    fn: w => [...w].filter(c => isVowel(c)).join(''),
    pool: ['beautiful','education','audio','ocean','alien','radio','detail','region','aerial','medium','studio','casual'],
  },
  {
    id: 'reverse',
    label: "Reverse the word",
    fn: w => [...w].reverse().join(''),
    pool: ['stop','star','live','step','spot','net','pan','reward','stressed','drawer','repaid','deliver'],
  },
  {
    id: 'remove_first',
    label: "Remove the first letter",
    fn: w => w.slice(1),
    pool: ['phone','knife','write','chair','blend','crane','brain','climb','trust','smoke','steal','pride'],
  },
  {
    id: 'double_vowels',
    label: "Double each vowel",
    fn: w => w.replace(/[aeiou]/g, c => c+c),
    pool: ['cat','big','hop','sun','get','top','bus','sit','pet','log','fun','red','wet','pin','cut'],
  },
  {
    id: 'keep_alternate',
    label: "Keep every other letter",
    fn: w => [...w].filter((_, i) => i % 2 === 0).join(''),
    pool: ['banana','garden','animal','rabbit','potato','castle','sample','mother','wallet','market','napkin','button'],
  },
];

/* ═══════════════════════════════════════════
   DISTRACTOR GENERATORS
═══════════════════════════════════════════ */

function getWrongOutputs(rule, input, correct) {
  const wrongs = new Set();

  // Other rules applied to same input
  for (const r of RULES) {
    if (r.id !== rule.id) {
      const o = r.fn(input);
      if (o !== correct && o.length > 0 && o.length <= 16) wrongs.add(o);
    }
  }

  // Partial: only remove FIRST instance of the targeted letter
  if (rule.id.startsWith('remove_') && rule.id !== 'remove_vowels') {
    const ch = rule.id.slice(7); // e.g. 'm'
    const partial = input.replace(new RegExp(ch), '');
    if (partial !== correct) wrongs.add(partial);
    // Remove only LAST instance
    const idx = input.lastIndexOf(ch);
    if (idx > -1) {
      const last = input.slice(0, idx) + input.slice(idx + 1);
      if (last !== correct && last !== partial) wrongs.add(last);
    }
  }

  // Swap two adjacent chars in the correct output
  if (correct.length >= 2) {
    const arr = [...correct];
    const i = Math.floor(Math.random() * (arr.length - 1));
    [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
    const sw = arr.join('');
    if (sw !== correct) wrongs.add(sw);
  }

  // The input itself (didn't transform)
  if (input !== correct) wrongs.add(input);

  return shuffle([...wrongs]).slice(0, 3);
}

function getWrongInputs(rule, targetOut, correct, pool) {
  // Words in pool (excluding correct) whose output ≠ targetOut
  const wrongs = pool.filter(w => w !== correct && rule.fn(w) !== targetOut);
  if (wrongs.length >= 3) return shuffle(wrongs).slice(0, 3);

  // Fallback: words from other rule pools
  const extra = [];
  for (const r of RULES) {
    for (const w of r.pool) {
      if (w !== correct && rule.fn(w) !== targetOut && !extra.includes(w)) extra.push(w);
    }
  }
  return shuffle([...wrongs, ...extra]).slice(0, 3);
}

/* ═══════════════════════════════════════════
   QUESTION GENERATORS
═══════════════════════════════════════════ */

/* TYPE A — identify the rule (shown as "?") */
function genIdentify(rule) {
  const examples = shuffle(rule.pool).slice(0, 3);
  const pairs = examples.map(w => ({ inp: w, out: rule.fn(w) }));
  const distractors = shuffle(RULES.filter(r => r.id !== rule.id)).slice(0, 3);
  const allOpts = shuffle([rule, ...distractors]);
  return {
    qtype:       'identify',
    questionText: 'Which function could produce these outputs?',
    ruleLabel:   null,
    pairs,
    targetIn:    null,
    targetOut:   null,
    options:     allOpts.map(r => r.label),
    correctIndex: allOpts.indexOf(rule),
    hint:        'Compare each input with its output — what changed?',
  };
}

/* TYPE B — apply the rule to a new input */
function genApply(rule) {
  const shuffled  = shuffle(rule.pool);
  const examples  = shuffled.slice(0, 3);
  const newWord   = shuffled.slice(3).find(w => rule.fn(w).length > 0) || shuffled[0];
  const pairs     = examples.map(w => ({ inp: w, out: rule.fn(w) }));
  const correct   = rule.fn(newWord);
  const wrongs    = getWrongOutputs(rule, newWord, correct);
  const allOpts   = shuffle([correct, ...wrongs]);
  return {
    qtype:        'apply',
    questionText: `What output would the function produce for the input "${newWord}"?`,
    ruleLabel:    rule.label,
    pairs,
    targetIn:     newWord,   // shown bold in last input row
    targetOut:    null,      // shown as "?" in last output row
    options:      allOpts,
    correctIndex: allOpts.indexOf(correct),
    hint:         `Apply "${rule.label}" to "${newWord}" step by step.`,
  };
}

/* TYPE C — find the input that produces a given output */
function genReverse(rule) {
  const shuffled = shuffle(rule.pool);
  const examples = shuffled.slice(0, 3);

  // Pick a target word whose output is unique in the pool
  const remaining = shuffled.slice(3);
  let targetWord = remaining.find(w => {
    const out = rule.fn(w);
    return out.length > 0 && rule.pool.filter(p => rule.fn(p) === out).length === 1;
  }) || remaining[0] || shuffled[shuffled.length - 1];

  const targetOut = rule.fn(targetWord);
  const pairs     = examples.map(w => ({ inp: w, out: rule.fn(w) }));
  const wrongs    = getWrongInputs(rule, targetOut, targetWord, rule.pool);
  const allOpts   = shuffle([targetWord, ...wrongs]);
  return {
    qtype:        'reverse',
    questionText: `Which input would produce the output "${targetOut}"?`,
    ruleLabel:    rule.label,
    pairs,
    targetIn:     null,      // shown as "?" in last input row
    targetOut,               // shown bold in last output row
    options:      allOpts,
    correctIndex: allOpts.indexOf(targetWord),
    hint:         `Which word, when "${rule.label}" is applied, gives "${targetOut}"?`,
  };
}

/* ═══════════════════════════════════════════
   BUILD DIAGRAM HTML
═══════════════════════════════════════════ */
function buildDiagram(q) {
  const isKnown = q.qtype !== 'identify';
  const pillText = isKnown ? q.ruleLabel : '?';

  // Build rows: 3 example pairs + optional 4th target row
  const inputRows  = q.pairs.map(p => p.inp);
  const outputRows = q.pairs.map(p => p.out);

  if (q.qtype === 'apply') {
    inputRows.push(q.targetIn);     // bold
    outputRows.push(null);          // unknown "?"
  } else if (q.qtype === 'reverse') {
    inputRows.push(null);           // unknown "?"
    outputRows.push(q.targetOut);   // bold
  }

  const inBoxHTML = inputRows.map((v, i) => {
    const isTargetRow = (q.qtype === 'apply' && i === inputRows.length - 1) ||
                        (q.qtype === 'reverse' && i === inputRows.length - 1);
    const valHTML = v === null
      ? `<span class="io-unk">?</span>`
      : `<span class="io-val${isTargetRow ? ' bold' : ''}">${v}</span>`;
    return `<div class="io-item in-item" id="inrow-${i}">${valHTML}<span class="io-dot"></span></div>`;
  }).join('');

  const outBoxHTML = outputRows.map((v, i) => {
    const isTargetRow = (q.qtype === 'reverse' && i === outputRows.length - 1);
    const valHTML = v === null
      ? `<span class="io-unk">?</span>`
      : `<span class="io-val${isTargetRow ? ' bold' : ''}">${v}</span>`;
    return `<div class="io-item out-item" id="outrow-${i}"><span class="io-arr">▶</span>${valHTML}</div>`;
  }).join('');

  return `
    <div class="machine${isKnown ? ' rule-known' : ''}">
      <div class="rule-row"><div class="rule-pill${isKnown ? ' known' : ''}">${pillText}</div></div>
      <div class="diagram-labels"><span>inputs</span><span>outputs</span></div>
      <div class="diagram-wrapper" id="diagramWrap">
        <div class="io-box" id="inputBox">${inBoxHTML}</div>
        <div class="io-box" id="outputBox">${outBoxHTML}</div>
        <div class="rule-glow"></div>
        <svg class="lines-svg" id="linesSvg"></svg>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════
   DRAW SVG LINES
═══════════════════════════════════════════ */
function drawLines(rowCount) {
  const wrap   = document.getElementById('diagramWrap');
  const inBox  = document.getElementById('inputBox');
  const outBox = document.getElementById('outputBox');
  const svg    = document.getElementById('linesSvg');
  if (!wrap || !inBox || !outBox || !svg) return;

  const wR     = wrap.getBoundingClientRect();
  const inRect = inBox.getBoundingClientRect();
  const outRect= outBox.getBoundingClientRect();

  const lines = [];
  for (let i = 0; i < rowCount; i++) {
    const inRow  = document.getElementById(`inrow-${i}`);
    const outRow = document.getElementById(`outrow-${i}`);
    if (!inRow || !outRow) continue;
    const iR = inRow.getBoundingClientRect();
    const oR = outRow.getBoundingClientRect();
    lines.push({
      x1: (inRect.right  - wR.left).toFixed(1),
      y1: (iR.top + iR.height / 2 - wR.top).toFixed(1),
      x2: (outRect.left  - wR.left).toFixed(1),
      y2: (oR.top + oR.height / 2 - wR.top).toFixed(1),
    });
  }

  svg.setAttribute('viewBox', `0 0 ${wR.width.toFixed(1)} ${wR.height.toFixed(1)}`);
  svg.setAttribute('width',  wR.width.toFixed(1));
  svg.setAttribute('height', wR.height.toFixed(1));
  svg.innerHTML = `<defs>
    <marker id="ah" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="rgba(255,255,255,0.35)"/>
    </marker>
  </defs>
  ${lines.map(l => `<line x1="${l.x1}" y1="${l.y1}" x2="${l.x2}" y2="${l.y2}"
    stroke="rgba(255,255,255,0.28)" stroke-width="1.5"
    stroke-dasharray="4,3" marker-end="url(#ah)"/>`).join('')}`;
}

window.addEventListener('resize', () => {
  if (typeof currentRowCount !== 'undefined') setTimeout(() => drawLines(currentRowCount), 80);
});
let currentRowCount = 3;

/* ═══════════════════════════════════════════
   RENDER QUESTION
═══════════════════════════════════════════ */
function renderQuestion(q) {
  currentRowCount = q.pairs.length + (q.qtype !== 'identify' ? 1 : 0);

  document.getElementById('qCard').innerHTML = `
    <p class="q-text">${q.questionText}</p>
    ${buildDiagram(q)}
    <div class="options-grid" id="optionsGrid">
      ${q.options.map((lbl, i) => `<button class="opt-btn" data-opt="${i}" onclick="selectOpt(${i})">${lbl}</button>`).join('')}
    </div>
    <div class="start-over-row">
      <button class="start-over-btn" onclick="initQuiz()">↺ Start over</button>
    </div>`;

  requestAnimationFrame(() => requestAnimationFrame(() => drawLines(currentRowCount)));
}

/* ═══════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════ */
let questions = [], qIdx = 0, selOpt = null;
let isAnswered = false, isLocked = false, score = 0;

function selectOpt(i) {
  if (isLocked) return;
  selOpt = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
  });
  document.getElementById('checkBtn').className = 'check-btn ready';
}

function checkAnswer() {
  const q = questions[qIdx];
  if (isAnswered) { advanceQuestion(); return; }
  if (selOpt === null) return;

  isAnswered = isLocked = true;
  const correct = selOpt === q.correctIndex;

  // Re-render options locked
  document.getElementById('optionsGrid').innerHTML = q.options.map((lbl, i) => {
    let cls = 'opt-btn locked';
    if (i === q.correctIndex) cls += ' correct';
    else if (i === selOpt && !correct) cls += ' wrong';
    return `<button class="${cls}">${lbl}</button>`;
  }).join('');

  if (correct) {
    score++;
    document.getElementById('scoreDisp').textContent = score;
  }

  const bar = document.getElementById('feedbackBar');
  bar.className = `feedback-bar ${correct ? 'ok' : 'err'} show`;
  document.getElementById('fbIcon').textContent = correct ? '✓' : '✗';
  const titleEl = document.getElementById('fbTitle');
  titleEl.className = `fb-title ${correct ? 'ok' : 'err'}`;
  titleEl.textContent = correct ? 'Correct!' : `Answer: "${q.options[q.correctIndex]}"`;
  document.getElementById('fbHint').textContent = q.hint;

  document.getElementById('pFill').style.width = (((qIdx + 1) / 10) * 100) + '%';
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn continue';
  btn.textContent = qIdx < 9 ? 'Continue →' : 'See Results →';
}

function advanceQuestion() {
  qIdx++;
  if (qIdx >= 10) { showResults(); return; }
  selOpt = null; isAnswered = isLocked = false;
  document.getElementById('qNum').textContent = qIdx + 1;
  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('checkBtn').className = 'check-btn';
  document.getElementById('checkBtn').textContent = 'Check';
  renderQuestion(questions[qIdx]);
}

function showResults() {
  document.getElementById('qCard').style.display    = 'none';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('resultsWrap').className  = 'results-wrap show';
  const pct = score / 10;
  const [emoji, msg] =
    pct === 1  ? ['🏆','Perfect! You cracked every word function!']
    : pct >= .8 ? ['🎉','Excellent! You really understand how these functions work.']
    : pct >= .6 ? ['👍','Good effort! Review the hints and try again.']
    : pct >= .4 ? ['📚','Keep practicing — the patterns will click!']
                : ['💡','Read the hints carefully after each question.'];
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resScore').textContent = `${score}/10`;
  document.getElementById('resMsg').textContent   = msg;
}

/* ═══════════════════════════════════════════
   INIT  — picks 4 rules, builds 3+3+3+1 questions
═══════════════════════════════════════════ */
function initQuiz() {
  qIdx = score = 0; selOpt = null; isAnswered = isLocked = false;

  const selectedRules = shuffle(RULES).slice(0, 4);
  questions = [
    // 3 rules × 3 question types  (identify → apply → reverse)
    genIdentify(selectedRules[0]),
    genApply   (selectedRules[0]),
    genReverse (selectedRules[0]),

    genIdentify(selectedRules[1]),
    genApply   (selectedRules[1]),
    genReverse (selectedRules[1]),

    genIdentify(selectedRules[2]),
    genApply   (selectedRules[2]),
    genReverse (selectedRules[2]),

    // 4th rule: one bonus question (randomly one of the three types)
    pick([genIdentify, genApply, genReverse])(selectedRules[3]),
  ];

  document.getElementById('qCard').style.display    = '';
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('checkBtn').className     = 'check-btn';
  document.getElementById('checkBtn').textContent   = 'Check';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('resultsWrap').className  = 'results-wrap';
  document.getElementById('scoreDisp').textContent  = 0;
  document.getElementById('qNum').textContent       = 1;
  document.getElementById('pFill').style.width      = '0%';

  renderQuestion(questions[0]);
}

document.getElementById('checkBtn').addEventListener('click', checkAnswer);
initQuiz();
</script>
