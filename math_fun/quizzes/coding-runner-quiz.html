  <style>

    .btn-retry{background:var(--blue);color:#fff;font-family:inherit;font-size:0.95rem;font-weight:800;padding:14px 36px;border:none;border-radius:999px;cursor:pointer;transition:background .15s;display:block;width:100%;margin-bottom:10px}

<script>
// ── Canvas / shapes ────────────────────────────────────────────────────────────
const COLORS_MAP = {red:'#e74c3c',blue:'#4a90d9',green:'#27ae60',yellow:'#f1c40f',
  purple:'#9b59b6',orange:'#e67e22',pink:'#e91e8c',teal:'#1abc9c'};
const ALL_COLORS = ['red','blue','green','yellow','purple','orange'];
const EXT_COLORS = ['red','blue','green','yellow','purple','orange','pink','teal'];

function rrect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawShape(ctx, shape, colorName, x, y, sc=1) {
  ctx.save();
  ctx.fillStyle = COLORS_MAP[colorName] || '#ccc';
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.8;
  const r = 42 * sc;
  ctx.beginPath();
  if (shape==='circle') {
    ctx.arc(x, y, r, 0, Math.PI*2);
  } else if (shape==='square') {
    rrect(ctx, x-r*.9, y-r*.9, r*1.8, r*1.8, 7*sc);
  } else if (shape==='triangle') {
    ctx.moveTo(x, y-r);
    ctx.lineTo(x+r*.95, y+r*.72);
    ctx.lineTo(x-r*.95, y+r*.72);
    ctx.closePath();
  } else if (shape==='rectangle') {
    rrect(ctx, x-r*1.25, y-r*.58, r*2.5, r*1.16, 7*sc);
  } else if (shape==='hexagon') {
    for (let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;ctx.lineTo===ctx.lineTo&&(i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a)));}
    ctx.closePath();
  } else if (shape==='star') {
    for (let i=0;i<10;i++){const ri=i%2===0?r:r*.42;const a=(Math.PI/5)*i-Math.PI/2;i===0?ctx.moveTo(x+ri*Math.cos(a),y+ri*Math.sin(a)):ctx.lineTo(x+ri*Math.cos(a),y+ri*Math.sin(a));}
    ctx.closePath();
  }
  ctx.fill();ctx.stroke();ctx.restore();
}

// shape layout based on count
function layout(n) {
  const W=340,H=185;
  if(n<=0)return[];
  if(n===1)return[{x:170,y:92,s:1}];
  if(n===2)return[{x:100,y:92,s:1},{x:240,y:92,s:1}];
  if(n===3)return[{x:68,y:92,s:1},{x:170,y:92,s:1},{x:272,y:92,s:1}];
  if(n===4)return[{x:88,y:60,s:.78},{x:252,y:60,s:.78},{x:88,y:136,s:.78},{x:252,y:136,s:.78}];
  return[{x:58,y:55,s:.7},{x:170,y:55,s:.7},{x:282,y:55,s:.7},{x:114,y:138,s:.7},{x:226,y:138,s:.7}];
}

function renderCanvas(cv, shapes) {
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(180,192,215,0.3)';
  for(let x=22;x<W;x+=32)for(let y=22;y<H;y+=32)ctx.fillRect(x,y,1.5,1.5);
  const pts=layout(shapes.length);
  shapes.forEach((s,i)=>drawShape(ctx,s.shape,s.color,pts[i].x,pts[i].y,pts[i].s));
}

// ── Program execution ──────────────────────────────────────────────────────────
// cmd.t = 'draw' | 'set'
// draw: { t:'draw', shape, arg }  arg = color string | variable name | null (blank)
// set:  { t:'set', name, val }   val = color string | null (blank)

function execProgram(cmds, values) {
  const vars={}, shapes=[];
  cmds.forEach((cmd,i)=>{
    const v = values[i]!==undefined ? values[i] : null;
    if(cmd.t==='set'){
      const val = cmd.val!==null ? cmd.val : v;
      if(val) vars[cmd.name]=val;
    } else if(cmd.t==='draw'){
      const arg = cmd.arg!==null ? cmd.arg : v;
      if(!arg) return;
      const color = COLORS_MAP[arg] ? arg : (vars[arg]||null);
      if(color) shapes.push({shape:cmd.shape, color});
    }
  });
  return shapes;
}

function mkT(shapes, color){ return shapes.map(s=>({shape:s,color})); }

// ── Question pools ─────────────────────────────────────────────────────────────
// type: 'multi-fill' | 'var-set' | 'var-use'
// correctBlanks: {cmdIdx: value} — if set, validates exact values (var-use)
// targetShapes: [{shape,color}]  — canvas must match this

const EASY_POOL = [
  {type:'multi-fill',title:"Make all shapes the same color.",
   task:"Make all the shapes <b>yellow</b>.",
   cmds:[{t:'draw',shape:'circle',arg:null},{t:'draw',shape:'hexagon',arg:null},{t:'draw',shape:'triangle',arg:null}],
   targetShapes:mkT(['circle','hexagon','triangle'],'yellow'),
   tiles:{colors:ALL_COLORS},
   why:[`All three <code>draw</code> commands need the same color`,`Select <span>"yellow"</span> from each dropdown`,`Watch the canvas update live as you pick!`]},

  {type:'multi-fill',title:"Make all shapes the same color.",
   task:"Make all the shapes <b>red</b>.",
   cmds:[{t:'draw',shape:'circle',arg:null},{t:'draw',shape:'square',arg:null},{t:'draw',shape:'rectangle',arg:null}],
   targetShapes:mkT(['circle','square','rectangle'],'red'),
   tiles:{colors:ALL_COLORS},
   why:[`Each <code>draw</code> command needs <span>"red"</span> as its color`]},

  {type:'multi-fill',title:"Match the other shapes.",

// ── State ──────────────────────────────────────────────────────────────────────
let currentLevel='easy',questions=[],qIdx=0,score=0;
let isLocked=false,isContinue=false;
let cmdValues={};   // {cmdIdx: selectedValue}
let openDDKey=null;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

// ── Dropdown ───────────────────────────────────────────────────────────────────
document.addEventListener('click',()=>closeAllDDs());

function closeAllDDs(){
  document.querySelectorAll('.dd-panel.open').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.cmd-sel-btn.open').forEach(el=>el.classList.remove('open'));
  openDDKey=null;
}

function toggleDD(e,key){
  e.stopPropagation();if(isLocked)return;
  const panel=document.getElementById('ddp_'+key);
  const btn  =document.getElementById('ddb_'+key);
  if(!panel||!btn)return;
  if(openDDKey===key){panel.classList.remove('open');btn.classList.remove('open');openDDKey=null;}
  else{closeAllDDs();panel.classList.add('open');btn.classList.add('open');openDDKey=key;}
}

function onOpt(e,key,value){
  e.stopPropagation();if(isLocked)return;
  closeAllDDs();
  const ci=parseInt(key);
  cmdValues[ci]=value;
  refreshBtn(ci,value);
  markOpt(ci,value);
  liveUpdate();
}

function refreshBtn(ci,value){
  const btn=document.getElementById('ddb_'+ci);if(!btn)return;
  let cls='cmd-sel-btn',inner='';
  if(value){
    if(COLORS_MAP[value]){
      inner=`<span class="sel-swatch" style="background:${COLORS_MAP[value]}"></span>"${value}"<span class="dd-arr">▾</span>`;
      cls+=' val-color';
    } else {
      inner=`<span style="font-style:italic;margin-right:2px">x</span>${value}<span class="dd-arr">▾</span>`;
      cls+=' val-var';
    }
  } else {
    inner=`<span class="sel-ph">?</span><span class="dd-arr">▾</span>`;
  }
  btn.className=cls;btn.innerHTML=inner;
}

function markOpt(ci,value){
  const panel=document.getElementById('ddp_'+ci);if(!panel)return;
  panel.querySelectorAll('.dd-opt').forEach(o=>o.classList.toggle('sel',o.dataset.val===value));
}

// ── Live update ────────────────────────────────────────────────────────────────
function liveUpdate(){
  const q=questions[qIdx];
  const shapes=execProgram(q.cmds,cmdValues);
  const cv=document.getElementById('codeCanvas');
  if(cv){
    renderCanvas(cv,shapes);
    const em=document.getElementById('canvasEmpty');
    if(em)em.style.display=shapes.length===0?'block':'none';
  }
  updateCheckBtn();
}

// ── Quiz flow ──────────────────────────────────────────────────────────────────
function setLevel(lvl){
  currentLevel=lvl;
  document.getElementById('btnEasy').className='level-btn'+(lvl==='easy'?' active-easy':'');
  document.getElementById('btnHard').className='level-btn'+(lvl==='hard'?' active-hard':'');
  initQuiz();
}
function switchLevel(){setLevel(currentLevel==='easy'?'hard':'easy');}

function initQuiz(){
  const pool=currentLevel==='easy'?EASY_POOL:HARD_POOL;
  questions=shuffle(pool).slice(0,10);
  qIdx=0;score=0;
  document.getElementById('resultsWrap').style.display='none';
  document.getElementById('resultsWrap').classList.remove('show');
  document.getElementById('qCard').style.display='';
  document.getElementById('checkBtn').style.display='';
  document.getElementById('feedbackBar').classList.remove('show');
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  document.getElementById('scoreDisp').textContent='0';
  renderQ();
}

function renderQ(){
  const q=questions[qIdx];
  isLocked=false;isContinue=false;openDDKey=null;
  cmdValues={};
  document.getElementById('qNum').textContent=qIdx+1;
  document.getElementById('pFill').style.width=(qIdx/10*100)+'%';
  document.getElementById('feedbackBar').classList.remove('show');
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  const cb=document.getElementById('checkBtn');cb.className='check-btn';cb.textContent='Check';
  document.getElementById('qCard').innerHTML=buildCard(q);
  // Draw initial state (fixed args only)
  liveUpdate();
}

// ── Card HTML ─────────────────────────────────────────────────────────────────
function buildCard(q){
  let h=`<div class="q-title">${q.title}</div>`;
  h+=`<div class="q-task">${q.task}</div>`;
  h+=`<div class="canvas-wrap">
    <canvas id="codeCanvas" class="code-canvas" width="340" height="185"></canvas>
    <span id="canvasEmpty" class="canvas-empty-msg">Fill in the dropdowns to see shapes appear</span>
  </div>`;
  h+=buildCodeBlock(q);
  return h;
}

function buildCodeBlock(q){
  let h='<div class="code-block">';
  q.cmds.forEach((cmd,i)=>{
    h+=`<div class="cmd-line"><span class="ln">${i+1}</span>`;
    if(cmd.t==='set'){
      h+=`<span class="kw-set">set</span> <span class="var-name-tok">${cmd.name}</span> <span class="kw-to">to</span> `;
      if(cmd.val!==null){
        h+=`<span class="color-tok">"${cmd.val}"</span>`;
      } else {
        h+=selWidget(i, q.tiles, 'set');
      }
    } else {
      h+=`<span class="kw-draw">draw</span> <span class="shape-tok">${cmd.shape}</span> <span class="pal">🎨</span> `;
      if(cmd.arg!==null){
        // fixed arg — color string or variable reference
        if(COLORS_MAP[cmd.arg]){
          h+=`<span class="color-tok">"${cmd.arg}"</span>`;
        } else {
          h+=`<span class="var-ref-tok">${cmd.arg}</span>`;
        }
      } else {
        h+=selWidget(i, q.tiles, 'draw');
      }
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function selWidget(ci, tiles, cmdType){
  let opts='';
  // For draw blanks: show variable options first if available
  if(cmdType==='draw' && tiles.vars && tiles.vars.length>0){
    tiles.vars.forEach(v=>{
      opts+=`<div class="dd-opt var-dd-opt" data-val="${v}" onclick="onOpt(event,'${ci}','${v}')">
        <span class="opt-ico" style="font-style:italic;color:#c084fc">x</span>${v}
      </div>`;
    });
    if(tiles.colors && tiles.colors.length>0) opts+='<div class="dd-divider"></div>';
  }
  // Color options
  (tiles.colors||[]).forEach(c=>{
    opts+=`<div class="dd-opt" data-val="${c}" onclick="onOpt(event,'${ci}','${c}')">
      <span class="opt-swatch" style="background:${COLORS_MAP[c]}"></span>"${c}"
    </div>`;
  });
  return `<div class="cmd-sel" onclick="event.stopPropagation()">
    <button class="cmd-sel-btn" id="ddb_${ci}" onclick="toggleDD(event,'${ci}')">
      <span class="sel-ph">?</span><span class="dd-arr">▾</span>
    </button>
    <div class="dd-panel" id="ddp_${ci}">${opts}</div>
  </div>`;
}

// ── Check ready ────────────────────────────────────────────────────────────────
function updateCheckBtn(){
  if(isContinue)return;
  const q=questions[qIdx];
  const blanksCount=q.cmds.filter((cmd,i)=>(cmd.t==='set'&&cmd.val===null)||(cmd.t==='draw'&&cmd.arg===null)).length;
  const filled=Object.keys(cmdValues).length;
  document.getElementById('checkBtn').className='check-btn'+(filled>=blanksCount?' ready':'');
}

// ── Check ─────────────────────────────────────────────────────────────────────
function handleBtn(){isContinue?advanceQ():checkAnswer();}

function checkAnswer(){
  const q=questions[qIdx];isLocked=true;
  let correct=false;

  if(q.correctBlanks){
    // var-use: must use specific variable names
    correct=Object.entries(q.correctBlanks).every(([ci,exp])=>cmdValues[ci]===exp);
  } else {
    // compare canvas output to targetShapes
    const shapes=execProgram(q.cmds,cmdValues);
    correct=shapes.length===q.targetShapes.length &&
      shapes.every((s,i)=>s.shape===q.targetShapes[i].shape&&s.color===q.targetShapes[i].color);
  }

  if(correct)score++;
  document.getElementById('scoreDisp').textContent=score;

  // Mark blank buttons correct/wrong
  q.cmds.forEach((cmd,i)=>{
    const isBlank=(cmd.t==='set'&&cmd.val===null)||(cmd.t==='draw'&&cmd.arg===null);
    if(!isBlank)return;
    const btn=document.getElementById('ddb_'+i);if(!btn)return;
    let ok;
    if(q.correctBlanks){
      ok=cmdValues[i]===q.correctBlanks[i];
    } else {
      // Check if this blank's value leads to correct output
      // Simplify: mark correct if overall is correct
      ok=correct;
    }
    btn.classList.remove('val-color','val-var','open');
    btn.classList.add(ok?'correct-f':'wrong-f');
  });

  const fb=document.getElementById('feedbackBar');
  const fi=document.getElementById('fbIcon'),ft=document.getElementById('fbTitle'),fh=document.getElementById('fbHint');
  if(correct){
    fb.className='feedback-bar ok show';fi.textContent='✅';
    ft.className='fb-title ok';ft.textContent='Correct!';
    fh.textContent='Your program produces the right output!';
  } else {
    fb.className='feedback-bar err show';fi.textContent='❌';
    ft.className='fb-title err';ft.textContent='Not quite!';
    if(q.correctBlanks){
      const vars=Object.values(q.correctBlanks);
      fh.innerHTML=`Use the variable name <code>${[...new Set(vars)].join(', ')}</code> — not a direct color`;
    } else {
      const hint=q.targetShapes.map(s=>`<code>draw ${s.shape} "${s.color}"</code>`).join(', ');
      fh.innerHTML='Expected: '+hint;
    }
  }
  document.getElementById('whyBtn').classList.add('show');
  isContinue=true;
  const cb=document.getElementById('checkBtn');
  cb.className='check-btn continue';
  cb.textContent=qIdx>=9?'See Results →':'Continue →';
}

function toggleWhy(){
  const p=document.getElementById('whyPanel'),b=document.getElementById('whyBtn');
  if(!p.classList.contains('show')){
    document.getElementById('whySteps').innerHTML=questions[qIdx].why.map(s=>`<li>${s}</li>`).join('');
    p.classList.add('show');b.classList.add('active');
  }else{p.classList.remove('show');b.classList.remove('active');}
}

function advanceQ(){
  if(qIdx>=9){showResults();return;}
  qIdx++;
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  renderQ();
}

function showResults(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('feedbackBar').classList.remove('show');
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('pFill').style.width='100%';
  const rw=document.getElementById('resultsWrap');rw.style.display='block';rw.classList.add('show');
  document.getElementById('resScore').textContent=score+'/10';
  document.getElementById('resLevel').textContent=currentLevel==='easy'?'Easy Level':'Hard Level';
  const msgs=[[9,"Amazing! You're a coding star — your programs always run correctly!"],[7,"Great work! You understand how programs produce output."],[5,"Good effort! Variables and colors are tricky — keep practicing."],[0,"Keep trying — programming takes practice. You've got this!"]];
  const m=msgs.find(([min])=>score>=min);
  document.getElementById('resMsg').textContent=m[1];
  document.getElementById('resEmoji').textContent=score>=9?'🏆':score>=7?'🎉':score>=5?'👍':'💪';
  document.getElementById('btnSwitch').textContent=currentLevel==='easy'?'Try Hard Level →':'Try Easy Level →';
}
