    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

<script>
const shuffle = a => [...a].sort(() => Math.random() - .5);
const fmt     = v => Number.isInteger(v) ? String(v) : v.toFixed(1).replace(/\.0$/,'');

/* ═══════════════════════════════════════════════════════
   CATMULL-ROM SPLINE
═══════════════════════════════════════════════════════ */
function crPoint(pts, t) {
  const n=pts.length;
  const i=Math.max(0,Math.min(n-2,Math.floor(t))), u=t-i;
  const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(n-1,i+2)];
  const t2=u*u,t3=t2*u;
  const h1=2*t3-3*t2+1,h2=t3-2*t2+u,h3=-2*t3+3*t2,h4=t3-t2;
  const mx1=(p2[0]-p0[0])/2,my1=(p2[1]-p0[1])/2;
  const mx2=(p3[0]-p1[0])/2,my2=(p3[1]-p1[1])/2;
  return {x:h1*p1[0]+h2*mx1+h3*p2[0]+h4*mx2, y:h1*p1[1]+h2*my1+h3*p2[1]+h4*my2};
}
function crPath(pts, sx, sy, S=150) {
  const n=pts.length, pp=[];
  for(let s=0;s<=S;s++){const p=crPoint(pts,s/S*(n-1));pp.push(`${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`);}
  return 'M '+pp.join(' L ');
}

/* ═══════════════════════════════════════════════════════
   GRAPH LAYOUT
═══════════════════════════════════════════════════════ */
const PL=38,PB=28,PT=16,PR=18;
function gSize(xR,yR){
  const xs=xR[1]-xR[0],ys=yR[1]-yR[0];
  const CW=Math.min(34,Math.floor((320-PL-PR)/xs));
  const CH=Math.min(26,Math.floor((248-PT-PB)/ys));
  return{CW,CH,W:PL+xs*CW+PR,H:PT+ys*CH+PB};
}
function gCoords(xMin,yMax,CW,CH){return{sx:x=>PL+(x-xMin)*CW, sy:y=>PT+(yMax-y)*CH};}

/* ═══════════════════════════════════════════════════════
   BUILD SVG
   opts: { guideLine: number, dots: [{x,y,state}] }
   guideLine — dashed horizontal line at that y-value
   dots       — teal/green/red circles at given coordinates
═══════════════════════════════════════════════════════ */
function buildSvg(curve, opts={}) {
  const{guideLine=null,dots=[]}=opts;
  const{CW,CH,W,H}=gSize(curve.xR,curve.yR);
  const{sx,sy}=gCoords(curve.xR[0],curve.yR[1],CW,CH);
  const[xMin,xMax]=curve.xR,[yMin,yMax]=curve.yR;
  const ac='rgba(255,255,255,0.5)';
  const cid='cl'+Math.random().toString(36).slice(2,7);

  // Grid lines
  let g='';
  for(let y=Math.ceil(yMin);y<=Math.floor(yMax);y++)
    g+=`<line x1="${PL}" y1="${sy(y).toFixed(1)}" x2="${(W-PR).toFixed(1)}" y2="${sy(y).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
  for(let x=Math.ceil(xMin);x<=Math.floor(xMax);x++)
    g+=`<line x1="${sx(x).toFixed(1)}" y1="${PT}" x2="${sx(x).toFixed(1)}" y2="${(H-PB).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;

  // Dashed guide line at yVal
  let guideEl='';
  if(guideLine!==null&&guideLine>=yMin&&guideLine<=yMax){
    const gy=sy(guideLine).toFixed(1);
    guideEl=`<line x1="${PL}" y1="${gy}" x2="${(W-PR).toFixed(1)}" y2="${gy}" stroke="rgba(75,197,165,.5)" stroke-width="1.5" stroke-dasharray="6,4"/>`;
  }

  // Axes
  const oyN=sy(0),oxN=sx(0);
  const yAx=(oyN>=PT&&oyN<=H-PB)?`<line x1="${PL}" y1="${oyN.toFixed(1)}" x2="${(W-PR+8).toFixed(1)}" y2="${oyN.toFixed(1)}" stroke="${ac}" stroke-width="2" marker-end="url(#ax${cid})"/>`:'';
  const xAx=(oxN>=PL&&oxN<=W-PR)?`<line x1="${oxN.toFixed(1)}" y1="${(H-PB+8).toFixed(1)}" x2="${oxN.toFixed(1)}" y2="${PT}" stroke="${ac}" stroke-width="1.8" marker-end="url(#ax${cid})"/>`:'';

  // Axis labels
  let lbl='';
  for(let y=Math.ceil(yMin);y<=Math.floor(yMax);y++){
    if(y===0)continue;
    lbl+=`<text x="${PL-5}" y="${sy(y)+4}" text-anchor="end" fill="rgba(255,255,255,.42)" font-size="11" font-family="Nunito,sans-serif" font-weight="700">${y}</text>`;
  }
  for(let x=Math.ceil(xMin);x<=Math.floor(xMax);x++){
    if(x===0)continue;
    lbl+=`<text x="${sx(x)}" y="${H-PB+18}" text-anchor="middle" fill="rgba(255,255,255,.42)" font-size="11" font-family="Nunito,sans-serif" font-weight="700">${x}</text>`;
  }
  lbl+=`<text x="${oxN+6}" y="${PT+13}" font-size="12" font-weight="900" fill="rgba(255,255,255,.55)" font-family="Nunito,sans-serif" font-style="italic">y</text>`;
  lbl+=`<text x="${W-PR+7}" y="${oyN+5}" font-size="12" font-weight="900" fill="rgba(255,255,255,.55)" font-family="Nunito,sans-serif" font-style="italic">x</text>`;

  // Curve (clipped)
  const pathD=crPath(curve.pts,sx,sy);
  const curveSvg=`<defs>
    <marker id="ax${cid}" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="${ac}"/></marker>
    <clipPath id="${cid}"><rect x="${PL}" y="${PT}" width="${W-PL-PR}" height="${H-PT-PB}"/></clipPath>
  </defs>
  <path d="${pathD}" fill="none" stroke="#4bc5a5" stroke-width="2.8" stroke-linejoin="round" clip-path="url(#${cid})"/>`;

  // Dots at selected/answered coordinates
  let dotsSvg='';
  for(const d of dots){
    if(d.x<xMin||d.x>xMax||d.y<yMin||d.y>yMax)continue;
    const dx=sx(d.x).toFixed(1),dy=sy(d.y).toFixed(1);
    const col=d.state==='correct'?'#58cc02':d.state==='wrong'?'#ff4b4b':'rgba(75,197,165,0.9)';
    const strk=d.state==='pending'?'rgba(255,255,255,.5)':'rgba(255,255,255,.85)';
    dotsSvg+=`<circle cx="${dx}" cy="${dy}" r="7" fill="${col}" stroke="${strk}" stroke-width="2" clip-path="url(#${cid})"/>`;
    if(d.state==='correct')
      dotsSvg+=`<text x="${dx}" y="${(parseFloat(dy)-12).toFixed(1)}" text-anchor="middle" font-size="12" fill="#88e04a" clip-path="url(#${cid})">&#10003;</text>`;
  }

  return `<svg class="coord-svg" width="${W}" height="${H}">
    ${g}${guideEl}${yAx}${xAx}${lbl}${curveSvg}${dotsSvg}
  </svg>`;
}

/* ═══════════════════════════════════════════════════════
   CURVE POOL
   Each curve has two control points at the target yVal,
   so Catmull-Rom passes exactly through both answer points.
   answers = [x1, x2] sorted ascending.
═══════════════════════════════════════════════════════ */
const EASY_CURVES = [
  { pts:[[-4,-5],[-3,0],[-2,3],[-1,4],[0,3],[1,0],[2,-5]],  xR:[-5,3], yR:[-6,5],  yVal:0,  answers:[-3,1]  },
  { pts:[[-3,-4],[-2,1],[-1,4],[0,5],[1,4],[2,1],[3,-4]],   xR:[-4,4], yR:[-5,6],  yVal:1,  answers:[-2,2]  },
  { pts:[[-2,-5],[-1,0],[0,3],[1,4],[2,3],[3,0],[4,-5]],    xR:[-3,5], yR:[-6,5],  yVal:0,  answers:[-1,3]  },
  { pts:[[-5,-4],[-4,1],[-3,4],[-2,5],[-1,4],[0,1],[1,-4]], xR:[-6,2], yR:[-5,6],  yVal:1,  answers:[-4,0]  },
  { pts:[[-1,-5],[0,-1],[1,2],[2,3],[3,2],[4,-1],[5,-5]],   xR:[-2,6], yR:[-6,4],  yVal:-1, answers:[0,4]   },
  { pts:[[-3,6],[-2,1],[-1,-2],[0,-3],[1,-2],[2,1],[3,6]],  xR:[-4,4], yR:[-4,7],  yVal:1,  answers:[-2,2]  },
  { pts:[[-2,5],[-1,0],[0,-3],[1,-4],[2,-3],[3,0],[4,5]],   xR:[-3,5], yR:[-5,6],  yVal:0,  answers:[-1,3]  },
  { pts:[[-4,6],[-3,1],[-2,-2],[-1,-3],[0,-2],[1,1],[2,6]], xR:[-5,3], yR:[-4,7],  yVal:1,  answers:[-3,1]  },
  { pts:[[-1,7],[0,2],[1,-1],[2,-2],[3,-1],[4,2],[5,7]],    xR:[-2,6], yR:[-3,8],  yVal:2,  answers:[0,4]   },
  { pts:[[-5,5],[-4,0],[-3,-3],[-2,-4],[-1,-3],[0,0],[1,5]],xR:[-6,2], yR:[-5,6],  yVal:0,  answers:[-4,0]  },
];

const HARD_CURVES = [
  { pts:[[-4,-4],[-3,0],[-2,3.5],[-0.5,4.5],[1,3.5],[2,0],[3,-4]],      xR:[-5,4], yR:[-5,5.5],  yVal:0,   answers:[-3,2]  },
  { pts:[[-3,-3],[-2,1.5],[-1,4.5],[0.5,5.5],[2,4.5],[3,1.5],[4,-3]],   xR:[-4,5], yR:[-4,6.5],  yVal:1.5, answers:[-2,3]  },
  { pts:[[-2,-4],[-1,-0.5],[0,2.5],[1.5,3.5],[3,2.5],[4,-0.5],[5,-4]],  xR:[-3,6], yR:[-5,4.5],  yVal:-0.5,answers:[-1,4]  },
  { pts:[[-5,-3],[-4,0.5],[-3,3],[-1.5,4],[0,3],[1,0.5],[2,-3]],        xR:[-6,3], yR:[-4,5],    yVal:0.5, answers:[-4,1]  },
  { pts:[[-3,4.5],[-2,0.5],[-1,-2],[0.5,-3.5],[2,-2],[3,0.5],[4,4.5]],  xR:[-4,5], yR:[-4.5,5.5],yVal:0.5, answers:[-2,3]  },
  { pts:[[-2,4.5],[-1,-0.5],[0,-3],[1.5,-4.5],[3,-3],[4,-0.5],[5,4.5]], xR:[-3,6], yR:[-5.5,5.5],yVal:-0.5,answers:[-1,4]  },
  { pts:[[-5,5.5],[-4,1],[-3,-1.5],[-1.5,-3],[0,-1.5],[1,1],[2,5.5]],  xR:[-6,3], yR:[-4,6.5],  yVal:1,   answers:[-4,1]  },
  { pts:[[-1,6.5],[0,1.5],[1,-1],[2.5,-2.5],[4,-1],[5,1.5],[6,6.5]],   xR:[-2,7], yR:[-3.5,7.5], yVal:1.5, answers:[0,5]   },
  { pts:[[0,-3],[1,1],[2,4],[3,5],[4,4],[5,1],[6,-3]],                  xR:[-1,7], yR:[-4,6],    yVal:1,   answers:[1,5]   },
  { pts:[[-6,5],[-5,0.5],[-4,-2],[-3,-3.5],[-2,-2],[-1,0.5],[0,5]],    xR:[-7,1], yR:[-4.5,6],  yVal:0.5, answers:[-5,-1] },
];

/* ═══════════════════════════════════════════════════════
   QUESTION BUILDER
═══════════════════════════════════════════════════════ */
function makeQuestions(curves) {
  return shuffle(curves).slice(0,10).map(c => {
    // Integer x-tiles spanning the curve's inner x-range
    const xVals = c.pts.map(p=>p[0]);
    const xMin  = Math.ceil(Math.min(...xVals)+1);
    const xMax  = Math.floor(Math.max(...xVals)-1);
    const tiles = [];
    for(let x=xMin;x<=xMax;x++) tiles.push(x);
    // Ensure answer x-values are always present
    c.answers.forEach(a=>{ if(!tiles.includes(a)) tiles.push(a); });
    tiles.sort((a,b)=>a-b);

    const yStr = fmt(c.yVal);
    return {
      curve:   c,
      yVal:    c.yVal,
      answers: [...c.answers].sort((a,b)=>a-b),
      tiles,
      questionText:`Plot two points on this curve with a <strong>y&#8209;coordinate of ${yStr}</strong>.`,
      hint:`Find where the dashed line y&#8198;=&#8198;${yStr} crosses the curve — those are the two points.`,
      why:[
        `Draw a horizontal line at <span>y = ${yStr}</span> (shown dashed)`,
        `Find the <span>two intersections</span> between the dashed line and the curve`,
        `Read the x&#8209;coordinate of the <span>left intersection: x = ${c.answers[0]}</span>`,
        `Answer: <span>(${c.answers[0]},&#8194;${yStr})</span> and <span>(${c.answers[1]},&#8194;${yStr})</span>`,
      ],
    };
  });
}

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let currentLevel='easy';
let questions=[],qIdx=0,isAnswered=false,isLocked=false,score=0,whyOpen=false;
let selSlots=[null,null],activeSlot=0;

function getCurves(){ return currentLevel==='easy'?EASY_CURVES:HARD_CURVES; }

function setLevel(lvl){
  currentLevel=lvl;
  document.getElementById('btnEasy').className='level-btn'+(lvl==='easy'?' active-easy':'');
  document.getElementById('btnHard').className='level-btn'+(lvl==='hard'?' active-hard':'');
  initQuiz();
}
function switchLevel(){ setLevel(currentLevel==='easy'?'hard':'easy'); }

/* ═══════════════════════════════════════════════════════
   RENDER CARD
═══════════════════════════════════════════════════════ */
function renderCard(q) {
  const svgStr   = buildSvg(q.curve, {guideLine:q.yVal});
  const yStr     = fmt(q.yVal);
  const tilesHTML = q.tiles.map(v =>
    `<button class="tile-btn" data-v="${v}" onclick="selectTile(${v})">${fmt(v)}</button>`
  ).join('');

  document.getElementById('qCard').innerHTML=`
    <p class="q-text">${q.questionText}</p>
    <div class="graph-wrap" id="graphWrap">${svgStr}</div>
    <div class="slots-wrap" id="slotsWrap">
      <div class="slot-row active-row" id="slotRow0" onclick="activateSlot(0)">
        <span class="paren">(</span>
        <span class="slot-box active" id="slot0">?</span>
        <span class="comma">,</span>
        <span class="y-fixed">${yStr}</span>
        <span class="paren">)</span>
      </div>
      <div class="slot-row" id="slotRow1" onclick="activateSlot(1)">
        <span class="paren">(</span>
        <span class="slot-box" id="slot1">?</span>
        <span class="comma">,</span>
        <span class="y-fixed">${yStr}</span>
        <span class="paren">)</span>
      </div>
    </div>
    <div class="tiles-row" id="tilesRow">${tilesHTML}</div>
    <div class="start-over-row">
      <button class="start-over-btn" onclick="resetAnswer()">&#8635; Start over</button>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   SLOT + TILE INTERACTION
═══════════════════════════════════════════════════════ */
function activateSlot(idx) {
  if(isLocked) return;
  activeSlot=idx;
  updateSlotStyles();
}

function selectTile(v) {
  if(isLocked) return;
  selSlots[activeSlot]=v;
  // auto-advance to next empty slot
  if(activeSlot===0 && selSlots[1]===null) activeSlot=1;
  else if(activeSlot===1 && selSlots[0]===null) activeSlot=0;
  updateSlotStyles();
  redrawGraphDots();
  updateCheckBtn();
}

function updateSlotStyles() {
  for(let i=0;i<2;i++){
    const box=document.getElementById('slot'+i);
    const row=document.getElementById('slotRow'+i);
    if(!box||!row) continue;
    const v=selSlots[i], isActive=activeSlot===i;
    box.textContent = v!==null ? fmt(v) : '?';
    box.className   = 'slot-box ' + (v!==null ? 'filled' : isActive ? 'active' : '');
    row.className   = 'slot-row ' + (isActive ? 'active-row' : '');
  }
  document.querySelectorAll('.tile-btn').forEach(b=>{
    const bv=+b.dataset.v;
    b.classList.remove('sel0','sel1');
    if(selSlots[0]===bv) b.classList.add('sel0');
    if(selSlots[1]===bv) b.classList.add('sel1');
  });
}

function redrawGraphDots(dotState='pending') {
  const q=questions[qIdx];
  const dots=[];
  for(let i=0;i<2;i++){
    if(selSlots[i]!==null) dots.push({x:selSlots[i],y:q.yVal,state:dotState});
  }
  document.getElementById('graphWrap').innerHTML=buildSvg(q.curve,{guideLine:q.yVal,dots});
}

function updateCheckBtn() {
  const ready=selSlots[0]!==null && selSlots[1]!==null;
  document.getElementById('checkBtn').className='check-btn'+(ready?' ready':'');
}

function resetAnswer() {
  if(isLocked) return;
  selSlots=[null,null]; activeSlot=0;
  updateSlotStyles();
  redrawGraphDots();
  updateCheckBtn();
}

/* ═══════════════════════════════════════════════════════
   CHECK ANSWER
═══════════════════════════════════════════════════════ */
function checkAnswer() {
  if(isAnswered){ advanceQ(); return; }
  if(selSlots[0]===null||selSlots[1]===null) return;

  const q=questions[qIdx];
  const userSorted=[...selSlots].sort((a,b)=>a-b);
  const correct=userSorted[0]===q.answers[0] && userSorted[1]===q.answers[1];

  isAnswered=isLocked=true;

  // Redraw graph with colored dots
  const dotState=correct?'correct':'wrong';
  const dots=selSlots.filter(v=>v!==null).map(v=>({x:v,y:q.yVal,state:dotState}));
  document.getElementById('graphWrap').innerHTML=buildSvg(q.curve,{guideLine:q.yVal,dots});

  if(correct){
    score++;
    document.getElementById('scoreDisp').textContent=score;
    for(let i=0;i<2;i++){
      const b=document.getElementById('slot'+i);
      if(b) b.className='slot-box correct-f';
      const r=document.getElementById('slotRow'+i);
      if(r) r.className='slot-row';
    }
    document.querySelectorAll('.tile-btn').forEach(b=>{
      const bv=+b.dataset.v;
      if(selSlots.includes(bv)) b.classList.add('correct');
      b.classList.add('locked');
    });
    showFeedback(true,'Correct!',q.hint);
    document.getElementById('checkBtn').textContent=qIdx<questions.length-1?'Continue →':'See Results →';
    document.getElementById('checkBtn').className='check-btn continue';
    document.getElementById('whyBtn').classList.add('show');
    document.getElementById('pFill').style.width=`${(qIdx+1)/questions.length*100}%`;

  } else {
    for(let i=0;i<2;i++){
      const b=document.getElementById('slot'+i);
      if(b) b.className='slot-box wrong-f';
    }
    document.querySelectorAll('.tile-btn').forEach(b=>{
      if(selSlots.includes(+b.dataset.v)) b.classList.add('wrong');
    });
    showFeedback(false,'Not quite!',q.hint);

    setTimeout(()=>{
      isAnswered=isLocked=false;
      for(let i=0;i<2;i++){
        const b=document.getElementById('slot'+i);
        if(b) b.className='slot-box'+(selSlots[i]!==null?' filled':activeSlot===i?' active':'');
        const r=document.getElementById('slotRow'+i);
        if(r) r.className='slot-row'+(activeSlot===i?' active-row':'');
      }
      document.querySelectorAll('.tile-btn').forEach(b=>b.classList.remove('wrong','locked'));
      redrawGraphDots('pending');
      hideFeedback();
    },1600);
  }
}

function advanceQ(){
  qIdx++;
  if(qIdx>=questions.length){ showResults(); return; }
  document.getElementById('qNum').textContent=qIdx+1;
  whyOpen=false;
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('whyBtn').className='why-btn';
  selSlots=[null,null]; activeSlot=0;
  renderCard(questions[qIdx]);
  hideFeedback();
  document.getElementById('checkBtn').textContent='Check';
  document.getElementById('checkBtn').className='check-btn';
}

/* ═══════════════════════════════════════════════════════
   FEEDBACK + WHY
═══════════════════════════════════════════════════════ */
function showFeedback(ok,title,hint){
  const bar=document.getElementById('feedbackBar');
  document.getElementById('fbIcon').textContent=ok?'✅':'❌';
  const t=document.getElementById('fbTitle');
  t.textContent=title; t.className='fb-title '+(ok?'ok':'err');
  document.getElementById('fbHint').innerHTML=hint||'';
  bar.className='feedback-bar show '+(ok?'ok':'err');
}
function hideFeedback(){ document.getElementById('feedbackBar').className='feedback-bar'; }

function toggleWhy(){
  const q=questions[qIdx];
  whyOpen=!whyOpen;
  document.getElementById('whyPanel').className='why-panel'+(whyOpen?' show':'');
  document.getElementById('whyBtn').className='why-btn show'+(whyOpen?' active':'');
  if(whyOpen) document.getElementById('whySteps').innerHTML=q.why.map(s=>`<li>${s}</li>`).join('');
}

/* ═══════════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════════ */
function showResults(){
  document.getElementById('quizShell').style.paddingBottom='20px';
  document.getElementById('resultsWrap').className='results-wrap show';
  document.getElementById('qCard').style.display='none';
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('whyPanel').className='why-panel';
  document.querySelectorAll('.progress-wrap,.level-row,.btn-row').forEach(e=>e.style.display='none');

  const pct=score/questions.length;
  const[emoji,msg]=
    pct===1   ?['🏆','Perfect! You can read any point off a graph with ease.']
    :pct>=.7  ?['🎉','Great work! You have a solid grasp of reading graph coordinates.']
    :pct>=.5  ?['👍','Good effort! Remember — follow the dashed line to both crossings.']
              :['📚','Keep practicing! Draw the horizontal line and trace where it meets the curve.'];

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resScore').textContent=`${score}/10`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resLevel').textContent=currentLevel==='hard'?'Hard Level':'Easy Level';
  document.getElementById('btnSwitch').textContent=
    currentLevel==='easy'?'Try Hard Level →':'Try Easy Level →';
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
function initQuiz(){
  questions=makeQuestions(getCurves());
  qIdx=0; score=0; isAnswered=false; isLocked=false; whyOpen=false;
  selSlots=[null,null]; activeSlot=0;

  document.getElementById('scoreDisp').textContent=0;
  document.getElementById('qNum').textContent=1;
  document.getElementById('pFill').style.width='0%';
  document.getElementById('resultsWrap').className='results-wrap';
  document.getElementById('qCard').style.display='';
  document.querySelectorAll('.progress-wrap,.level-row,.btn-row').forEach(e=>e.style.display='');
  document.getElementById('quizShell').style.paddingBottom='';
  hideFeedback();
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('checkBtn').textContent='Check';
  document.getElementById('checkBtn').className='check-btn';
  renderCard(questions[0]);
}

initQuiz();
</script>
