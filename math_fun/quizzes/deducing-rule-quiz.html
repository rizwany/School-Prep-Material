  <style>

<script>
/* ═══════════════════════════════════════════════
   SHAPE SVG GENERATORS
═══════════════════════════════════════════════ */
const CMAP = {
  blue:'#3B82F6', red:'#EF4444', green:'#22C55E',
  yellow:'#EAB308', orange:'#F97316', purple:'#A855F7',
  pink:'#EC4899', teal:'#14B8A6'
};

function nGon(n, cx, cy, r, a0 = -Math.PI / 2) {
  return Array.from({length: n}, (_, i) => {
    const a = a0 + (2 * Math.PI * i / n);
    return `${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`;
  }).join(' ');
}

function starPts(cx, cy, R, ri) {
  return Array.from({length: 10}, (_, i) => {
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const r = i % 2 === 0 ? R : ri;
    return `${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`;
  }).join(' ');
}

function makeIcon(shape, dim = 38) {
  const c = dim / 2;
  const R = dim * (shape.size === 'lg' ? 0.41 : 0.27);
  const fill   = shape.filled ? CMAP[shape.color] : 'none';
  const stroke = CMAP[shape.color];
  const sw = shape.filled ? 1.5 : 2.2;
  let body = '';
  switch (shape.type) {
    case 'circle':
      body = `<circle cx="${c}" cy="${c}" r="${R.toFixed(1)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    case 'oval':
      body = `<ellipse cx="${c}" cy="${c}" rx="${R.toFixed(1)}" ry="${(R * 0.6).toFixed(1)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    case 'square':
      body = `<rect x="${(c-R).toFixed(1)}" y="${(c-R).toFixed(1)}" width="${(R*2).toFixed(1)}" height="${(R*2).toFixed(1)}" rx="2" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    case 'triangle':
      body = `<polygon points="${nGon(3,c,c,R)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>`;
      break;
    case 'diamond':
      body = `<polygon points="${c.toFixed(1)},${(c-R).toFixed(1)} ${(c+R*0.75).toFixed(1)},${c.toFixed(1)} ${c.toFixed(1)},${(c+R).toFixed(1)} ${(c-R*0.75).toFixed(1)},${c.toFixed(1)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    case 'pentagon':
      body = `<polygon points="${nGon(5,c,c,R)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    case 'hexagon':
      body = `<polygon points="${nGon(6,c,c,R,0)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    case 'star':
      body = `<polygon points="${starPts(c,c,R,R*0.42)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>`;
      break;
    case 'heart': {
      const r = R * 0.85;
      body = `<path d="M${c},${(c+r*0.8).toFixed(1)} C${(c-r*1.4).toFixed(1)},${(c+r*0.2).toFixed(1)} ${(c-r*1.4).toFixed(1)},${(c-r*0.9).toFixed(1)} ${c},${(c-r*0.15).toFixed(1)} C${(c+r*1.4).toFixed(1)},${(c-r*0.9).toFixed(1)} ${(c+r*1.4).toFixed(1)},${(c+r*0.2).toFixed(1)} ${c},${(c+r*0.8).toFixed(1)} Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
      break;
    }
    case 'cross': {
      const a = R * 0.42, b = R;
      body = `<polygon points="${(c-a).toFixed(1)},${(c-b).toFixed(1)} ${(c+a).toFixed(1)},${(c-b).toFixed(1)} ${(c+a).toFixed(1)},${(c-a).toFixed(1)} ${(c+b).toFixed(1)},${(c-a).toFixed(1)} ${(c+b).toFixed(1)},${(c+a).toFixed(1)} ${(c+a).toFixed(1)},${(c+a).toFixed(1)} ${(c+a).toFixed(1)},${(c+b).toFixed(1)} ${(c-a).toFixed(1)},${(c+b).toFixed(1)} ${(c-a).toFixed(1)},${(c+a).toFixed(1)} ${(c-b).toFixed(1)},${(c+a).toFixed(1)} ${(c-b).toFixed(1)},${(c-a).toFixed(1)} ${(c-a).toFixed(1)},${(c-a).toFixed(1)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>`;
      break;
    }
  }
  return `<svg class="sh-icon" width="${dim}" height="${dim}" viewBox="0 0 ${dim} ${dim}" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}

/* ═══════════════════════════════════════════════
   SHAPE FACTORY
═══════════════════════════════════════════════ */
function S(type, color, size, filled) {
  const sidesMap = {circle:0,oval:0,heart:0,cross:4,triangle:3,square:4,diamond:4,pentagon:5,hexagon:6,star:10};
  const sides = sidesMap[type] || 0;
  const warm  = ['red','orange','yellow','pink'];
  const cool  = ['blue','green','purple','teal'];
  const prim  = ['red','yellow','blue'];
  return {
    type, color, size, filled, sides,
    hasCorners: sides >= 3 && type !== 'heart',
    isCurved:   sides === 0 || type === 'heart',
    isPolygon:  [3,4,5,6].includes(sides),
    isWarm:     warm.includes(color),
    isCool:     cool.includes(color),
    isPrimary:  prim.includes(color),
    isLarge:    size === 'lg',
    isFilled:   filled,
    icon: () => makeIcon({type,color,size,filled}),
    label: `${size==='lg'?'large':'small'} ${color} ${type}`,
  };
}

/* ═══════════════════════════════════════════════
   TRIPLET DEFINITIONS
   Each triplet: 4 example shapes + rule1 + rule2 + test shape
   rule1 = Q1 answer (identify)
   rule2 = Q2 answer (equivalent) AND Q3 answer (still works when test added)
   test shape: rule1 gives False, rule2 gives True → test "maps to True"
═══════════════════════════════════════════════ */
const TRIPLETS = [
  /* T1 — Color (Is blue) vs Size (Is large) */
  {
    shapes:  [S('circle','blue','lg',true), S('triangle','blue','lg',true), S('square','red','sm',true), S('diamond','yellow','sm',true)],
    mapping: [true, true, false, false],
    rule1: 'Is blue',
    rule2: 'Is large',
    test:   S('star','red','lg',true),    // red=not blue → F; large → T
    q1Distractors: ['Is red','Has no corners','Is a warm color'],
    q2Distractors: ['Is a circle','Has straight sides','Is a cool color'],
    q3Hint: 'The large red star is large but not blue. Only one rule assigns it True correctly.',
  },

  /* T2 — Cool color (Is a cool color) vs No corners (Has curved edges) */
  {
    shapes:  [S('circle','blue','lg',true), S('oval','green','lg',true), S('square','orange','lg',true), S('triangle','red','lg',true)],
    mapping: [true, true, false, false],
    rule1: 'Is a cool color',
    rule2: 'Has curved edges',
    test:   S('heart','yellow','lg',true),  // yellow=warm → F; heart has no corners → T
    q1Distractors: ['Is large','Has straight sides','Is a primary color'],
    q2Distractors: ['Is a polygon','Is large','Is a warm color'],
    q3Hint: 'The yellow heart is warm-colored but does have curved edges. Check each rule.',
  },

  /* T3 — Size (Is large) vs Sides (Fewer than 5 sides) */
  {
    shapes:  [S('triangle','blue','lg',true), S('square','red','lg',true), S('pentagon','green','sm',true), S('hexagon','orange','sm',true)],
    mapping: [true, true, false, false],
    rule1: 'Is large',
    rule2: 'Has fewer than 5 sides',
    test:   S('triangle','yellow','sm',true),  // small → F; triangle=3 sides <5 → T
    q1Distractors: ['Is a cool color','Has more than 4 sides','Is filled'],
    q2Distractors: ['Is a cool color','Has more than 4 sides','Is small'],
    q3Hint: 'The small yellow triangle is small, but it only has 3 sides.',
  },

  /* T4 — Fewer than 5 sides vs Primary color */
  {
    shapes:  [S('triangle','blue','lg',true), S('square','red','lg',true), S('pentagon','green','lg',true), S('hexagon','orange','lg',true)],
    mapping: [true, true, false, false],
    rule1: 'Has fewer than 5 sides',
    rule2: 'Is a primary color',
    test:   S('hexagon','yellow','lg',true),  // 6 sides → F; yellow=primary → T
    q1Distractors: ['Is a primary color','Is large','Has more than 4 sides'],
    q2Distractors: ['Is large','Has straight sides','Is a cool color'],
    q3Hint: 'The yellow hexagon has 6 sides but yellow IS a primary color (red, yellow, blue).',
  },

  /* T5 — Filled vs Warm color */
  {
    shapes:  [S('circle','red','lg',true), S('square','orange','lg',true), S('triangle','blue','lg',false), S('pentagon','green','lg',false)],
    mapping: [true, true, false, false],
    rule1: 'Is filled',
    rule2: 'Is a warm color',
    test:   S('heart','red','lg',false),    // outlined → F; red=warm → T
    q1Distractors: ['Is a warm color','Is a circle or square','Is large'],
    q2Distractors: ['Is filled','Is large','Has fewer than 5 sides'],
    q3Hint: 'The red heart is outlined (not filled) but red is a warm color.',
  },

  /* T6 — More than 4 sides vs Not filled (outlined) */
  {
    shapes:  [S('pentagon','blue','lg',false), S('hexagon','purple','lg',false), S('triangle','yellow','lg',true), S('square','orange','lg',true)],
    mapping: [true, true, false, false],
    rule1: 'Has more than 4 sides',
    rule2: 'Is not filled',
    test:   S('star','red','lg',true),    // star=10 sides >4 → T; filled → F
    q1Distractors: ['Is a cool color','Is not filled','Has straight sides'],
    q2Distractors: ['Is a cool color','Has more than 4 sides','Is large'],
    q3Hint: 'The red star has 10 sides (more than 4) but it IS filled.',
  },
];

/* ═══════════════════════════════════════════════
   BUILD DIAGRAM HTML
═══════════════════════════════════════════════ */
function buildInputBox(shapes, highlightLast) {
  return shapes.map((s, i) => {
    const isLast = highlightLast && i === shapes.length - 1;
    return `<div class="io-item in-item" id="inrow-${i}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        ${s.icon()}
        <span style="font-size:0.56rem;font-weight:700;color:${isLast?'#fff':CMAP[s.color]};opacity:${isLast?1:0.7}">${s.color} ${s.type}</span>
      </div>
      <span class="io-dot" style="${isLast?'border-color:#fff;background:#fff':''}"></span>
    </div>`;
  }).join('');
}

function buildOutputBox(rowCount) {
  // Always 2 rows: True and False
  // Vertically centered to span all input rows
  const rowH = 50;
  const totalH = rowCount * rowH;
  const gap = Math.max(6, (totalH - 2 * rowH) / 3);
  return `
    <div class="io-item out-item" id="outrow-0" style="margin-bottom:${gap.toFixed(0)}px">
      <span class="io-arr">▶</span>
      <span class="io-val-true">True</span>
    </div>
    <div class="io-item out-item" id="outrow-1">
      <span class="io-arr">▶</span>
      <span class="io-val-false">False</span>
    </div>`;
}

function buildDiagram(shapes, mapping, pillText, pillClass) {
  const inputHTML  = buildInputBox(shapes, false);
  const outputHTML = buildOutputBox(shapes.length);
  return `
    <div class="machine${pillClass.includes('known')||pillClass.includes('correct')?(' rule-known'+(pillClass.includes('correct')?' correct-glow':'')):''}">
      <div class="rule-row"><div class="rule-pill ${pillClass}">${pillText}</div></div>
      <div class="diagram-labels"><span>inputs</span><span>outputs</span></div>
      <div class="diagram-wrapper" id="diagramWrap">
        <div class="io-box" id="inputBox">${inputHTML}</div>
        <div class="io-box" id="outputBox" style="display:flex;flex-direction:column;justify-content:center;min-height:${shapes.length*50}px">${outputHTML}</div>
        <div class="rule-glow"></div>
        <svg class="lines-svg" id="linesSvg"></svg>
      </div>
    </div>`;
}

function buildDiagramQ3(shapes, mapping, testShape, pillText, pillClass) {
  const allShapes  = [...shapes, testShape];
  const allMapping = [...mapping, true]; // test always maps to True
  const inputHTML  = buildInputBox(allShapes, true); // highlight last row
  const outputHTML = buildOutputBox(allShapes.length);
  return `
    <div class="machine${pillClass.includes('known')||pillClass.includes('correct')?(' rule-known'+(pillClass.includes('correct')?' correct-glow':'')):''}">
      <div class="rule-row"><div class="rule-pill ${pillClass}">${pillText}</div></div>
      <div class="diagram-labels"><span>inputs</span><span>outputs</span></div>
      <div class="diagram-wrapper" id="diagramWrap">
        <div class="io-box" id="inputBox">${inputHTML}</div>
        <div class="io-box" id="outputBox" style="display:flex;flex-direction:column;justify-content:center;min-height:${allShapes.length*50}px">${outputHTML}</div>
        <div class="rule-glow"></div>
        <svg class="lines-svg" id="linesSvg"></svg>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   DRAW SVG LINES  (converging: many inputs → 2 outputs)
═══════════════════════════════════════════════ */
function drawLines(mapping) {
  const wrap   = document.getElementById('diagramWrap');
  const inBox  = document.getElementById('inputBox');
  const outBox = document.getElementById('outputBox');
  const svg    = document.getElementById('linesSvg');
  if (!wrap || !inBox || !outBox || !svg) return;

  const wR  = wrap.getBoundingClientRect();
  const inR = inBox.getBoundingClientRect();
  const outR= outBox.getBoundingClientRect();
  const outRows = [...outBox.querySelectorAll('.io-item.out-item')];
  const inRows  = [...inBox.querySelectorAll('.io-item.in-item')];
  if (!inRows.length || !outRows.length) return;

  svg.setAttribute('viewBox', `0 0 ${wR.width.toFixed(1)} ${wR.height.toFixed(1)}`);
  svg.setAttribute('width',  wR.width.toFixed(1));
  svg.setAttribute('height', wR.height.toFixed(1));

  const lines = mapping.map((isTrue, i) => {
    const iRow = inRows[i]?.getBoundingClientRect();
    const oRow = outRows[isTrue ? 0 : 1]?.getBoundingClientRect();
    if (!iRow || !oRow) return '';
    return `<line
      x1="${(inR.right  - wR.left).toFixed(1)}" y1="${(iRow.top + iRow.height/2 - wR.top).toFixed(1)}"
      x2="${(outR.left  - wR.left).toFixed(1)}" y2="${(oRow.top + oRow.height/2 - wR.top).toFixed(1)}"
      stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah)"/>`;
  });

  svg.innerHTML = `<defs>
    <marker id="ah" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="rgba(255,255,255,0.38)"/>
    </marker>
  </defs>${lines.join('')}`;
}

let _currentMapping = [];
window.addEventListener('resize', () => setTimeout(() => drawLines(_currentMapping), 80));

/* ═══════════════════════════════════════════════
   QUESTION GENERATORS
═══════════════════════════════════════════════ */
const shuffle = a => [...a].sort(() => Math.random() - .5);
const pick    = a => a[Math.floor(Math.random() * a.length)];

function genIdentify(t) {
  const opts = shuffle([t.rule1, ...t.q1Distractors]);
  return {
    qtype: 'identify',
    questionText: 'Which rule could produce these outputs from these inputs?',
    pillText: '?', pillClass: '',
    shapes: t.shapes, mapping: t.mapping,
    options: opts, correctIndex: opts.indexOf(t.rule1),
    optCols: 'g4',
    hint: `Look at all the True shapes — what single property do they share?`,
    t,
  };
}

function genEquivalent(t) {
  const opts = shuffle([t.rule2, ...t.q2Distractors]);
  return {
    qtype: 'equivalent',
    questionText: 'Which other rule could produce the same outputs from these inputs?',
    pillText: '?', pillClass: '',
    shapes: t.shapes, mapping: t.mapping,
    options: opts, correctIndex: opts.indexOf(t.rule2),
    optCols: 'g4',
    hint: `"${t.rule1}" already works. Find a completely different property that also splits True/False the same way.`,
    t,
  };
}

function genStillWorks(t) {
  const opts = shuffle([t.rule1, t.rule2]);
  const correctRule = t.rule2; // rule2 maps test→True; rule1 maps test→False
  return {
    qtype: 'stillworks',
    questionText: `Which rule still works if ${t.test.label} maps to True?`,
    pillText: '?', pillClass: '',
    shapes: t.shapes, mapping: t.mapping,
    testShape: t.test,
    options: opts, correctIndex: opts.indexOf(correctRule),
    optCols: 'g2',
    hint: t.q3Hint,
    t,
  };
}

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function renderQuestion(q) {
  const mapping = q.qtype === 'stillworks'
    ? [...q.mapping, true]
    : q.mapping;
  _currentMapping = mapping;

  const diagramHTML = q.qtype === 'stillworks'
    ? buildDiagramQ3(q.shapes, q.mapping, q.testShape, q.pillText, q.pillClass)
    : buildDiagram(q.shapes, q.mapping, q.pillText, q.pillClass);

  document.getElementById('qCard').innerHTML = `
    <p class="q-text">${q.questionText}</p>
    ${diagramHTML}
    <div class="options-grid ${q.optCols}" id="optionsGrid">
      ${q.options.map((lbl, i) =>
        `<button class="opt-btn" data-opt="${i}" onclick="selectOpt(${i})">${lbl}</button>`
      ).join('')}
    </div>
    <div class="start-over-row">
      <button class="start-over-btn" onclick="initQuiz()">↺ Start over</button>
    </div>`;

  requestAnimationFrame(() => requestAnimationFrame(() => drawLines(mapping)));
}

/* ═══════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════ */
let questions = [], qIdx = 0, selOpt = null;
let isAnswered = false, isLocked = false, score = 0;

function selectOpt(i) {
  if (isLocked) return;
  selOpt = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('checkBtn').className = 'check-btn ready';
}

function checkAnswer() {
  const q = questions[qIdx];
  if (isAnswered) { advanceQuestion(); return; }
  if (selOpt === null) return;
  isAnswered = isLocked = true;
  const correct = selOpt === q.correctIndex;

  document.getElementById('optionsGrid').innerHTML = q.options.map((lbl, i) => {
    let cls = 'opt-btn locked';
    if (i === q.correctIndex) cls += ' correct';
    else if (i === selOpt) cls += ' wrong';
    return `<button class="${cls}">${lbl}</button>`;
  }).join('');

  if (correct) {
    score++;
    document.getElementById('scoreDisp').textContent = score;
  }

  const bar = document.getElementById('feedbackBar');
  bar.className = `feedback-bar ${correct ? 'ok' : 'err'} show`;
  document.getElementById('fbIcon').textContent = correct ? '✓' : '✗';
  const ti = document.getElementById('fbTitle');
  ti.className = `fb-title ${correct ? 'ok' : 'err'}`;
  ti.textContent = correct ? 'Correct!' : `Answer: "${q.options[q.correctIndex]}"`;
  document.getElementById('fbHint').textContent = q.hint;

  document.getElementById('pFill').style.width = (((qIdx + 1) / 10) * 100) + '%';
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn continue';
  btn.textContent = qIdx < 9 ? 'Continue →' : 'See Results →';
}

function advanceQuestion() {
  qIdx++;
  if (qIdx >= 10) { showResults(); return; }
  selOpt = null; isAnswered = isLocked = false;
  document.getElementById('qNum').textContent = qIdx + 1;
  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('checkBtn').className = 'check-btn';
  document.getElementById('checkBtn').textContent = 'Check';
  renderQuestion(questions[qIdx]);
}

function showResults() {
  document.getElementById('qCard').style.display    = 'none';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('resultsWrap').className  = 'results-wrap show';
  const pct = score / 10;
  const [emoji, msg] =
    pct === 1  ? ['🏆','Perfect! You can deduce any rule!']
    : pct >= .8 ? ['🎉','Excellent logic skills! You spotted the patterns.']
    : pct >= .6 ? ['👍','Good work! Review the hints to sharpen your reasoning.']
    : pct >= .4 ? ['📚','Keep practicing — look for ONE property that all True shapes share.']
                : ['💡','Tip: compare what True shapes have in common vs False shapes.'];
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resScore').textContent = `${score}/10`;
  document.getElementById('resMsg').textContent   = msg;
}

/* ═══════════════════════════════════════════════
   INIT — pick 3 triplets × 3 question types + 1 bonus identify
═══════════════════════════════════════════════ */
function initQuiz() {
  qIdx = score = 0; selOpt = null; isAnswered = isLocked = false;

  const chosen = shuffle(TRIPLETS).slice(0, 4);
  questions = [
    genIdentify(chosen[0]), genEquivalent(chosen[0]), genStillWorks(chosen[0]),
    genIdentify(chosen[1]), genEquivalent(chosen[1]), genStillWorks(chosen[1]),
    genIdentify(chosen[2]), genEquivalent(chosen[2]), genStillWorks(chosen[2]),
    genIdentify(chosen[3]),  // bonus 10th: identify only
  ];

  document.getElementById('qCard').style.display    = '';
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('checkBtn').className     = 'check-btn';
  document.getElementById('checkBtn').textContent   = 'Check';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('resultsWrap').className  = 'results-wrap';
  document.getElementById('scoreDisp').textContent  = 0;
  document.getElementById('qNum').textContent       = 1;
  document.getElementById('pFill').style.width      = '0%';

  renderQuestion(questions[0]);
}

document.getElementById('checkBtn').addEventListener('click', checkAnswer);
initQuiz();
</script>
