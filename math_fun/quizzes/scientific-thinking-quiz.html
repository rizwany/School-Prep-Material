  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

    .progress-wrap { margin-bottom: 20px; }

    .progress-fill { height: 100%; background: var(--green); border-radius: 4px; width: 0%; transition: width .4s ease; }
    .progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    .q-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px 18px 18px; margin-bottom: 14px; }
    .q-text { font-size: 1.05rem; font-weight: 800; line-height: 1.55; margin-bottom: 20px; color: var(--text); }

    /* ── Machine ── */
    .machine { margin-bottom: 16px; }
    .rule-row { display: flex; justify-content: center; margin-bottom: 8px; }
    .rule-pill { background: #252733; border: 1.5px solid var(--border); color: var(--muted); font-weight: 800; font-size: 0.92rem; padding: 5px 22px; border-radius: 20px; letter-spacing: .06em; }
    .rule-pill.known { background: rgba(67,97,238,.18); border-color: rgba(67,97,238,.55); color: #a0b4ff; box-shadow: 0 0 20px rgba(67,97,238,.3); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

    .diagram-labels { display: flex; justify-content: space-between; padding: 0 2px; margin-bottom: 6px; }
    .col-label { font-size: 0.78rem; font-weight: 900; color: var(--muted); font-style: italic; letter-spacing: .04em; }
    .col-label.math { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }

    .diagram-wrapper { position: relative; display: flex; justify-content: space-between; align-items: flex-start; gap: 44px; }

    .machine.show-glow .rule-glow { opacity: 1; }

    .io-box { background: #181921; border: 1.5px solid var(--border); border-radius: 12px; padding: 5px 12px; flex-shrink: 0; min-width: 82px; position: relative; z-index: 1; }

    .check-btn { width: 100%; padding: 16px; border: none; border-radius: 999px; font-family: inherit; font-size: 1rem; font-weight: 900; cursor: pointer; background: #252737; color: var(--muted); transition: background .15s, color .15s, transform .1s; }

    .check-btn.ready:hover { background: #3451d1; }
    .check-btn.continue { background: var(--green); color: #fff; }
    .check-btn.continue:hover { background: var(--green-dk); }

    /* ── Results ── */
    .results-wrap { text-align: center; display: none; padding: 20px 0 40px; }
    .results-wrap.show { display: block; }
    .res-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 34px 28px 28px; }
    .res-emoji { font-size: 3rem; margin-bottom: 10px; }
    .res-title { font-size: 1.4rem; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .res-score { font-size: 2.8rem; font-weight: 900; color: var(--green); margin: 14px 0 2px; }
    .res-label { font-size: 0.82rem; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
    .res-msg   { font-size: 0.88rem; font-weight: 700; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
    .btn-retry { background: var(--blue); color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 800; padding: 14px 36px; border: none; border-radius: 999px; cursor: pointer; display: block; width: 100%; margin-bottom: 10px; }
    .btn-retry:hover { background: #3451d1; }
    .btn-home  { background: none; border: 1.5px solid var(--border); color: var(--muted); font-family: inherit; font-size: 0.85rem; font-weight: 700; padding: 10px 24px; border-radius: 999px; cursor: pointer; width: 100%; }
    .btn-home:hover { border-color: #555870; color: var(--text); }

    footer { background: #0a0b10; color: rgba(255,255,255,.4); padding: 16px 24px; text-align: center; font-size: 0.75rem; font-weight: 600; }
    footer a { color: rgba(255,255,255,.25); text-decoration: none; }

      .quiz-shell { padding: 12px 14px 70px; }
      .opt-btn { font-size: 0.82rem; padding: 12px 8px; }
    }

<script>
/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
const pick    = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => [...a].sort(() => Math.random() - .5);

/* ═══════════════════════════════════════════════
   FUNCTION DEFINITIONS  (10 different functions)
   Each has: fn, inputs, verbal, notation, verbal distractors, notation distractors
═══════════════════════════════════════════════ */
const FDEFS = [
  {
    fn: x => 2*x + 1,
    inputs: [1, 2, 5, 10],
    verbal:  'Double, then add 1',
    notation:'f(x) = 2x + 1',
    vd: ['Add 1, then double', 'Double, then add 2', 'Double, then subtract 1'],
    nd: ['f(x) = 2x', 'f(x) = 2x + 2', 'f(x) = x + 2'],
    applyX: 7,  inverseY: 11,
  },
  {
    fn: x => 2*x + 3,
    inputs: [1, 2, 5, 8],
    verbal:  'Double, then add 3',
    notation:'f(x) = 2x + 3',
    vd: ['Add 3, then double', 'Double, then add 4', 'Triple, then subtract 1'],
    nd: ['f(x) = 2x + 1', 'f(x) = 3x + 1', 'f(x) = x + 3'],
    applyX: 6,  inverseY: 13,
  },
  {
    fn: x => 3*x - 2,
    inputs: [1, 2, 3, 4],
    verbal:  'Triple, then subtract 2',
    notation:'f(x) = 3x − 2',
    vd: ['Subtract 2, then triple', 'Triple, then subtract 3', 'Double, then subtract 1'],
    nd: ['f(x) = 3x', 'f(x) = 3x − 1', 'f(x) = 2x − 2'],
    applyX: 5,  inverseY: 7,
  },
  {
    fn: x => 3*x + 1,
    inputs: [1, 2, 3, 4],
    verbal:  'Triple, then add 1',
    notation:'f(x) = 3x + 1',
    vd: ['Add 1, then triple', 'Triple, then add 2', 'Double, then add 2'],
    nd: ['f(x) = 3x', 'f(x) = 3x + 2', 'f(x) = 2x + 2'],
    applyX: 5,  inverseY: 10,
  },
  {
    fn: x => 4*x - 1,
    inputs: [1, 2, 3, 4],
    verbal:  'Multiply by 4, then subtract 1',
    notation:'f(x) = 4x − 1',
    vd: ['Subtract 1, then multiply by 4', 'Multiply by 4, then subtract 2', 'Triple, then add 1'],
    nd: ['f(x) = 4x', 'f(x) = 4x − 2', 'f(x) = 3x + 1'],
    applyX: 5,  inverseY: 11,
  },
  {
    fn: x => x*x + 1,
    inputs: [1, 2, 3, 4],
    verbal:  'Square it, then add 1',
    notation:'f(x) = x² + 1',
    vd: ['Add 1, then square it', 'Double, then add 1', 'Square it, then add 2'],
    nd: ['f(x) = x² + 2', 'f(x) = 2x + 1', 'f(x) = x² − 1'],
    applyX: 5,  inverseY: 10,
  },
  {
    fn: x => 2*x - 3,
    inputs: [2, 3, 5, 7],
    verbal:  'Double, then subtract 3',
    notation:'f(x) = 2x − 3',
    vd: ['Subtract 3, then double', 'Double, then subtract 4', 'Triple, then subtract 5'],
    nd: ['f(x) = 2x', 'f(x) = 2x − 4', 'f(x) = x − 3'],
    applyX: 6,  inverseY: 7,
  },
  {
    fn: x => 5*x - 2,
    inputs: [1, 2, 3, 4],
    verbal:  'Multiply by 5, then subtract 2',
    notation:'f(x) = 5x − 2',
    vd: ['Subtract 2, then multiply by 5', 'Multiply by 5, then subtract 3', 'Multiply by 4, then add 1'],
    nd: ['f(x) = 5x', 'f(x) = 5x − 3', 'f(x) = 4x + 1'],
    applyX: 5,  inverseY: 13,
  },
  {
    fn: x => x*x - 1,
    inputs: [2, 3, 4, 5],
    verbal:  'Square it, then subtract 1',
    notation:'f(x) = x² − 1',
    vd: ['Subtract 1, then square it', 'Square it, then subtract 2', 'Double, then subtract 1'],
    nd: ['f(x) = x² + 1', 'f(x) = x² − 2', 'f(x) = 2x − 1'],
    applyX: 6,  inverseY: 8,
  },
  {
    fn: x => 3*x + 4,
    inputs: [1, 2, 3, 4],
    verbal:  'Triple, then add 4',
    notation:'f(x) = 3x + 4',
    vd: ['Add 4, then triple', 'Triple, then add 5', 'Double, then add 5'],
    nd: ['f(x) = 3x + 2', 'f(x) = 3x + 5', 'f(x) = 4x + 1'],
    applyX: 5,  inverseY: 13,
  },
];

/* ═══════════════════════════════════════════════
   QUESTION GENERATORS  (4 types)
═══════════════════════════════════════════════ */

/* TYPE 1 — Verbal: "What rule could produce these outputs?" */
function genVerbal(fd) {
  const opts = shuffle([fd.verbal, ...fd.vd]);
  return {
    qtype: 'verbal', badge: 'Verbal Rule',
    questionText: 'What rule could produce these outputs?',
    pillText: '?', pillClass: '',
    inputLabel: 'x', outputLabel: 'f(x)',
    pairs: fd.inputs.map(x => ({ x, fx: fd.fn(x), known: true })),
    extraIn: null, extraOut: null,
    options: opts, optClass: '',
    correctIndex: opts.indexOf(fd.verbal),
    hint: `Try: does the rule work for x = ${fd.inputs[0]}? It should give ${fd.fn(fd.inputs[0])}.`,
    fd,
  };
}

/* TYPE 2 — Notation: "Which function expresses the rule?" */
function genNotation(fd) {
  const opts = shuffle([fd.notation, ...fd.nd]);
  return {
    qtype: 'notation', badge: 'Function Notation',
    questionText: 'Which function expresses the rule?',
    pillText: '?', pillClass: '',
    inputLabel: 'x', outputLabel: 'f(x)',
    pairs: fd.inputs.map(x => ({ x, fx: fd.fn(x), known: true })),
    extraIn: null, extraOut: null,
    options: opts, optClass: 'math-opt',
    correctIndex: opts.indexOf(fd.notation),
    hint: `Substitute x = ${fd.inputs[0]}: which formula gives ${fd.fn(fd.inputs[0])}?`,
    fd,
  };
}

/* TYPE 3 — Apply: "What is f(n) for this function?" */
function genApply(fd) {
  const newX = fd.applyX;
  const correct = fd.fn(newX);
  const wrongs = shuffle([correct - fd.inputs[1], correct + 1, correct + fd.inputs[0], correct - 1, correct + 2, correct - 2]
    .filter(v => v !== correct && v > 0)).slice(0, 3);
  const opts = shuffle([String(correct), ...wrongs.map(String)]);
  return {
    qtype: 'apply', badge: 'Apply the Rule',
    questionText: `What is f(${newX}) for this function?`,
    pillText: '?', pillClass: '',
    inputLabel: 'x', outputLabel: 'f(x)',
    pairs: fd.inputs.map(x => ({ x, fx: fd.fn(x), known: true })),
    extraIn: String(newX), extraOut: null,   // bold input, "?" output
    options: opts, optClass: 'math-opt',
    correctIndex: opts.indexOf(String(correct)),
    hint: `Find the pattern from the pairs, then apply the same rule to x = ${newX}.`,
    fd,
  };
}

/* TYPE 4 — Inverse: "For which x does f(x) = n?" */
function genInverse(fd) {
  const targetY = fd.inverseY;
  // Solve: find x so fn(x) = targetY. We assume targetY is a valid output.
  let correctX = null;
  for (let x = 0; x <= 20; x++) {
    if (fd.fn(x) === targetY) { correctX = x; break; }
  }
  if (correctX === null) { return genApply(fd); } // fallback
  const wrongs = shuffle([correctX - 1, correctX + 1, correctX + 2, correctX - 2, correctX + 3]
    .filter(v => v !== correctX && v > 0 && fd.fn(v) !== targetY)).slice(0, 3);
  const toLabel = v => `x = ${v}`;
  const opts = shuffle([toLabel(correctX), ...wrongs.map(toLabel)]);
  return {
    qtype: 'inverse', badge: 'Inverse Thinking',
    questionText: `For which value of x does f(x) = ${targetY}?`,
    pillText: '?', pillClass: '',
    inputLabel: 'x', outputLabel: 'f(x)',
    pairs: fd.inputs.map(x => ({ x, fx: fd.fn(x), known: true })),
    extraIn: null, extraOut: String(targetY),   // "?" input, bold output
    options: opts, optClass: 'math-opt',
    correctIndex: opts.indexOf(toLabel(correctX)),
    hint: `Work backwards: if f(x) = ${targetY}, what must x be?`,
    fd,
  };
}

/* ═══════════════════════════════════════════════
   BUILD DIAGRAM
═══════════════════════════════════════════════ */
function buildInputBox(q) {
  let rows = q.pairs.map((p, i) =>
    `<div class="io-item in-item" id="inrow-${i}">
       <span class="io-val">${p.x}</span>
       <span class="io-dot"></span>
     </div>`
  );
  if (q.extraIn !== null || q.qtype === 'inverse') {
    const content = q.extraIn
      ? `<span class="io-val bold">${q.extraIn}</span>`
      : `<span class="io-unk">?</span>`;
    rows.push(`<div class="io-item in-item" id="inrow-${q.pairs.length}">${content}<span class="io-dot"></span></div>`);
  }
  return rows.join('');
}

function buildOutputBox(q) {
  let rows = q.pairs.map((p, i) =>
    `<div class="io-item out-item" id="outrow-${i}">
       <span class="io-arr">▶</span>
       <span class="io-val">${p.fx}</span>
     </div>`
  );
  if (q.extraIn !== null) {
    rows.push(`<div class="io-item out-item" id="outrow-${q.pairs.length}"><span class="io-arr">▶</span><span class="io-unk">?</span></div>`);
  } else if (q.extraOut !== null) {
    rows.push(`<div class="io-item out-item" id="outrow-${q.pairs.length}"><span class="io-arr">▶</span><span class="io-val target">${q.extraOut}</span></div>`);
  }
  return rows.join('');
}

function buildDiagram(q) {
  const hasExtra = q.extraIn !== null || q.extraOut !== null;
  const showGlow = q.pillClass.includes('known');
  const totalRows = q.pairs.length + (hasExtra ? 1 : 0);
  return `
    <div class="machine${showGlow ? ' show-glow' : ''}">
      <div class="rule-row"><div class="rule-pill ${q.pillClass}">${q.pillText}</div></div>
      <div class="diagram-labels">
        <span class="col-label math">x</span>
        <span class="col-label math">f(x)</span>
      </div>
      <div class="diagram-wrapper" id="diagramWrap">
        <div class="io-box" id="inputBox">${buildInputBox(q)}</div>
        <div class="io-box" id="outputBox">${buildOutputBox(q)}</div>
        <div class="rule-glow"></div>
        <svg class="lines-svg" id="linesSvg"></svg>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   SVG LINE DRAWING
═══════════════════════════════════════════════ */
let _rowCount = 4;
function drawLines(rowCount) {
  _rowCount = rowCount;
  const wrap  = document.getElementById('diagramWrap');
  const inBox = document.getElementById('inputBox');
  const outBox= document.getElementById('outputBox');
  const svg   = document.getElementById('linesSvg');
  if (!wrap || !inBox || !outBox || !svg) return;

  const wR  = wrap.getBoundingClientRect();
  const inR = inBox.getBoundingClientRect();
  const outR= outBox.getBoundingClientRect();
  const lines = [];
  for (let i = 0; i < rowCount; i++) {
    const ir = document.getElementById(`inrow-${i}`)?.getBoundingClientRect();
    const or = document.getElementById(`outrow-${i}`)?.getBoundingClientRect();
    if (!ir || !or) continue;
    lines.push(`<line
      x1="${(inR.right  - wR.left).toFixed(1)}" y1="${(ir.top + ir.height/2 - wR.top).toFixed(1)}"
      x2="${(outR.left  - wR.left).toFixed(1)}" y2="${(or.top + or.height/2 - wR.top).toFixed(1)}"
      stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah)"/>`);
  }
  svg.setAttribute('viewBox', `0 0 ${wR.width.toFixed(1)} ${wR.height.toFixed(1)}`);
  svg.setAttribute('width', wR.width.toFixed(1));
  svg.setAttribute('height', wR.height.toFixed(1));
  svg.innerHTML = `<defs><marker id="ah" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
    <polygon points="0 0,8 3.5,0 7" fill="rgba(255,255,255,0.38)"/></marker></defs>${lines.join('')}`;
}
window.addEventListener('resize', () => setTimeout(() => drawLines(_rowCount), 80));

/* ═══════════════════════════════════════════════
   RENDER QUESTION
═══════════════════════════════════════════════ */
function renderQuestion(q) {
  const hasExtra = q.extraIn !== null || q.extraOut !== null;
  const rowCount = q.pairs.length + (hasExtra ? 1 : 0);

  document.getElementById('qCard').innerHTML = `
    <div class="q-badge">${q.badge}</div>
    <p class="q-text">${q.questionText}</p>
    ${buildDiagram(q)}
    <div class="options-grid" id="optionsGrid">
      ${q.options.map((lbl, i) =>
        `<button class="opt-btn ${q.optClass}" data-opt="${i}" onclick="selectOpt(${i})">${lbl}</button>`
      ).join('')}
    </div>
    <div class="start-over-row">
      <button class="start-over-btn" onclick="initQuiz()">↺ Start over</button>
    </div>`;

  requestAnimationFrame(() => requestAnimationFrame(() => drawLines(rowCount)));
}

/* ═══════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════ */
let questions = [], qIdx = 0, selOpt = null;
let isAnswered = false, isLocked = false, score = 0;

function selectOpt(i) {
  if (isLocked) return;
  selOpt = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('checkBtn').className = 'check-btn ready';
}

function checkAnswer() {
  const q = questions[qIdx];
  if (isAnswered) { advanceQuestion(); return; }
  if (selOpt === null) return;

  isAnswered = isLocked = true;
  const correct = selOpt === q.correctIndex;

  document.getElementById('optionsGrid').innerHTML = q.options.map((lbl, i) => {
    let cls = `opt-btn ${q.optClass} locked`;
    if (i === q.correctIndex) cls += ' correct';
    else if (i === selOpt) cls += ' wrong';
    return `<button class="${cls}">${lbl}</button>`;
  }).join('');

  if (correct) {
    score++;
    document.getElementById('scoreDisp').textContent = score;
  }

  const bar = document.getElementById('feedbackBar');
  bar.className = `feedback-bar ${correct ? 'ok' : 'err'} show`;
  document.getElementById('fbIcon').textContent = correct ? '✓' : '✗';
  const ti = document.getElementById('fbTitle');
  ti.className = `fb-title ${correct ? 'ok' : 'err'}`;
  ti.textContent = correct ? 'Correct!' : `Answer: "${q.options[q.correctIndex]}"`;
  document.getElementById('fbHint').textContent = q.hint;

  document.getElementById('pFill').style.width = (((qIdx + 1) / 10) * 100) + '%';
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn continue';
  btn.textContent = qIdx < 9 ? 'Continue →' : 'See Results →';
}

function advanceQuestion() {
  qIdx++;
  if (qIdx >= 10) { showResults(); return; }
  selOpt = null; isAnswered = isLocked = false;
  document.getElementById('qNum').textContent = qIdx + 1;
  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('checkBtn').className = 'check-btn';
  document.getElementById('checkBtn').textContent = 'Check';
  renderQuestion(questions[qIdx]);
}

function showResults() {
  document.getElementById('qCard').style.display    = 'none';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('resultsWrap').className  = 'results-wrap show';
  const pct = score / 10;
  const [emoji, msg] =
    pct === 1  ? ['🏆','Perfect! You think like a mathematician!']
    : pct >= .8 ? ['🎉','Excellent! You have strong scientific reasoning skills.']
    : pct >= .6 ? ['👍','Good work! Review the function patterns and try again.']
    : pct >= .4 ? ['📚','Keep practicing — try substituting x values to check each answer.']
                : ['💡','Tip: always test the rule with the first x value shown.'];
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resScore').textContent = `${score}/10`;
  document.getElementById('resMsg').textContent   = msg;
}

/* ═══════════════════════════════════════════════
   INIT — shuffle 10 functions, assign varied question types
═══════════════════════════════════════════════ */
function initQuiz() {
  qIdx = score = 0; selOpt = null; isAnswered = isLocked = false;

  // Shuffle all 10 function definitions
  const fds = shuffle(FDEFS);

  // Assign question types: 3 verbal, 3 notation, 2 apply, 2 inverse
  const types = shuffle(['verbal','verbal','verbal','notation','notation','notation','apply','apply','inverse','inverse']);

  const genMap = { verbal: genVerbal, notation: genNotation, apply: genApply, inverse: genInverse };
  questions = fds.map((fd, i) => genMap[types[i]](fd));

  document.getElementById('qCard').style.display    = '';
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('checkBtn').className     = 'check-btn';
  document.getElementById('checkBtn').textContent   = 'Check';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('resultsWrap').className  = 'results-wrap';
  document.getElementById('scoreDisp').textContent  = 0;
  document.getElementById('qNum').textContent       = 1;
  document.getElementById('pFill').style.width      = '0%';

  renderQuestion(questions[0]);
}

document.getElementById('checkBtn').addEventListener('click', checkAnswer);
initQuiz();
</script>
