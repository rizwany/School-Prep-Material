<script>
// ── Canvas drawing ─────────────────────────────────────────────────────────────
const COLORS_MAP = {red:'#e74c3c',blue:'#4a90d9',green:'#27ae60',yellow:'#f1c40f',
  purple:'#9b59b6',orange:'#e67e22',pink:'#e91e8c',teal:'#1abc9c'};
const ALL_COLORS = ['red','blue','green','yellow','purple','orange'];
const EXT_COLORS = ['red','blue','green','yellow','purple','orange','pink','teal'];
const SIZES = [30, 50, 75, 100, 125];

function rrect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// Build the canvas path for a shape without filling/stroking
function shapePath(ctx, shape, cx, cy, r) {
  ctx.beginPath();
  if (shape==='circle')    { ctx.arc(cx,cy,r,0,Math.PI*2); }
  else if (shape==='square')    { rrect(ctx,cx-r,cy-r,r*2,r*2,Math.max(4,r*.12)); }
  else if (shape==='triangle')  { ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r*.95,cy+r*.72);ctx.lineTo(cx-r*.95,cy+r*.72);ctx.closePath(); }
  else if (shape==='rectangle') { rrect(ctx,cx-r*1.35,cy-r*.65,r*2.7,r*1.3,Math.max(4,r*.1)); }
  else if (shape==='hexagon')   {
    for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
    ctx.closePath();
  }
  else if (shape==='star') {
    for(let i=0;i<10;i++){const ri=i%2===0?r:r*.4;const a=(Math.PI/5)*i-Math.PI/2;i===0?ctx.moveTo(cx+ri*Math.cos(a),cy+ri*Math.sin(a)):ctx.lineTo(cx+ri*Math.cos(a),cy+ri*Math.sin(a));}
    ctx.closePath();
  }
}

function clearCanvas(cv) {
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(180,192,215,0.28)';
  for(let x=22;x<W;x+=32)for(let y=22;y<H;y+=32)ctx.fillRect(x,y,1.5,1.5);
}

// Two-pass render: fill ALL shapes first, then stroke ALL shapes on top
// This guarantees every border stays visible even when shapes overlap with the same color
function renderCanvas(cv, shapes) {
  clearCanvas(cv);
  const ctx=cv.getContext('2d');
  const cx=cv.width/2, cy=cv.height/2;
  const sorted=[...shapes].sort((a,b)=>b.size-a.size);  // largest drawn first (behind)

  // Pass 1 – fills only
  sorted.forEach(s=>{
    ctx.save();
    ctx.fillStyle = COLORS_MAP[s.color] || '#ccc';
    shapePath(ctx, s.shape, cx, cy, s.size);
    ctx.fill();
    ctx.restore();
  });

  // Pass 2 – strokes only (drawn on top of every fill)
  sorted.forEach(s=>{
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.72)';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    shapePath(ctx, s.shape, cx, cy, s.size);
    ctx.stroke();
    ctx.restore();
  });
}

// ── Program execution ──────────────────────────────────────────────────────────
// cmd.t = 'set' | 'draw'
// set:  { t:'set',  name, val }        val = color|number|null (blank → key 's'+i)
// draw: { t:'draw', shape,
//          colorArg,                    fixed color|varname|null (blank → key 'c'+i)
//          sizeArg }                    fixed number|varname|null|undefined (blank→'z'+i, undefined→no size param)

function execProgram(cmds, vals) {
  const vars = {}, shapes = [];
  cmds.forEach((cmd,i) => {
    if (cmd.t === 'set') {
      const v = cmd.val !== null ? cmd.val : vals['s'+i];
      if (v !== null && v !== undefined) vars[cmd.name] = isNaN(v)?v:Number(v);
    } else if (cmd.t === 'draw') {
      const cArg = cmd.colorArg !== null ? cmd.colorArg : (vals['c'+i]||null);
      const color = cArg ? (COLORS_MAP[cArg] ? cArg : (vars[cArg]||null)) : null;
      if (!color) return;
      let size = 50;
      if (cmd.sizeArg !== undefined) {
        const sArg = cmd.sizeArg !== null ? cmd.sizeArg : (vals['z'+i]||null);
        if (sArg !== null) size = isNaN(sArg) ? (vars[sArg]!=null?Number(vars[sArg]):50) : Number(sArg);
      }
      shapes.push({shape:cmd.shape, color, size});
    }
  });
  return shapes;
}

function getVarValues(cmds, vals) {
  const vars = {};
  cmds.forEach((cmd,i) => {
    if (cmd.t !== 'set') return;
    const v = cmd.val !== null ? cmd.val : vals['s'+i];
    if (v !== null && v !== undefined) vars[cmd.name] = v;
  });
  return vars;
}

// ── Question helpers ───────────────────────────────────────────────────────────
function dc(shape, colorArg, sizeArg) { // draw command helper
  return {t:'draw', shape, colorArg: colorArg??null, sizeArg};
}
function sc(name, val) { return {t:'set', name, val: val??null}; } // set command
function mkTarget(shapes, color, size) {
  return shapes.map(s=>({shape:s, color, size: size||50}));
}

// ── State ──────────────────────────────────────────────────────────────────────
let currentLevel='easy',questions=[],qIdx=0,score=0;
let isLocked=false,isContinue=false;
let cmdValues={};
let hasRun=false;
let openDDKey=null;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

// ── Dropdown ───────────────────────────────────────────────────────────────────
document.addEventListener('click',()=>closeAllDDs());

function closeAllDDs(){
  document.querySelectorAll('.dd-panel.open').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.cmd-sel-btn.open').forEach(el=>el.classList.remove('open'));
  openDDKey=null;
}

function toggleDD(e,key){
  e.stopPropagation();if(isLocked)return;
  const panel=document.getElementById('ddp_'+key),btn=document.getElementById('ddb_'+key);
  if(!panel||!btn)return;
  if(openDDKey===key){panel.classList.remove('open');btn.classList.remove('open');openDDKey=null;}
  else{closeAllDDs();panel.classList.add('open');btn.classList.add('open');openDDKey=key;}
}

function onOpt(e,key,value){
  e.stopPropagation();if(isLocked)return;
  closeAllDDs();
  cmdValues[key]=isNaN(value)?value:Number(value);
  refreshBtn(key,value);
  markOpt(key,value);
  updateVarPanel();
  updateRunBtn();
}

function refreshBtn(key,value){
  const btn=document.getElementById('ddb_'+key);if(!btn)return;
  let cls='cmd-sel-btn',inner='';
  if(value!==null&&value!==undefined){
    if(COLORS_MAP[value]){
      inner=`<span class="sel-swatch" style="background:${COLORS_MAP[value]}"></span>"${value}"<span class="dd-arr">▾</span>`;
      cls+=' val-color';
    } else if(!isNaN(value)){
      inner=`${value}px<span class="dd-arr">▾</span>`;
      cls+=' val-num';
    } else {
      inner=`<span style="font-style:italic;margin-right:2px">x</span>${value}<span class="dd-arr">▾</span>`;
      cls+=' val-var';
    }
  } else {
    inner=`<span>?</span><span class="dd-arr">▾</span>`;
  }
  btn.className=cls;btn.innerHTML=inner;
}

function markOpt(key,value){
  const panel=document.getElementById('ddp_'+key);if(!panel)return;
  panel.querySelectorAll('.dd-opt').forEach(o=>o.classList.toggle('sel',String(o.dataset.val)===String(value)));
}

function updateVarPanel(){
  const q=questions[qIdx];
  const vars=getVarValues(q.cmds,cmdValues);
  const panel=document.getElementById('varPanel');if(!panel)return;
  let h='';
  const entries=Object.entries(vars);
  if(entries.length===0){h='<span class="vp-empty">no vars set</span>';}
  else{
    entries.forEach(([name,val],idx)=>{
      if(idx>0)h+='<div class="vp-sep"></div>';
      h+=`<div class="vp-item"><span class="vp-label">${name}</span>`;
      if(COLORS_MAP[val])h+=`<span class="vp-color" style="background:${COLORS_MAP[val]}"></span>`;
      else if(!isNaN(val))h+=`<span class="vp-num">${val}</span>`;
      h+='</div>';
    });
  }
  panel.innerHTML=h;
}

// ── Run button ────────────────────────────────────────────────────────────────
function allBlanksFilled(){
  const q=questions[qIdx];
  const total=countBlanks(q);
  const filled=Object.keys(cmdValues).length;
  return filled>=total;
}

function countBlanks(q){
  let n=0;
  q.cmds.forEach((cmd,i)=>{
    if(cmd.t==='set'&&cmd.val===null)n++;
    if(cmd.t==='draw'){
      if(cmd.colorArg===null)n++;
      if(cmd.sizeArg===null)n++;
    }
  });
  return n;
}

function updateRunBtn(){
  const btn=document.getElementById('runBtn');if(!btn)return;
  const ready=allBlanksFilled();
  btn.className='run-btn'+(ready?' ready':'');
}

function runProgram(){
  if(!allBlanksFilled())return;
  const q=questions[qIdx];
  const shapes=execProgram(q.cmds,cmdValues);
  const cv=document.getElementById('codeCanvas');
  if(cv)renderCanvas(cv,shapes);
  hasRun=true;
  updateCheckBtn();
}

// ── Check ─────────────────────────────────────────────────────────────────────
function updateCheckBtn(){
  if(isContinue)return;
  const ready=hasRun&&allBlanksFilled();
  document.getElementById('checkBtn').className='check-btn'+(ready?' ready':'');
}

function handleBtn(){isContinue?advanceQ():checkAnswer();}

function checkAnswer(){
  const q=questions[qIdx];isLocked=true;
  let correct=false;

  if(q.correctBlanks){
    correct=Object.entries(q.correctBlanks).every(([k,v])=>String(cmdValues[k])===String(v));
  } else {
    const shapes=execProgram(q.cmds,cmdValues);
    correct=shapes.length===q.targetShapes.length&&shapes.every((s,i)=>{
      const t=q.targetShapes[i];
      const colorOk=s.color===t.color;
      const sizeOk=!q.checkSize||s.size===t.size;
      return s.shape===t.shape&&colorOk&&sizeOk;
    });
  }

  if(correct)score++;
  document.getElementById('scoreDisp').textContent=score;

  // Mark blank buttons
  q.cmds.forEach((cmd,i)=>{
    const keys=[];
    if(cmd.t==='set'&&cmd.val===null)keys.push('s'+i);
    if(cmd.t==='draw'){if(cmd.colorArg===null)keys.push('c'+i);if(cmd.sizeArg===null)keys.push('z'+i);}
    keys.forEach(k=>{
      const btn=document.getElementById('ddb_'+k);if(!btn)return;
      let ok;
      if(q.correctBlanks) ok=String(cmdValues[k])===String(q.correctBlanks[k]);
      else ok=correct;
      btn.classList.remove('val-color','val-num','val-var','open');
      btn.classList.add(ok?'correct-f':'wrong-f');
    });
  });

  const fb=document.getElementById('feedbackBar');
  const fi=document.getElementById('fbIcon'),ft=document.getElementById('fbTitle'),fh=document.getElementById('fbHint');
  if(correct){
    fb.className='feedback-bar ok show';fi.textContent='✅';
    ft.className='fb-title ok';ft.textContent='Correct! Your program runs perfectly!';
    fh.textContent='The canvas shows exactly the right output.';
  } else {
    fb.className='feedback-bar err show';fi.textContent='❌';
    ft.className='fb-title err';ft.textContent='Not quite!';
    if(q.correctBlanks){
      const expected=Object.entries(q.correctBlanks).map(([k,v])=>isNaN(v)?`<code>${v}</code>`:`<code>${v}px</code>`).join(', ');
      fh.innerHTML='Expected: '+expected;
    } else {
      const t=q.targetShapes[0];
      fh.innerHTML=`Expected: color = <code>"${t.color}"</code>`+(q.checkSize?` and size = <code>${t.size}px</code>`:'');
    }
  }

  document.getElementById('whyBtn').classList.add('show');
  isContinue=true;
  const cb=document.getElementById('checkBtn');
  cb.className='check-btn continue';
  cb.textContent=qIdx>=9?'See Results →':'Continue →';
}

function toggleWhy(){
  const p=document.getElementById('whyPanel'),b=document.getElementById('whyBtn');
  if(!p.classList.contains('show')){
    document.getElementById('whySteps').innerHTML=questions[qIdx].why.map(s=>`<li>${s}</li>`).join('');
    p.classList.add('show');b.classList.add('active');
  }else{p.classList.remove('show');b.classList.remove('active');}
}

// ── Init ───────────────────────────────────────────────────────────────────────
function setLevel(lvl){
  currentLevel=lvl;
  document.getElementById('btnEasy').className='level-btn'+(lvl==='easy'?' active-easy':'');
  document.getElementById('btnHard').className='level-btn'+(lvl==='hard'?' active-hard':'');
  initQuiz();
}
function switchLevel(){setLevel(currentLevel==='easy'?'hard':'easy');}

function initQuiz(){
  const pool=currentLevel==='easy'?EASY_POOL:HARD_POOL;
  questions=shuffle(pool).slice(0,10);
  qIdx=0;score=0;
  document.getElementById('resultsWrap').style.display='none';
  document.getElementById('resultsWrap').classList.remove('show');
  document.getElementById('qCard').style.display='';
  document.getElementById('checkBtn').style.display='';
  document.getElementById('feedbackBar').classList.remove('show');
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  document.getElementById('scoreDisp').textContent='0';
  renderQ();
}

function renderQ(){
  const q=questions[qIdx];
  isLocked=false;isContinue=false;openDDKey=null;cmdValues={};hasRun=false;
  document.getElementById('qNum').textContent=qIdx+1;
  document.getElementById('pFill').style.width=(qIdx/10*100)+'%';
  document.getElementById('feedbackBar').classList.remove('show');
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  const cb=document.getElementById('checkBtn');cb.className='check-btn';cb.textContent='Check';
  document.getElementById('qCard').innerHTML=buildCard(q);
  // Draw initial state (only fixed values, no blanks)
  const initShapes=execProgram(q.cmds,{});
  const cv=document.getElementById('codeCanvas');
  if(cv){clearCanvas(cv);if(initShapes.length>0)renderCanvas(cv,initShapes);}
  updateVarPanel();
  updateRunBtn();
  updateCheckBtn();
}

// ── Card HTML ─────────────────────────────────────────────────────────────────
function buildCard(q){
  let h=`<div class="q-title">${q.title}</div><div class="q-task">${q.task}</div>`;
  h+=`<div class="canvas-area">
    <canvas id="codeCanvas" class="code-canvas" width="282" height="190"></canvas>
    <div class="var-panel" id="varPanel"><span class="vp-empty">no vars</span></div>
  </div>`;
  h+=buildCodeBlock(q);
  h+=`<div class="run-row">
    <button class="run-btn" id="runBtn" onclick="runProgram()">
      <span class="run-triangle"></span> Run
    </button>
  </div>`;
  return h;
}

function buildCodeBlock(q){
  let h='<div class="code-block">';
  q.cmds.forEach((cmd,i)=>{
    h+=`<div class="cmd-line"><span class="ln">${i+1}</span>`;
    if(cmd.t==='set'){
      h+=`<span class="kw-set">set</span> <span class="var-ref-tok">${cmd.name}</span> <span class="kw-to">to</span> `;
      if(cmd.val!==null){
        h+=COLORS_MAP[cmd.val]?`<span class="color-tok">"${cmd.val}"</span>`:`<span class="num-tok">${cmd.val}</span>`;
      } else {
        h+=selWidget('s'+i, q.tiles, 'set', cmd.name);
      }
    } else {
      // draw
      h+=`<span class="kw-draw">draw</span> <span class="shape-tok">${cmd.shape}</span> `;
      h+=`<span class="pal-ico">🎨</span> `;
      if(cmd.colorArg!==null){
        h+=COLORS_MAP[cmd.colorArg]?`<span class="color-tok">"${cmd.colorArg}"</span>`:`<span class="var-ref-tok">${cmd.colorArg}</span>`;
      } else {
        h+=selWidget('c'+i, q.tiles, 'draw-color');
      }
      // size param
      if(cmd.sizeArg!==undefined){
        h+=` <span class="sz-ico">📐</span> `;
        if(cmd.sizeArg!==null){
          h+=isNaN(cmd.sizeArg)?`<span class="var-ref-tok">${cmd.sizeArg}</span>`:`<span class="num-tok">${cmd.sizeArg}</span>`;
        } else {
          h+=selWidget('z'+i, q.tiles, 'draw-size');
        }
      }
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function selWidget(key, tiles, mode, varHint){
  let opts='';
  // Variable name options (for draw blanks)
  if(tiles.vars&&tiles.vars.length>0&&(mode==='draw-color'||mode==='draw-size')){
    tiles.vars.forEach(v=>{
      opts+=`<div class="dd-opt var-dd-opt" data-val="${v}" onclick="onOpt(event,'${key}','${v}')">
        <span style="font-style:italic;color:#c084fc;width:16px;text-align:center;font-size:.85rem">x</span>${v}
      </div>`;
    });
    const hasMore=(mode==='draw-color'&&tiles.colors)||( mode==='draw-size'&&tiles.numbers);
    if(hasMore)opts+='<div class="dd-divider"></div>';
  }
  // Color options
  if((mode==='set'&&!varHint?.match(/size|sz/i))||(mode==='draw-color')){
    (tiles.colors||[]).forEach(c=>{
      opts+=`<div class="dd-opt" data-val="${c}" onclick="onOpt(event,'${key}','${c}')">
        <span class="opt-swatch" style="background:${COLORS_MAP[c]}"></span>"${c}"
      </div>`;
    });
  }
  // Number options (for size)
  if((mode==='set'&&varHint?.match(/size|sz/i))||(mode==='draw-size')){
    (tiles.numbers||[]).forEach(n=>{
      opts+=`<div class="dd-opt num-dd-opt" data-val="${n}" onclick="onOpt(event,'${key}',${n})">
        <span style="font-size:.85rem;width:16px;text-align:center">📐</span>${n}px
      </div>`;
    });
  }
  // Fallback: show whatever is in tiles
  if(!opts){
    (tiles.colors||[]).forEach(c=>{
      opts+=`<div class="dd-opt" data-val="${c}" onclick="onOpt(event,'${key}','${c}')">
        <span class="opt-swatch" style="background:${COLORS_MAP[c]}"></span>"${c}"
      </div>`;
    });
    (tiles.numbers||[]).forEach(n=>{
      opts+=`<div class="dd-opt num-dd-opt" data-val="${n}" onclick="onOpt(event,'${key}',${n})">
        <span style="width:16px;text-align:center">📐</span>${n}px
      </div>`;
    });
  }
  return `<div class="cmd-sel" onclick="event.stopPropagation()">
    <button class="cmd-sel-btn" id="ddb_${key}" onclick="toggleDD(event,'${key}')">
      <span>?</span><span class="dd-arr">▾</span>
    </button>
    <div class="dd-panel" id="ddp_${key}">${opts}</div>
  </div>`;
}

function advanceQ(){
  if(qIdx>=9){showResults();return;}
  qIdx++;
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  renderQ();
}

function showResults(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('feedbackBar').classList.remove('show');
  document.getElementById('whyPanel').classList.remove('show');
  document.getElementById('whyBtn').classList.remove('show','active');
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('pFill').style.width='100%';
  const rw=document.getElementById('resultsWrap');rw.style.display='block';rw.classList.add('show');
  document.getElementById('resScore').textContent=score+'/10';
  document.getElementById('resLevel').textContent=currentLevel==='easy'?'Easy Level':'Hard Level';
  const msgs=[[9,"Amazing! You're a coding star — variables and sizes are no problem!"],[7,"Great work! You understand how variables control shapes."],[5,"Good effort! Keep practicing color, size, and variable usage."],[0,"Keep going — every coder practices to get better!"]];
  const m=msgs.find(([min])=>score>=min);
  document.getElementById('resMsg').textContent=m[1];
  document.getElementById('resEmoji').textContent=score>=9?'🏆':score>=7?'🎉':score>=5?'👍':'💪';
  document.getElementById('btnSwitch').textContent=currentLevel==='easy'?'Try Hard Level →':'Try Easy Level →';
}

initQuiz();
</script>
