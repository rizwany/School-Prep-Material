<script>
/* ═══════════════════════════════════════════
   TIME HELPERS
═══════════════════════════════════════════ */
// Times are stored as minutes from midnight (0–1439)
function parseTm(str) {
  // "4 am" → 4*60, "2 pm" → 14*60, "12 pm" → 720, "12 am" → 0
  const m = str.match(/^(\d+)(?::(\d+))?\s*(am|pm)$/i);
  if (!m) return 0;
  let h = parseInt(m[1]), min = parseInt(m[2] || '0'), mer = m[3].toLowerCase();
  if (mer === 'am' && h === 12) h = 0;
  if (mer === 'pm' && h !== 12) h += 12;
  return h * 60 + min;
}

function fmtTm(mins) {
  mins = ((mins % 1440) + 1440) % 1440;
  let h = Math.floor(mins / 60), m = mins % 60;
  const mer = h < 12 ? 'am' : 'pm';
  if (h === 0)  h = 12;
  else if (h > 12) h -= 12;
  return m === 0 ? `${h} ${mer}` : `${h}:${m < 10 ? '0' : ''}${m} ${mer}`;
}

/* ═══════════════════════════════════════════
   SHAPE / OBJECT POOLS  (10 themes)
   Each theme has an emoji icon + a pool of input times
═══════════════════════════════════════════ */
const THEMES = [
  { name: 'clock',    icon: '🕐', label: 'Clock'    },
  { name: 'star',     icon: '⭐', label: 'Star'     },
  { name: 'heart',    icon: '❤️', label: 'Heart'    },
  { name: 'rocket',   icon: '🚀', label: 'Rocket'   },
  { name: 'sun',      icon: '☀️', label: 'Sun'      },
  { name: 'moon',     icon: '🌙', label: 'Moon'     },
  { name: 'diamond',  icon: '💎', label: 'Diamond'  },
  { name: 'lightning',icon: '⚡', label: 'Lightning'},
  { name: 'flower',   icon: '🌸', label: 'Flower'   },
  { name: 'cube',     icon: '📦', label: 'Cube'     },
];

// Shared pool of "nice" times (on the hour or half-hour, reasonable hours)
const TIME_POOL = [
  '1 am','2 am','3 am','4 am','5 am','6 am','7 am','8 am','9 am','10 am','11 am',
  '12 pm','1 pm','2 pm','3 pm','4 pm','5 pm','6 pm','7 pm','8 pm','9 pm','10 pm','11 pm',
  '12 am',
  '6:30 am','7:30 am','8:30 am','9:30 am','10:30 am','11:30 am',
  '12:30 pm','1:30 pm','2:30 pm','3:30 pm','4:30 pm','5:30 pm','6:30 pm','7:30 pm',
];

/* ═══════════════════════════════════════════
   RULE DEFINITIONS  (10 rules)
═══════════════════════════════════════════ */
const RULES = [
  {
    id: 'plus1',  label: '1 hour later',
    delta: 60,
    fn: t => fmtTm(parseTm(t) + 60),
    pool: ['1 am','3 am','5 am','7 am','9 am','11 am','1 pm','3 pm','5 pm','7 pm','9 pm','11 pm'],
  },
  {
    id: 'minus1', label: '1 hour earlier',
    delta: -60,
    fn: t => fmtTm(parseTm(t) - 60),
    pool: ['2 am','4 am','6 am','8 am','10 am','12 pm','2 pm','4 pm','6 pm','8 pm','10 pm','12 am'],
  },
  {
    id: 'plus2',  label: '2 hours later',
    delta: 120,
    fn: t => fmtTm(parseTm(t) + 120),
    pool: ['1 am','3 am','5 am','7 am','9 am','10 am','1 pm','3 pm','5 pm','7 pm','9 pm','10 pm'],
  },
  {
    id: 'minus2', label: '2 hours earlier',
    delta: -120,
    fn: t => fmtTm(parseTm(t) - 120),
    pool: ['3 am','5 am','7 am','9 am','11 am','12 pm','3 pm','5 pm','7 pm','9 pm','11 pm','12 am'],
  },
  {
    id: 'plus3',  label: '3 hours later',
    delta: 180,
    fn: t => fmtTm(parseTm(t) + 180),
    pool: ['1 am','4 am','7 am','10 am','1 pm','4 pm','7 pm','10 pm','2 am','5 am','8 am','11 am'],
  },
  {
    id: 'minus3', label: '3 hours earlier',
    delta: -180,
    fn: t => fmtTm(parseTm(t) - 180),
    pool: ['4 am','7 am','10 am','1 pm','4 pm','7 pm','10 pm','3 am','6 am','9 am','12 pm','3 am'],
  },
  {
    id: 'plus4',  label: '4 hours later',
    delta: 240,
    fn: t => fmtTm(parseTm(t) + 240),
    pool: ['1 am','5 am','8 am','12 pm','4 pm','8 pm','2 am','6 am','10 am','2 pm','6 pm','10 pm'],
  },
  {
    id: 'minus4', label: '4 hours earlier',
    delta: -240,
    fn: t => fmtTm(parseTm(t) - 240),
    pool: ['5 am','9 am','1 pm','5 pm','9 pm','8 am','12 pm','4 pm','8 pm','6 am','10 am','2 pm'],
  },
  {
    id: 'plus30', label: '30 minutes later',
    delta: 30,
    fn: t => fmtTm(parseTm(t) + 30),
    pool: ['1 am','2 am','3 am','4 am','5 am','6 am','7 am','8 am','9 am','10 am','11 am','12 pm'],
  },
  {
    id: 'minus30',label: '30 minutes earlier',
    delta: -30,
    fn: t => fmtTm(parseTm(t) - 30),
    pool: ['1:30 am','2:30 am','3:30 am','4:30 am','6:30 am','7:30 am','8:30 am','9:30 am','10:30 am','11:30 am','12:30 pm','1:30 pm'],
  },
];

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
const pick    = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => [...a].sort(() => Math.random() - .5);

/* ═══════════════════════════════════════════
   DISTRACTOR GENERATORS
═══════════════════════════════════════════ */
function wrongOutputs(rule, input, correct) {
  const wrongs = new Set();
  // Apply other rules to same input
  for (const r of RULES) {
    if (r.id !== rule.id) {
      const o = r.fn(input);
      if (o !== correct) wrongs.add(o);
    }
  }
  // Off-by-one hour
  const plus  = fmtTm(parseTm(correct) + 60);
  const minus = fmtTm(parseTm(correct) - 60);
  if (plus  !== correct) wrongs.add(plus);
  if (minus !== correct) wrongs.add(minus);
  // AM/PM swap
  const swapped = correct.replace(/am/, '__').replace(/pm/, 'am').replace('__', 'pm');
  if (swapped !== correct) wrongs.add(swapped);

  return shuffle([...wrongs]).filter(v => v !== correct).slice(0, 3);
}

function wrongInputs(rule, targetOut, correct) {
  const wrongs = new Set();
  for (const t of TIME_POOL) {
    if (t !== correct && rule.fn(t) !== targetOut) wrongs.add(t);
  }
  return shuffle([...wrongs]).slice(0, 3);
}

/* ═══════════════════════════════════════════
   QUESTION GENERATORS
═══════════════════════════════════════════ */
function genIdentify(rule, theme) {
  const examples = shuffle(rule.pool).slice(0, 3);
  const pairs = examples.map(t => ({ inp: t, out: rule.fn(t) }));
  const distractors = shuffle(RULES.filter(r => r.id !== rule.id)).slice(0, 3);
  const allOpts = shuffle([rule, ...distractors]);
  return {
    qtype: 'identify', theme,
    questionText: `Which rule could produce these outputs?`,
    ruleLabel: null,
    pairs,
    targetIn: null, targetOut: null,
    options: allOpts.map(r => r.label),
    correctIndex: allOpts.indexOf(rule),
    hint: 'Count how many hours or minutes changed between each input and output.',
  };
}

function genApply(rule, theme) {
  const shuffled = shuffle(rule.pool);
  const examples = shuffled.slice(0, 3);
  const newTime  = shuffled[3] || shuffled[0];
  const pairs    = examples.map(t => ({ inp: t, out: rule.fn(t) }));
  const correct  = rule.fn(newTime);
  const wrongs   = wrongOutputs(rule, newTime, correct);
  const allOpts  = shuffle([correct, ...wrongs]);
  return {
    qtype: 'apply', theme,
    questionText: `What is the output when the input is ${newTime}?`,
    ruleLabel: rule.label,
    pairs,
    targetIn: newTime, targetOut: null,
    options: allOpts,
    correctIndex: allOpts.indexOf(correct),
    hint: `Apply "${rule.label}" to ${newTime}: add/subtract the time shown.`,
  };
}

function genReverse(rule, theme) {
  const shuffled   = shuffle(rule.pool);
  const examples   = shuffled.slice(0, 3);
  const targetTime = shuffled[3] || shuffled[0];
  const targetOut  = rule.fn(targetTime);
  const pairs      = examples.map(t => ({ inp: t, out: rule.fn(t) }));
  const wrongs     = wrongInputs(rule, targetOut, targetTime);
  const allOpts    = shuffle([targetTime, ...wrongs]);
  return {
    qtype: 'reverse', theme,
    questionText: `Which input would produce the output ${targetOut}?`,
    ruleLabel: rule.label,
    pairs,
    targetIn: null, targetOut,
    options: allOpts,
    correctIndex: allOpts.indexOf(targetTime),
    hint: `Work backwards: if "${rule.label}" gives ${targetOut}, what time did you start with?`,
  };
}

/* ═══════════════════════════════════════════
   BUILD DIAGRAM HTML
═══════════════════════════════════════════ */
function buildDiagram(q) {
  const isKnown  = q.qtype !== 'identify';
  const pillText = isKnown ? q.label || q.ruleLabel : '?';
  const icon     = q.theme ? q.theme.icon : '🕐';

  const inputRows  = q.pairs.map(p => p.inp);
  const outputRows = q.pairs.map(p => p.out);

  if (q.qtype === 'apply')   { inputRows.push(q.targetIn);  outputRows.push(null); }
  if (q.qtype === 'reverse') { inputRows.push(null);         outputRows.push(q.targetOut); }

  const inBoxHTML = inputRows.map((v, i) => {
    const isTarget = (q.qtype === 'apply' || q.qtype === 'reverse') && i === inputRows.length - 1;
    const valHTML  = v === null
      ? `<span class="io-unk">?</span>`
      : `<div class="cell"><span class="shape-icon">${icon}</span><span class="time-lbl${isTarget ? ' bold' : ''}">${v}</span></div>`;
    return `<div class="io-item in-item" id="inrow-${i}">${valHTML}<span class="io-dot"></span></div>`;
  }).join('');

  const outBoxHTML = outputRows.map((v, i) => {
    const isTarget = q.qtype === 'reverse' && i === outputRows.length - 1;
    const valHTML  = v === null
      ? `<span class="io-unk">?</span>`
      : `<div class="cell"><span class="shape-icon">${icon}</span><span class="time-lbl${isTarget ? ' bold' : ''}">${v}</span></div>`;
    return `<div class="io-item out-item" id="outrow-${i}"><span class="io-arr">▶</span>${valHTML}</div>`;
  }).join('');

  // Determine pill label (apply/reverse have ruleLabel; identify has '?')
  const pillLabel = isKnown ? q.ruleLabel : '?';

  return `
    <div class="machine${isKnown ? ' rule-known' : ''}">
      <div class="rule-row"><div class="rule-pill${isKnown ? ' known' : ''}">${pillLabel}</div></div>
      <div class="diagram-labels"><span>inputs</span><span>outputs</span></div>
      <div class="diagram-wrapper" id="diagramWrap">
        <div class="io-box" id="inputBox">${inBoxHTML}</div>
        <div class="io-box" id="outputBox">${outBoxHTML}</div>
        <div class="rule-glow"></div>
        <svg class="lines-svg" id="linesSvg"></svg>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════
   DRAW SVG LINES
═══════════════════════════════════════════ */
function drawLines(rowCount) {
  const wrap   = document.getElementById('diagramWrap');
  const inBox  = document.getElementById('inputBox');
  const outBox = document.getElementById('outputBox');
  const svg    = document.getElementById('linesSvg');
  if (!wrap || !inBox || !outBox || !svg) return;

  const wR      = wrap.getBoundingClientRect();
  const inRect  = inBox.getBoundingClientRect();
  const outRect = outBox.getBoundingClientRect();

  const lines = [];
  for (let i = 0; i < rowCount; i++) {
    const inRow  = document.getElementById(`inrow-${i}`);
    const outRow = document.getElementById(`outrow-${i}`);
    if (!inRow || !outRow) continue;
    const iR = inRow.getBoundingClientRect();
    const oR = outRow.getBoundingClientRect();
    lines.push({
      x1: (inRect.right  - wR.left).toFixed(1),
      y1: (iR.top + iR.height / 2 - wR.top).toFixed(1),
      x2: (outRect.left  - wR.left).toFixed(1),
      y2: (oR.top + oR.height / 2 - wR.top).toFixed(1),
    });
  }

  svg.setAttribute('viewBox', `0 0 ${wR.width.toFixed(1)} ${wR.height.toFixed(1)}`);
  svg.setAttribute('width',   wR.width.toFixed(1));
  svg.setAttribute('height',  wR.height.toFixed(1));
  svg.innerHTML = `<defs>
    <marker id="ah" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="rgba(255,255,255,0.35)"/>
    </marker>
  </defs>
  ${lines.map(l => `<line x1="${l.x1}" y1="${l.y1}" x2="${l.x2}" y2="${l.y2}"
    stroke="rgba(255,255,255,0.28)" stroke-width="1.5"
    stroke-dasharray="4,3" marker-end="url(#ah)"/>`).join('')}`;
}

window.addEventListener('resize', () => {
  if (typeof currentRowCount !== 'undefined') setTimeout(() => drawLines(currentRowCount), 80);
});
let currentRowCount = 3;

/* ═══════════════════════════════════════════
   RENDER QUESTION
═══════════════════════════════════════════ */
function renderQuestion(q) {
  currentRowCount = q.pairs.length + (q.qtype !== 'identify' ? 1 : 0);

  document.getElementById('qCard').innerHTML = `
    <p class="q-text">${q.questionText}</p>
    ${buildDiagram(q)}
    <div class="options-grid" id="optionsGrid">
      ${q.options.map((lbl, i) => `<button class="opt-btn" data-opt="${i}" onclick="selectOpt(${i})">${lbl}</button>`).join('')}
    </div>
    <div class="start-over-row">
      <button class="start-over-btn" onclick="initQuiz()">↺ Start over</button>
    </div>`;

  requestAnimationFrame(() => requestAnimationFrame(() => drawLines(currentRowCount)));
}

/* ═══════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════ */
let questions = [], qIdx = 0, selOpt = null;
let isAnswered = false, isLocked = false, score = 0;

function selectOpt(i) {
  if (isLocked) return;
  selOpt = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
  });
  document.getElementById('checkBtn').className = 'check-btn ready';
}

function checkAnswer() {
  const q = questions[qIdx];
  if (isAnswered) { advanceQuestion(); return; }
  if (selOpt === null) return;

  isAnswered = isLocked = true;
  const correct = selOpt === q.correctIndex;

  document.getElementById('optionsGrid').innerHTML = q.options.map((lbl, i) => {
    let cls = 'opt-btn locked';
    if (i === q.correctIndex) cls += ' correct';
    else if (i === selOpt && !correct) cls += ' wrong';
    return `<button class="${cls}">${lbl}</button>`;
  }).join('');

  if (correct) {
    score++;
    document.getElementById('scoreDisp').textContent = score;
  }

  const bar = document.getElementById('feedbackBar');
  bar.className = `feedback-bar ${correct ? 'ok' : 'err'} show`;
  document.getElementById('fbIcon').textContent = correct ? '✓' : '✗';
  const titleEl = document.getElementById('fbTitle');
  titleEl.className = `fb-title ${correct ? 'ok' : 'err'}`;
  titleEl.textContent = correct ? 'Correct!' : `Answer: "${q.options[q.correctIndex]}"`;
  document.getElementById('fbHint').textContent = q.hint;

  document.getElementById('pFill').style.width = (((qIdx + 1) / 10) * 100) + '%';
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn continue';
  btn.textContent = qIdx < 9 ? 'Continue →' : 'See Results →';
}

function advanceQuestion() {
  qIdx++;
  if (qIdx >= 10) { showResults(); return; }
  selOpt = null; isAnswered = isLocked = false;
  document.getElementById('qNum').textContent       = qIdx + 1;
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('checkBtn').className     = 'check-btn';
  document.getElementById('checkBtn').textContent   = 'Check';
  renderQuestion(questions[qIdx]);
}

function showResults() {
  document.getElementById('qCard').style.display    = 'none';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('resultsWrap').className  = 'results-wrap show';
  const pct = score / 10;
  const [emoji, msg] =
    pct === 1  ? ['🏆','Perfect! You mastered every time function!']
    : pct >= .8 ? ['🎉','Excellent! You really understand how time functions work.']
    : pct >= .6 ? ['👍','Good effort! Review the hints and try again.']
    : pct >= .4 ? ['📚','Keep practicing — the time patterns will click!']
                : ['💡','Read the hints carefully after each question.'];
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resScore').textContent = `${score}/10`;
  document.getElementById('resMsg').textContent   = msg;
}

/* ═══════════════════════════════════════════
   INIT — picks 4 rules × 10 different shape themes
   builds 3+3+3+1 questions
═══════════════════════════════════════════ */
function initQuiz() {
  qIdx = score = 0; selOpt = null; isAnswered = isLocked = false;

  const selectedRules  = shuffle(RULES).slice(0, 4);
  const selectedThemes = shuffle(THEMES);

  let ti = 0; // theme index
  const nextTheme = () => selectedThemes[ti++ % selectedThemes.length];

  questions = [
    genIdentify(selectedRules[0], nextTheme()),
    genApply   (selectedRules[0], nextTheme()),
    genReverse (selectedRules[0], nextTheme()),

    genIdentify(selectedRules[1], nextTheme()),
    genApply   (selectedRules[1], nextTheme()),
    genReverse (selectedRules[1], nextTheme()),

    genIdentify(selectedRules[2], nextTheme()),
    genApply   (selectedRules[2], nextTheme()),
    genReverse (selectedRules[2], nextTheme()),

    pick([genIdentify, genApply, genReverse])(selectedRules[3], nextTheme()),
  ];

  document.getElementById('qCard').style.display    = '';
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('checkBtn').className     = 'check-btn';
  document.getElementById('checkBtn').textContent   = 'Check';
  document.getElementById('feedbackBar').className  = 'feedback-bar';
  document.getElementById('resultsWrap').className  = 'results-wrap';
  document.getElementById('scoreDisp').textContent  = 0;
  document.getElementById('qNum').textContent       = 1;
  document.getElementById('pFill').style.width      = '0%';

  renderQuestion(questions[0]);
}

document.getElementById('checkBtn').addEventListener('click', checkAnswer);
initQuiz();
</script>
