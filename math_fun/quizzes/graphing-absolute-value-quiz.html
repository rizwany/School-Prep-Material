  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f14; --card: #1d1f2b; --border: #2a2c3a;
      --text: #f0f0f8; --muted: rgba(240,240,248,.42);
      --green: #58cc02; --green-dk: #46a301; --red: #ff4b4b;
      --blue: #4361ee; --purple: #7c3aed;
      --opt-bg: #1e2030; --opt-brd: #313446; --radius: 16px;
    }
    body { font-family: 'Nunito', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    header { background: #fff; border-bottom: 2px solid #e2e6f0; padding: 0 24px; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
    .header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo-link { text-decoration: none; display: flex; align-items: center; }
    .logo-img  { height: 34px; width: auto; }
    .logo-txt  { font-weight: 900; font-size: 1.15rem; color: #4361ee; }
    nav a { font-weight: 700; font-size: 0.85rem; color: #5a6076; text-decoration: none; padding: 6px 12px; border-radius: 8px; transition: color .15s, background .15s; }
    nav a:hover { color: #4361ee; background: #eef1fd; }

    main { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .quiz-shell { width: 100%; max-width: 520px; padding: 16px 20px 80px; display: flex; flex-direction: column; flex: 1; }

    .level-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
    .level-btn { font-family: inherit; font-size: 0.8rem; font-weight: 800; padding: 6px 18px; border-radius: 999px; cursor: pointer; border: 2px solid var(--opt-brd); background: var(--opt-bg); color: var(--muted); transition: all .15s; }
    .level-btn.active-easy { border-color: var(--green); background: #172110; color: #88e04a; }
    .level-btn.active-hard { border-color: var(--purple); background: #1e1535; color: #c084fc; }

    .progress-wrap { margin-bottom: 16px; }
    .progress-track { height: 8px; background: #252733; border-radius: 4px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--green); border-radius: 4px; width: 0%; transition: width .4s ease; }
    .progress-meta  { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    .q-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px 18px 18px; margin-bottom: 14px; }
    .q-text { font-size: 1.02rem; font-weight: 800; line-height: 1.55; margin-bottom: 16px; color: var(--text); }

    /* ── Graph + table ── */
    .graph-area { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .coord-svg  { cursor: crosshair; flex-shrink: 0; touch-action: none; display: block; }

    /* Value table */
    .val-table-wrap { flex: 1; min-width: 90px; }
    .val-table { width: 100%; border-collapse: collapse; }
    .val-table th { font-size: 0.75rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: 5px 8px; border-bottom: 1.5px solid var(--border); text-align: center; font-style: italic; }
    .val-table td { font-size: 0.88rem; font-weight: 700; padding: 5px 8px; text-align: center; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.05); }
    .val-table .tr-ok td   { color: #88e04a; }
    .val-table .tr-err td  { color: #ff8080; }
    .val-table .tr-tgt td  { color: #a0b4ff; font-weight: 900; }
    .val-table .tr-tgt .fx-q { color: var(--muted); }
    .val-table .tr-tgt .fx-placed { color: #a0b4ff; }

    .plot-hint { text-align: center; font-size: 0.72rem; font-weight: 700; color: var(--muted); margin-top: 8px; }
    .plot-hint span { color: #a0b4ff; }

    /* ── Coordinate display ── */
    .coord-display { background: #181921; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; text-align: center; font-size: 1.1rem; font-weight: 800; color: var(--muted); margin-bottom: 10px; }
    .coord-display .cx { color: #a0b4ff; }
    .coord-display .blank { display: inline-block; background: #2a2c3a; border: 2px dashed #3d3f52; border-radius: 8px; min-width: 44px; padding: 1px 10px; color: rgba(255,255,255,.25); }
    .coord-display .filled { display: inline-block; background: rgba(67,97,238,.22); border: 2px solid rgba(67,97,238,.7); border-radius: 8px; min-width: 44px; padding: 1px 10px; color: #a0b4ff; transition: all .2s; }
    .coord-display .correct-fill { background: rgba(88,204,2,.18); border-color: var(--green); color: #88e04a; }
    .coord-display .wrong-fill   { background: rgba(255,75,75,.18); border-color: var(--red); color: #ff8080; }

    /* ── Tiles ── */
    .tiles-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .tile-btn { background: var(--opt-bg); border: 2px solid var(--opt-brd); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 0.92rem; font-weight: 800; min-width: 56px; height: 48px; padding: 0 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s, transform .1s; }
    .tile-btn:hover:not(.locked) { border-color: #555870; background: #252737; }
    .tile-btn:active:not(.locked) { transform: scale(.95); }
    .tile-btn.selected { border-color: #6070cc; background: #1e2240; }
    .tile-btn.correct  { border-color: var(--green) !important; background: #172110 !important; color: #88e04a; }
    .tile-btn.wrong    { border-color: var(--red)   !important; background: #221212 !important; color: #ff8080; }
    .tile-btn.locked   { cursor: default; }

    /* ── Identify options ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .opt-btn { background: var(--opt-bg); border: 2px solid var(--opt-brd); border-radius: 14px; color: var(--text); font-family: inherit; font-size: 0.88rem; font-weight: 700; padding: 13px 8px; cursor: pointer; text-align: center; font-style: italic; transition: border-color .15s, background .15s, transform .1s; }
    .opt-btn:hover:not(.locked) { border-color: #555870; background: #252737; }
    .opt-btn:active:not(.locked) { transform: scale(.97); }
    .opt-btn.selected { border-color: #6070cc; background: #1e2240; }
    .opt-btn.correct  { border-color: var(--green) !important; background: #172110 !important; color: #88e04a; }
    .opt-btn.wrong    { border-color: var(--red)   !important; background: #221212 !important; color: #ff8080; }
    .opt-btn.locked   { cursor: default; }

    .start-over-row { display: flex; justify-content: flex-end; margin-top: 4px; }
    .start-over-btn { background: none; border: none; color: var(--muted); font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: color .15s; }
    .start-over-btn:hover { color: var(--text); }

    .feedback-bar { border-radius: 12px; padding: 12px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; opacity: 0; transition: opacity .2s; }
    .feedback-bar.show { opacity: 1; }
    .feedback-bar.ok  { background: #172110; border: 1.5px solid #2d4a1e; }
    .feedback-bar.err { background: #221212; border: 1.5px solid #4a1f1f; }
    .fb-icon  { font-size: 1.1rem; flex-shrink: 0; }
    .fb-body  { flex: 1; }
    .fb-title { font-size: 0.88rem; font-weight: 900; margin-bottom: 2px; }
    .fb-title.ok  { color: #88e04a; }
    .fb-title.err { color: #ff8080; }
    .fb-hint  { font-size: 0.78rem; font-weight: 600; color: var(--muted); line-height: 1.5; }

    .why-panel { background: #14182a; border: 1.5px solid rgba(67,97,238,.4); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: none; animation: slideIn .2s ease; }
    .why-panel.show { display: block; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:translateY(0) } }
    .why-title { font-size: 0.8rem; font-weight: 900; color: #a0b4ff; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .why-steps { list-style: none; }
    .why-steps li { font-size: 0.82rem; font-weight: 700; color: var(--muted); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.05); line-height: 1.5; }
    .why-steps li:last-child { border-bottom: none; color: #88e04a; }
    .why-steps li span { color: #a0b4ff; }

    .btn-row { display: flex; gap: 10px; }
    .why-btn { flex-shrink: 0; padding: 16px 18px; border: 2px solid var(--opt-brd); border-radius: 999px; font-family: inherit; font-size: 0.9rem; font-weight: 800; cursor: pointer; background: var(--opt-bg); color: var(--muted); transition: all .15s; display: none; }
    .why-btn.show { display: block; }
    .why-btn:hover { border-color: #a0b4ff; color: #a0b4ff; }
    .why-btn.active { border-color: rgba(67,97,238,.7); background: rgba(67,97,238,.15); color: #a0b4ff; }
    .check-btn { flex: 1; padding: 16px; border: none; border-radius: 999px; font-family: inherit; font-size: 1rem; font-weight: 900; cursor: pointer; background: #252737; color: var(--muted); transition: background .15s, color .15s; }
    .check-btn.ready    { background: var(--blue);  color: #fff; }
    .check-btn.ready:hover { background: #3451d1; }
    .check-btn.continue { background: var(--green); color: #fff; }
    .check-btn.continue:hover { background: var(--green-dk); }

    .results-wrap { text-align: center; display: none; padding: 20px 0 40px; }
    .results-wrap.show { display: block; }
    .res-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 34px 28px 28px; }
    .res-emoji { font-size: 3rem; margin-bottom: 10px; }
    .res-title { font-size: 1.4rem; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .res-level { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .08em; }
    .res-score { font-size: 2.8rem; font-weight: 900; color: var(--green); margin: 14px 0 2px; }
    .res-label { font-size: 0.82rem; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
    .res-msg   { font-size: 0.88rem; font-weight: 700; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
    .btn-retry  { background: var(--blue); color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 800; padding: 14px 36px; border: none; border-radius: 999px; cursor: pointer; transition: background .15s; display: block; width: 100%; margin-bottom: 10px; }
    .btn-retry:hover { background: #3451d1; }
    .btn-switch { background: none; border: 1.5px solid var(--opt-brd); color: var(--muted); font-family: inherit; font-size: 0.85rem; font-weight: 700; padding: 10px 24px; border-radius: 999px; cursor: pointer; transition: all .15s; width: 100%; margin-bottom: 10px; }
    .btn-switch:hover { border-color: #a0b4ff; color: #a0b4ff; }
    .btn-home { background: none; border: 1.5px solid var(--border); color: var(--muted); font-family: inherit; font-size: 0.85rem; font-weight: 700; padding: 10px 24px; border-radius: 999px; cursor: pointer; transition: all .15s; width: 100%; }
    .btn-home:hover { border-color: #555870; color: var(--text); }

    footer { background: #0a0b10; color: rgba(255,255,255,.4); padding: 16px 24px; text-align: center; font-size: 0.75rem; font-weight: 600; }
    footer a { color: rgba(255,255,255,.25); text-decoration: none; }
    footer a:hover { color: rgba(255,255,255,.7); }

    @media (max-width: 400px) {
      .quiz-shell { padding: 12px 12px 70px; }
      .opt-btn { font-size: 0.8rem; padding: 10px 6px; }
      .tile-btn { min-width: 48px; height: 44px; font-size: 0.84rem; }
    }
  </style>
</head>

<script>
const pick    = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => [...a].sort(() => Math.random() - .5);
const fmt     = n => Number.isInteger(n) ? String(n) : String(n); // keep decimals as-is

/* ═══════════════════════════════════════════
   RULE DEFINITIONS
   xEx      = integer x values for plot_all / identify (5 points)
   xTgt     = decimal or integer x for single_plot question
   tileOpts = answer tile choices for single_plot
   yMin/yMax      = grid for plot_all & identify
   pYMin/pYMax    = grid for single_plot (wider / taller to show V-shape)
   pXMin/pXMax    = x range for single_plot graph
   why(x)  → step strings
═══════════════════════════════════════════ */
const EASY_RULES = [
  {
    id:'abs',   fxLabel:'f(x) = |x|',
    fn: x => Math.abs(x),
    xEx:[-2,-1,0,1,2], xTgt:-0.5,
    tileOpts:[-1,-0.5,0,0.5,1],
    yMin:-1, yMax:5, pYMin:-2, pYMax:6, pXMin:-4, pXMax:4,
    distractors:['f(x) = x','f(x) = −x','f(x) = x²'],
    why: x => [`|x| means the distance from zero — always ≥ 0`,`|${x}| = <span>${Math.abs(x)}</span>`,`Plot the point (<span>${x}</span>, <span>${Math.abs(x)}</span>)`],
  },
  {
    id:'absp1', fxLabel:'f(x) = |x| + 1',
    fn: x => Math.abs(x)+1,
    xEx:[-2,-1,0,1,2], xTgt:0.5,
    tileOpts:[0.5,1,1.5,2,2.5],
    yMin:0, yMax:5, pYMin:-1, pYMax:7, pXMin:-4, pXMax:4,
    distractors:['f(x) = |x|','f(x) = x + 1','f(x) = x²'],
    why: x => [`|x| + 1: first find |x|, then add 1`,`|${x}| = ${Math.abs(x)}`,`${Math.abs(x)} + 1 = <span>${Math.abs(x)+1}</span>`],
  },
  {
    id:'absp2', fxLabel:'f(x) = |x| + 2',
    fn: x => Math.abs(x)+2,
    xEx:[-2,-1,0,1,2], xTgt:-1.5,
    tileOpts:[1.5,2,2.5,3,3.5],
    yMin:0, yMax:6, pYMin:-1, pYMax:8, pXMin:-4, pXMax:4,
    distractors:['f(x) = |x| + 1','f(x) = x + 2','f(x) = 2x'],
    why: x => [`|x| + 2: find |x|, then add 2`,`|${x}| = ${Math.abs(x)}`,`${Math.abs(x)} + 2 = <span>${Math.abs(x)+2}</span>`],
  },
  {
    id:'absm1', fxLabel:'f(x) = |x| − 1',
    fn: x => Math.abs(x)-1,
    xEx:[-2,-1,0,1,2], xTgt:0.5,
    tileOpts:[-0.5,0,0.5,1,1.5],
    yMin:-2, yMax:4, pYMin:-2, pYMax:5, pXMin:-4, pXMax:4,
    distractors:['f(x) = |x|','f(x) = x − 1','f(x) = −x'],
    why: x => [`|x| − 1: find |x|, then subtract 1`,`|${x}| = ${Math.abs(x)}`,`${Math.abs(x)} − 1 = <span>${Math.abs(x)-1}</span>`],
  },
  {
    id:'2abs', fxLabel:'f(x) = 2|x|',
    fn: x => 2*Math.abs(x),
    xEx:[-2,-1,0,1,2], xTgt:-0.5,
    tileOpts:[0,0.5,1,1.5,2],
    yMin:-1, yMax:5, pYMin:-1, pYMax:9, pXMin:-4, pXMax:4,
    distractors:['f(x) = |x|','f(x) = 2x','f(x) = x²'],
    why: x => [`2|x|: find |x|, then multiply by 2`,`|${x}| = ${Math.abs(x)}`,`2 × ${Math.abs(x)} = <span>${2*Math.abs(x)}</span>`],
  },
  {
    id:'absxp1', fxLabel:'f(x) = |x + 1|',
    fn: x => Math.abs(x+1),
    xEx:[-3,-2,-1,0,1], xTgt:0.5,
    tileOpts:[0.5,1,1.5,2,2.5],
    yMin:-1, yMax:5, pYMin:-1, pYMax:6, pXMin:-4, pXMax:3,
    distractors:['f(x) = |x|','f(x) = |x − 1|','f(x) = x + 1'],
    why: x => [`|x + 1|: add 1 to x first, then take |…|`,`${x} + 1 = ${x+1}`,`|${x+1}| = <span>${Math.abs(x+1)}</span> — vertex shifts to x = −1`],
  },
  {
    id:'absxm1', fxLabel:'f(x) = |x − 1|',
    fn: x => Math.abs(x-1),
    xEx:[-1,0,1,2,3], xTgt:-0.5,
    tileOpts:[0.5,1,1.5,2,2.5],
    yMin:-1, yMax:5, pYMin:-1, pYMax:6, pXMin:-3, pXMax:4,
    distractors:['f(x) = |x|','f(x) = |x + 1|','f(x) = x − 1'],
    why: x => [`|x − 1|: subtract 1 from x first, then take |…|`,`${x} − 1 = ${x-1}`,`|${x-1}| = <span>${Math.abs(x-1)}</span> — vertex shifts to x = 1`],
  },
];

const HARD_RULES = [
  {
    id:'2absp1', fxLabel:'f(x) = 2|x| + 1',
    fn: x => 2*Math.abs(x)+1,
    xEx:[-2,-1,0,1,2], xTgt:0.5,
    tileOpts:[0,0.5,1,1.5,2],
    yMin:0, yMax:6, pYMin:-1, pYMax:10, pXMin:-4, pXMax:4,
    distractors:['f(x) = 2|x|','f(x) = |x| + 1','f(x) = 2x + 1'],
    why: x => [`2|x| + 1: double the absolute value, then add 1`,`|${x}| = ${Math.abs(x)}`,`2 × ${Math.abs(x)} + 1 = ${2*Math.abs(x)} + 1 = <span>${2*Math.abs(x)+1}</span>`],
  },
  {
    id:'negabs', fxLabel:'f(x) = −|x|',
    fn: x => -Math.abs(x),
    xEx:[-2,-1,0,1,2], xTgt:-0.5,
    tileOpts:[-1,-0.5,0,0.5,1],
    yMin:-5, yMax:1, pYMin:-6, pYMax:2, pXMin:-4, pXMax:4,
    distractors:['f(x) = |x|','f(x) = −x','f(x) = −x²'],
    why: x => [`−|x|: take the absolute value, then negate it`,`|${x}| = ${Math.abs(x)}`,`−(${Math.abs(x)}) = <span>${-Math.abs(x)}</span> — inverted V (opens downward)`],
  },
  {
    id:'negabsp4', fxLabel:'f(x) = −|x| + 4',
    fn: x => -Math.abs(x)+4,
    xEx:[-2,-1,0,1,2], xTgt:0.5,
    tileOpts:[2.5,3,3.5,4,4.5],
    yMin:-1, yMax:5, pYMin:-2, pYMax:6, pXMin:-4, pXMax:4,
    distractors:['f(x) = |x| + 4','f(x) = −|x|','f(x) = −x + 4'],
    why: x => [`−|x| + 4: negate |x|, then add 4`,`|${x}| = ${Math.abs(x)}`,`−${Math.abs(x)} + 4 = <span>${-Math.abs(x)+4}</span>`],
  },
  {
    id:'absxp2', fxLabel:'f(x) = |x + 2|',
    fn: x => Math.abs(x+2),
    xEx:[-4,-3,-2,-1,0], xTgt:0.5,
    tileOpts:[1.5,2,2.5,3,3.5],
    yMin:-1, yMax:5, pYMin:-1, pYMax:7, pXMin:-5, pXMax:3,
    distractors:['f(x) = |x|','f(x) = |x + 1|','f(x) = x + 2'],
    why: x => [`|x + 2|: add 2 to x first, then take |…|`,`${x} + 2 = ${x+2}`,`|${x+2}| = <span>${Math.abs(x+2)}</span> — vertex at x = −2`],
  },
  {
    id:'absxm2', fxLabel:'f(x) = |x − 2|',
    fn: x => Math.abs(x-2),
    xEx:[0,1,2,3,4], xTgt:-0.5,
    tileOpts:[1.5,2,2.5,3,3.5],
    yMin:-1, yMax:5, pYMin:-1, pYMax:7, pXMin:-2, pXMax:5,
    distractors:['f(x) = |x|','f(x) = |x + 2|','f(x) = x − 2'],
    why: x => [`|x − 2|: subtract 2 from x first, then take |…|`,`${x} − 2 = ${x-2}`,`|${x-2}| = <span>${Math.abs(x-2)}</span> — vertex at x = 2`],
  },
  {
    id:'3abs', fxLabel:'f(x) = 3|x|',
    fn: x => 3*Math.abs(x),
    xEx:[-2,-1,0,1,2], xTgt:0.5,
    tileOpts:[0,0.5,1,1.5,2],
    yMin:-1, yMax:7, pYMin:-1, pYMax:13, pXMin:-4, pXMax:4,
    distractors:['f(x) = 2|x|','f(x) = 3x','f(x) = |x|'],
    why: x => [`3|x|: find |x|, then multiply by 3`,`|${x}| = ${Math.abs(x)}`,`3 × ${Math.abs(x)} = <span>${3*Math.abs(x)}</span>`],
  },
];

/* ═══════════════════════════════════════════
   GRAPH CONSTANTS
═══════════════════════════════════════════ */
const PL=32, PB=28, PT=12, PR=10;

function gSize(xMin, xMax, yMin, yMax, maxW=218, maxH=285) {
  const CW = Math.min(44, Math.floor((maxW-PL-PR)/(xMax-xMin)));
  const CH = Math.min(34, Math.floor((maxH-PT-PB)/(yMax-yMin)));
  return { CW, CH, W: PL+(xMax-xMin)*CW+PR, H: PT+(yMax-yMin)*CH+PB };
}
function coords(xMin, yMax, CW, CH) {
  return { sx: x => PL+(x-xMin)*CW, sy: y => PT+(yMax-y)*CH };
}

/* ── SVG primitives ── */
function svgGrid(xMin,xMax,yMin,yMax,sx,sy) {
  let g='';
  for (let y=yMin;y<=yMax;y++) g+=`<line x1="${sx(xMin)}" y1="${sy(y)}" x2="${sx(xMax)}" y2="${sy(y)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
  for (let x=xMin;x<=xMax;x++) g+=`<line x1="${sx(x)}" y1="${sy(yMin)}" x2="${sx(x)}" y2="${sy(yMax)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
  return g;
}
function svgAxes(xMin,xMax,yMin,yMax,sx,sy,W,H,showLabels=false) {
  const ac='rgba(255,255,255,0.5)';
  const yAx = sx(0)>=PL&&sx(0)<=W-PR ? `<line x1="${sx(0)}" y1="${PT}" x2="${sx(0)}" y2="${H-PB+6}" stroke="${ac}" stroke-width="1.5" marker-end="url(#axA)"/>` : '';
  const xAx = sy(0)>=PT&&sy(0)<=H-PB ? `<line x1="${PL}" y1="${sy(0)}" x2="${W-PR+6}" y2="${sy(0)}" stroke="${ac}" stroke-width="1.5" marker-end="url(#axA)"/>` : '';
  let axisLabels = '';
  if (showLabels) {
    // y label
    if (sx(0)>=PL) axisLabels += `<text x="${sx(0)+6}" y="${PT+14}" font-size="11" font-weight="800" fill="rgba(255,255,255,0.5)" font-family="Nunito,sans-serif">y</text>`;
    // x label
    if (sy(0)>=PT) axisLabels += `<text x="${W-PR+8}" y="${sy(0)+4}" font-size="11" font-weight="800" fill="rgba(255,255,255,0.5)" font-family="Nunito,sans-serif">x</text>`;
  }
  return `<defs><marker id="axA" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="${ac}"/></marker></defs>${yAx}${xAx}${axisLabels}`;
}
function svgNumLabels(xMin,xMax,yMin,yMax,sx,sy) {
  let l='';
  for (let y=yMin;y<=yMax;y++) {
    if (y===0) continue;
    l+=`<text x="${PL-5}" y="${sy(y)+4}" text-anchor="end" fill="rgba(255,255,255,0.38)" font-size="11" font-family="Nunito,sans-serif" font-weight="700">${y}</text>`;
  }
  for (let x=xMin;x<=xMax;x++) {
    if (x===0) continue;
    l+=`<text x="${sx(x)}" y="${sy(yMin)+20}" text-anchor="middle" fill="rgba(255,255,255,0.38)" font-size="11" font-family="Nunito,sans-serif" font-weight="700">${x}</text>`;
  }
  l+=`<text x="${PL-5}" y="${sy(0)+4}" text-anchor="end" fill="rgba(255,255,255,0.22)" font-size="10" font-family="Nunito,sans-serif">0</text>`;
  return l;
}

/* ── V-shape line (absolute value characteristic) ── */
function svgVLine(fn, xMin, xMax, sx, sy, W, H, color='rgba(67,97,238,0.85)', steps=120) {
  const pts=[];
  for (let i=0;i<=steps;i++) {
    const x = xMin+(xMax-xMin)*i/steps;
    pts.push(`${sx(x).toFixed(1)},${sy(fn(x)).toFixed(1)}`);
  }
  const cid='vc'+Math.random().toString(36).slice(2,6);
  return `<defs><clipPath id="${cid}"><rect x="${PL}" y="${PT}" width="${W-PL-PR}" height="${H-PT-PB}"/></clipPath></defs>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" clip-path="url(#${cid})"/>`;
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentLevel='easy';
let questions=[], qIdx=0;
let isAnswered=false, isLocked=false, score=0, whyOpen=false;
let plotPoints={};
let selOpt=null, singleY=null;

function getRules(){ return currentLevel==='easy' ? EASY_RULES : HARD_RULES; }

function setLevel(lvl){
  currentLevel=lvl;
  document.getElementById('btnEasy').className='level-btn'+(lvl==='easy'?' active-easy':'');
  document.getElementById('btnHard').className='level-btn'+(lvl==='hard'?' active-hard':'');
  initQuiz();
}
function switchLevel(){ setLevel(currentLevel==='easy'?'hard':'easy'); }

/* ═══════════════════════════════════════════
   QUESTION GENERATORS
═══════════════════════════════════════════ */
function genPlotAll(rule){
  return {
    qtype:'plot_all', rule,
    questionText:'Plot the table values onto the graph.',
    hint:`Remember: |x| always gives a non-negative value — the graph forms a V-shape.`,
    whySteps: rule.xEx.map(x=>`f(<span>${x}</span>) = |${x}| … = <span>${rule.fn(x)}</span>`),
  };
}

function genIdentify(rule){
  const others = getRules().filter(r=>r.id!==rule.id);
  const dist   = shuffle(others).slice(0,3);
  const opts   = shuffle([rule,...dist]);
  return {
    qtype:'identify', rule,
    questionText:'Which function would produce these outputs?',
    options: opts.map(r=>r.fxLabel),
    correctIndex: opts.indexOf(rule),
    hint:'Absolute value functions form a V-shape. Check the vertex position and steepness.',
    whySteps:[
      `The V-shape vertex is at <span>(${rule.xEx.find(x=>rule.fn(x)===Math.min(...rule.xEx.map(x=>rule.fn(x))))}, ${Math.min(...rule.xEx.map(x=>rule.fn(x)))})</span>`,
      `Check: f(0) = ${rule.fn(0)}, f(1) = ${rule.fn(1)}, f(−1) = ${rule.fn(-1)}`,
      `Only <span>${rule.fxLabel}</span> matches all values`,
    ],
  };
}

function genSinglePlot(rule){
  const tX      = rule.xTgt;
  const correct = rule.fn(tX);
  const raw = shuffle(rule.tileOpts);
  // Ensure correct is in the tile list
  const tiles = raw.includes(correct) ? raw : [correct,...raw.slice(0,raw.length-1)];
  const shuffledTiles = shuffle(tiles);
  return {
    qtype:'single_plot', rule,
    questionText:`Plot f(${fmt(tX)}) when ${rule.fxLabel}.`,
    targetX: tX, correctFx: correct,
    tileVals: shuffledTiles,
    correctTile: shuffledTiles.indexOf(correct),
    hint:`Substitute x = ${fmt(tX)} into ${rule.fxLabel}: find |${fmt(tX)}| first.`,
    whySteps: rule.why(tX),
  };
}

/* ═══════════════════════════════════════════
   BUILD SVG
═══════════════════════════════════════════ */
function buildSvg(q, mode='default'){
  const rule = q.rule;
  const isSingle = q.qtype==='single_plot';

  const xMin = isSingle ? rule.pXMin : Math.min(...rule.xEx);
  const xMax = isSingle ? rule.pXMax : Math.max(...rule.xEx);
  const yMin = isSingle ? rule.pYMin : rule.yMin;
  const yMax = isSingle ? rule.pYMax : rule.yMax;
  const maxH = isSingle ? 295 : 280;

  const {CW,CH,W,H} = gSize(xMin,xMax,yMin,yMax,218,maxH);
  const {sx,sy}     = coords(xMin,yMax,CW,CH);

  let inner='';
  inner += svgGrid(xMin,xMax,yMin,yMax,sx,sy);
  inner += svgAxes(xMin,xMax,yMin,yMax,sx,sy,W,H, isSingle);
  inner += svgNumLabels(xMin,xMax,yMin,yMax,sx,sy);

  const showLine = mode==='revealed'||mode==='identify_after'||mode==='single'||mode==='single_after';
  if (showLine) {
    const col = mode==='identify_after' ? 'rgba(88,204,2,0.85)' : 'rgba(67,97,238,0.85)';
    inner += svgVLine(rule.fn, xMin, xMax, sx, sy, W, H, col);
  }

  // identify / single: pre-plotted dots
  if (mode==='identify'||mode==='identify_after') {
    for (const x of rule.xEx) {
      const y=rule.fn(x);
      if (y<yMin||y>yMax) continue;
      inner+=`<circle cx="${sx(x).toFixed(1)}" cy="${sy(y).toFixed(1)}" r="7" fill="#4361ee" stroke="rgba(160,180,255,0.7)" stroke-width="1.5"/>`;
    }
  }
  if (mode==='single'||mode==='single_after') {
    for (const x of rule.xEx) {
      const y=rule.fn(x);
      if (y<yMin||y>yMax) continue;
      inner+=`<circle cx="${sx(x).toFixed(1)}" cy="${sy(y).toFixed(1)}" r="6" fill="rgba(160,170,190,0.6)" stroke="rgba(200,210,230,0.35)" stroke-width="1.5"/>`;
    }
  }
  if (mode==='single_after') {
    const tX=q.targetX, tFx=q.correctFx;
    if (tFx>=yMin&&tFx<=yMax&&tX>=xMin&&tX<=xMax) {
      inner+=`<circle cx="${sx(tX).toFixed(1)}" cy="${sy(tFx).toFixed(1)}" r="8" fill="#58cc02" stroke="rgba(160,255,100,0.9)" stroke-width="2.5"/>`;
      inner+=`<text x="${sx(tX).toFixed(1)}" y="${sy(tFx)-13}" text-anchor="middle" font-size="12" fill="#88e04a">✓</text>`;
    }
    if (singleY!==null&&singleY!==tFx&&singleY>=yMin&&singleY<=yMax) {
      inner+=`<circle cx="${sx(tX).toFixed(1)}" cy="${sy(singleY).toFixed(1)}" r="7" fill="rgba(255,75,75,0.8)" stroke="rgba(255,130,130,0.9)" stroke-width="2"/>`;
    }
  }

  // plot_all: placed & hollow markers
  if (mode==='default'||mode==='revealed') {
    for (const x of rule.xEx) {
      const placed=plotPoints[x], correct=rule.fn(x);
      if (placed!==undefined) {
        const ok = placed===correct;
        const fill   = mode==='revealed'?(ok?'#58cc02':'#ff4b4b'):'#4361ee';
        const stroke = mode==='revealed'?(ok?'rgba(160,255,100,0.9)':'rgba(255,130,130,0.9)'):'rgba(160,180,255,0.8)';
        if (placed>=yMin&&placed<=yMax)
          inner+=`<circle cx="${sx(x).toFixed(1)}" cy="${sy(placed).toFixed(1)}" r="8" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
        if (mode==='revealed'&&ok)
          inner+=`<text x="${sx(x).toFixed(1)}" y="${sy(placed)-13}" text-anchor="middle" font-size="12" fill="#88e04a">✓</text>`;
        if (mode==='revealed'&&!ok&&correct>=yMin&&correct<=yMax) {
          inner+=`<circle cx="${sx(x).toFixed(1)}" cy="${sy(correct).toFixed(1)}" r="8" fill="#58cc02" stroke="rgba(160,255,100,0.9)" stroke-width="2"/>`;
          inner+=`<text x="${sx(x).toFixed(1)}" y="${sy(correct)-13}" text-anchor="middle" font-size="12" fill="#88e04a">✓</text>`;
        }
      } else {
        // Hollow placeholder on x-axis
        inner+=`<circle cx="${sx(x).toFixed(1)}" cy="${sy(Math.max(yMin,0)).toFixed(1)}" r="8" fill="rgba(40,50,90,0.9)" stroke="rgba(100,130,220,0.55)" stroke-width="2"/>`;
        // x label inside circle
        inner+=`<text x="${sx(x).toFixed(1)}" y="${sy(Math.max(yMin,0))+4}" text-anchor="middle" font-size="9" fill="rgba(160,180,255,0.7)" font-family="Nunito,sans-serif" font-weight="800">${x}</text>`;
      }
    }
  }

  const onclick = !isLocked&&mode==='default' ? `onclick="handleClick(event)"` : '';
  return `<svg class="coord-svg" id="coordSvg" width="${W}" height="${H}" ${onclick}>${inner}</svg>`;
}

/* ═══════════════════════════════════════════
   TABLE HTML BUILDERS
═══════════════════════════════════════════ */
function tableAll(rule, afterCheck){
  const rows=rule.xEx.map(x=>{
    const fx=rule.fn(x), placed=plotPoints[x];
    if (!afterCheck) return `<tr><td>${x}</td><td>${placed!==undefined?placed:'–'}</td></tr>`;
    return `<tr class="${placed===fx?'tr-ok':'tr-err'}"><td>${x}</td><td>${fx}</td></tr>`;
  });
  return `<table class="val-table"><tr><th>x</th><th><em>f</em>(x)</th></tr>${rows.join('')}</table>`;
}
function tableIdentify(rule){
  return `<table class="val-table"><tr><th>x</th><th><em>f</em>(x)</th></tr>
    ${rule.xEx.map(x=>`<tr><td>${x}</td><td>${rule.fn(x)}</td></tr>`).join('')}</table>`;
}
function tableSingle(rule, tX, selY, afterCheck){
  const rows=rule.xEx.map(x=>`<tr><td>${x}</td><td>${rule.fn(x)}</td></tr>`);
  const fx=rule.fn(tX);
  const fxCell = afterCheck
    ? `<td class="fx-placed">${fx}</td>`
    : selY!==null
      ? `<td class="fx-placed">${selY}</td>`
      : `<td class="fx-q">?</td>`;
  rows.push(`<tr class="tr-tgt"><td><strong>${fmt(tX)}</strong></td>${fxCell}</tr>`);
  return `<table class="val-table"><tr><th>x</th><th><em>f</em>(x)</th></tr>${rows.join('')}</table>`;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderQuestion(q){
  plotPoints={}; selOpt=null; singleY=null;
  let html=`<p class="q-text">${q.questionText}</p>`;

  if (q.qtype==='plot_all'){
    html+=`<div class="graph-area" id="graphArea">
      ${buildSvg(q,'default')}
      <div class="val-table-wrap">${tableAll(q.rule,false)}</div>
    </div>
    <p class="plot-hint" id="plotHint">Tap the graph to place each point. <span>Tap again to adjust.</span></p>`;
  } else if (q.qtype==='identify'){
    html+=`<div class="graph-area">
      ${buildSvg(q,'identify')}
      <div class="val-table-wrap">${tableIdentify(q.rule)}</div>
    </div>
    <div class="options-grid" id="optionsGrid">
      ${q.options.map((lbl,i)=>`<button class="opt-btn" onclick="selectOpt(${i})">${lbl}</button>`).join('')}
    </div>`;
  } else {
    html+=`<div class="graph-area">
      ${buildSvg(q,'single')}
      <div class="val-table-wrap">${tableSingle(q.rule,q.targetX,null,false)}</div>
    </div>
    <div class="coord-display">(<span class="cx">${fmt(q.targetX)}</span>, <span class="blank" id="cdBlank">?</span>)</div>
    <div class="tiles-row" id="tilesGrid">
      ${q.tileVals.map((v,i)=>`<button class="tile-btn" onclick="selectTile(${i})">${fmt(v)}</button>`).join('')}
    </div>`;
  }

  html+=`<div class="start-over-row"><button class="start-over-btn" onclick="initQuiz()">↺ Start over</button></div>`;
  document.getElementById('qCard').innerHTML=html;
}

/* ═══════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════ */
function handleClick(event){
  const q=questions[qIdx];
  if (q.qtype!=='plot_all'||isLocked) return;
  const svg=document.getElementById('coordSvg');
  const r=svg.getBoundingClientRect();
  const svgX=event.clientX-r.left, svgY=event.clientY-r.top;

  const rule=q.rule;
  const xMin=Math.min(...rule.xEx), xMax=Math.max(...rule.xEx);
  const {CW,CH}=gSize(xMin,xMax,rule.yMin,rule.yMax,218,280);

  const rawX=Math.round((svgX-PL)/CW)+xMin;
  const nearX=rule.xEx.reduce((a,b)=>Math.abs(b-rawX)<Math.abs(a-rawX)?b:a);
  const dataY=Math.round(rule.yMax-(svgY-PT)/CH);
  plotPoints[nearX]=Math.max(rule.yMin,Math.min(rule.yMax,dataY));

  // Redraw
  const newSvg=buildSvg(q,'default');
  document.getElementById('coordSvg').outerHTML=newSvg;
  document.getElementById('coordSvg').onclick=handleClick;
  document.querySelector('.val-table-wrap').innerHTML=tableAll(rule,false);

  if (rule.xEx.every(x=>plotPoints[x]!==undefined))
    document.getElementById('checkBtn').className='check-btn ready';
}

function selectOpt(i){
  if (isLocked) return;
  selOpt=i;
  document.querySelectorAll('.opt-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  document.getElementById('checkBtn').className='check-btn ready';
}

function selectTile(i){
  if (isLocked) return;
  selOpt=i;
  singleY=questions[qIdx].tileVals[i];
  document.querySelectorAll('.tile-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  const blank=document.getElementById('cdBlank');
  if (blank){ blank.className='filled'; blank.textContent=fmt(singleY); }
  document.querySelector('.val-table-wrap').innerHTML=tableSingle(questions[qIdx].rule,questions[qIdx].targetX,singleY,false);
  document.getElementById('checkBtn').className='check-btn ready';
}

/* ═══════════════════════════════════════════
   CHECK
═══════════════════════════════════════════ */
function checkAnswer(){
  const q=questions[qIdx];
  if (isAnswered){ advanceQuestion(); return; }
  if (q.qtype==='plot_all'&&!q.rule.xEx.every(x=>plotPoints[x]!==undefined)) return;
  if (q.qtype!=='plot_all'&&selOpt===null) return;

  isAnswered=isLocked=true;
  let correct=false;

  if (q.qtype==='plot_all'){
    correct=q.rule.xEx.every(x=>plotPoints[x]===q.rule.fn(x));
    document.getElementById('coordSvg').outerHTML=buildSvg(q,'revealed');
    document.querySelector('.val-table-wrap').innerHTML=tableAll(q.rule,true);
  } else if (q.qtype==='identify'){
    correct=selOpt===q.correctIndex;
    document.querySelectorAll('.opt-btn').forEach((b,i)=>{
      b.classList.add('locked');
      if(i===q.correctIndex)b.classList.add('correct');
      else if(i===selOpt&&!correct)b.classList.add('wrong');
    });
    document.getElementById('coordSvg').outerHTML=buildSvg(q,'identify_after');
  } else {
    correct=selOpt===q.correctTile;
    document.querySelectorAll('.tile-btn').forEach((b,i)=>{
      b.classList.add('locked');
      if(i===q.correctTile)b.classList.add('correct');
      else if(i===selOpt&&!correct)b.classList.add('wrong');
    });
    const blank=document.getElementById('cdBlank');
    if (blank) blank.className=correct?'correct-fill':'wrong-fill';
    document.getElementById('coordSvg').outerHTML=buildSvg(q,'single_after');
    document.querySelector('.val-table-wrap').innerHTML=tableSingle(q.rule,q.targetX,q.correctFx,true);
  }

  if (correct){ score++; document.getElementById('scoreDisp').textContent=score; }

  const bar=document.getElementById('feedbackBar');
  bar.className=`feedback-bar ${correct?'ok':'err'} show`;
  document.getElementById('fbIcon').textContent=correct?'✓':'✗';
  const te=document.getElementById('fbTitle');
  te.className=`fb-title ${correct?'ok':'err'}`;
  te.textContent = q.qtype==='plot_all'
    ? (correct?'Perfect plot!':'Not quite — correct positions shown above.')
    : q.qtype==='identify'
      ? (correct?'Correct!':q.options[q.correctIndex])
      : (correct?'Correct!':`Answer: (${fmt(q.targetX)}, ${fmt(q.correctFx)})`);
  document.getElementById('fbHint').textContent=q.hint;

  const ph=document.getElementById('plotHint');
  if(ph)ph.remove();
  document.getElementById('whyBtn').className='why-btn show';
  whyOpen=false;
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('pFill').style.width=(((qIdx+1)/10)*100)+'%';
  const btn=document.getElementById('checkBtn');
  btn.className='check-btn continue';
  btn.textContent=qIdx<9?'Continue →':'See Results →';
}

function advanceQuestion(){
  qIdx++;
  if(qIdx>=10){showResults();return;}
  selOpt=null;singleY=null;plotPoints={};
  isAnswered=isLocked=whyOpen=false;
  document.getElementById('qNum').textContent=qIdx+1;
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('checkBtn').className='check-btn';
  document.getElementById('checkBtn').textContent='Check';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('whyPanel').className='why-panel';
  renderQuestion(questions[qIdx]);
}

/* ─ Why ─ */
function toggleWhy(){
  whyOpen=!whyOpen;
  const panel=document.getElementById('whyPanel'), btn=document.getElementById('whyBtn');
  if(whyOpen){
    document.getElementById('whySteps').innerHTML=questions[qIdx].whySteps.map(s=>`<li>${s}</li>`).join('');
    panel.className='why-panel show'; btn.className='why-btn show active'; btn.textContent='Hide';
  } else {
    panel.className='why-panel'; btn.className='why-btn show'; btn.textContent='Why?';
  }
}

/* ─ Results ─ */
function showResults(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('resultsWrap').className='results-wrap show';
  const pct=score/10;
  const [emoji,msg]=pct===1?['🏆','Perfect! You mastered absolute value graphs!']
    :pct>=.8?['🎉','Excellent! Great understanding of V-shaped functions.']
    :pct>=.6?['👍','Good effort! Remember: |x| always gives a non-negative result.']
    :pct>=.4?['📚','Keep going — find the vertex first, then check which direction the V opens.']
    :['💡','Tip: |x| = x when x≥0, and |x| = −x when x<0.'];
  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resScore').textContent=`${score}/10`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resLevel').textContent=currentLevel==='easy'?'Easy Level':'Hard Level';
  document.getElementById('btnSwitch').textContent=currentLevel==='easy'?'Try Hard Level →':'Try Easy Level →';
}

/* ─ Init ─ */
function initQuiz(){
  qIdx=score=0; selOpt=singleY=null; plotPoints={};
  isAnswered=isLocked=whyOpen=false;
  const rules=shuffle(getRules()).slice(0,4);
  questions=[
    genPlotAll(rules[0]),   genIdentify(rules[0]),  genSinglePlot(rules[0]),
    genPlotAll(rules[1]),   genIdentify(rules[1]),  genSinglePlot(rules[1]),
    genPlotAll(rules[2]),   genIdentify(rules[2]),  genSinglePlot(rules[2]),
    pick([genPlotAll,genIdentify,genSinglePlot])(rules[3]),
  ];
  ['qCard','checkBtn'].forEach(id=>{ document.getElementById(id).style.display=''; });
  document.getElementById('checkBtn').className='check-btn';
  document.getElementById('checkBtn').textContent='Check';
  ['feedbackBar','whyPanel','resultsWrap'].forEach(id=>{
    document.getElementById(id).className=id==='resultsWrap'?'results-wrap':id.replace('Bar','feedback-bar').replace('Panel','why-panel')||id;
  });
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('resultsWrap').className='results-wrap';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('scoreDisp').textContent=0;
  document.getElementById('qNum').textContent=1;
  document.getElementById('pFill').style.width='0%';
  renderQuestion(questions[0]);
}

document.getElementById('checkBtn').addEventListener('click',checkAnswer);
initQuiz();
</script>
