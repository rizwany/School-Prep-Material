  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0e0f14; --card:#1d1f2b; --border:#2a2c3a;
      --text:#f0f0f8; --muted:rgba(240,240,248,.42);

      --blue:#4361ee; --purple:#7c3aed; --orange:#f39c12;
      --opt-bg:#1e2030; --opt-brd:#313446; --radius:16px;
    }
    body { font-family:'Nunito',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    header { background:#fff; border-bottom:2px solid #e2e6f0; padding:0 24px; position:sticky; top:0; z-index:100; flex-shrink:0; }
    .header-inner { max-width:960px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:56px; }
    .logo-link { text-decoration:none; display:flex; align-items:center; }
    .logo-img { height:34px; width:auto; }
    .logo-txt { font-weight:900; font-size:1.15rem; color:#4361ee; }
    nav a { font-weight:700; font-size:0.85rem; color:#5a6076; text-decoration:none; padding:6px 12px; border-radius:8px; transition:color .15s,background .15s; }
    nav a:hover { color:#4361ee; background:#eef1fd; }

    main { flex:1; display:flex; flex-direction:column; align-items:center; }
    .quiz-shell { width:100%; max-width:520px; padding:16px 20px 80px; display:flex; flex-direction:column; flex:1; }

    .level-row { display:flex; justify-content:center; gap:8px; margin-bottom:18px; }
    .level-btn { font-family:inherit; font-size:0.8rem; font-weight:800; padding:6px 18px; border-radius:999px; cursor:pointer; border:2px solid var(--opt-brd); background:var(--opt-bg); color:var(--muted); transition:all .15s; }
    .level-btn.active-easy { border-color:var(--green); background:#172110; color:#88e04a; }
    .level-btn.active-hard { border-color:var(--purple); background:#1e1535; color:#c084fc; }

    .progress-wrap { margin-bottom:16px; }
    .progress-track { height:8px; background:#252733; border-radius:4px; overflow:hidden; }
    .progress-fill  { height:100%; background:var(--green); border-radius:4px; width:0%; transition:width .4s ease; }
    .progress-meta  { display:flex; justify-content:space-between; margin-top:6px; font-size:0.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }

    .q-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px 16px 16px; margin-bottom:14px; }
    .q-text { font-size:1rem; font-weight:800; line-height:1.55; margin-bottom:14px; color:var(--text); }

    /* Graph */
    .graph-wrap { display:flex; justify-content:center; margin-bottom:14px; }
    .coord-svg  { display:block; overflow:visible; }

    /* ── Answer display (single or dual blank) ── */
    .ans-display {
      background:#181921; border:1.5px solid var(--border); border-radius:14px;
      padding:12px 20px; margin-bottom:12px;
      display:flex; flex-direction:column; align-items:center; gap:8px;
    }
    .ans-row { display:flex; align-items:center; justify-content:center; gap:8px; font-size:1.1rem; font-weight:800; color:var(--muted); }
    .ans-paren { color:rgba(255,255,255,0.45); font-size:1.15rem; }
    .ans-comma { color:rgba(255,255,255,0.4); font-size:1rem; }
    .ans-fixed { color:#a0b4ff; font-style:italic; font-size:1rem; }
    .ans-blank {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:44px; height:34px; padding:0 10px;
      background:#252733; border:2px dashed #3d3f52; border-radius:8px;
      color:rgba(255,255,255,.25); font-size:0.98rem; font-weight:800;
      cursor:pointer; transition:all .15s;
    }
    .ans-blank:hover { border-color:#555870; }
    .ans-blank.active  { border-color:rgba(67,97,238,.8); background:rgba(67,97,238,.12); color:#a0b4ff; }
    .ans-blank.filled  { background:rgba(67,97,238,.22); border:2px solid rgba(67,97,238,.7); color:#a0b4ff; border-style:solid; }
    .ans-blank.correct-f { background:rgba(88,204,2,.18); border-color:var(--green); color:#88e04a; border-style:solid; }
    .ans-blank.wrong-f   { background:rgba(255,75,75,.18); border-color:var(--red); color:#ff8080; border-style:solid; }

    /* Tiles */
    .tiles-row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .tile-btn {
      background:var(--opt-bg); border:2px solid var(--opt-brd); border-radius:12px;
      color:var(--text); font-family:inherit; font-size:0.95rem; font-weight:800;
      min-width:58px; height:50px; padding:0 12px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:border-color .15s,background .15s,transform .1s;
    }
    .tile-btn:hover:not(.locked) { border-color:#555870; background:#252737; }
    .tile-btn:active:not(.locked) { transform:scale(.95); }
    .tile-btn.used-1 { border-color:rgba(67,97,238,.5); }
    .tile-btn.used-2 { border-color:rgba(67,97,238,.5); }
    .tile-btn.correct { border-color:var(--green)!important; background:#172110!important; color:#88e04a; }
    .tile-btn.wrong   { border-color:var(--red)!important;   background:#221212!important; color:#ff8080; }
    .tile-btn.locked  { cursor:default; }

    /* Interval text options */
    .opts-list { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
    .opt-btn {
      background:var(--opt-bg); border:2px solid var(--opt-brd); border-radius:14px;
      color:var(--text); font-family:inherit; font-size:0.88rem; font-weight:700;
      padding:13px 16px; cursor:pointer; text-align:left; line-height:1.4; font-style:italic;
      transition:border-color .15s,background .15s,transform .1s;
    }
    .opt-btn:hover:not(.locked) { border-color:#555870; background:#252737; }
    .opt-btn:active:not(.locked) { transform:scale(.98); }
    .opt-btn.selected { border-color:#6070cc; background:#1e2240; }
    .opt-btn.correct  { border-color:var(--green)!important; background:#172110!important; color:#88e04a; }
    .opt-btn.wrong    { border-color:var(--red)!important;   background:#221212!important; color:#ff8080; }
    .opt-btn.locked   { cursor:default; }

    .start-over-row { display:flex; justify-content:flex-end; margin-top:4px; }
    .start-over-btn { background:none; border:none; color:var(--muted); font-family:inherit; font-size:0.8rem; font-weight:700; cursor:pointer; padding:4px 8px; border-radius:8px; transition:color .15s; }
    .start-over-btn:hover { color:var(--text); }

    .feedback-bar.show { opacity:1; }
    .feedback-bar.ok  { background:#172110; border:1.5px solid #2d4a1e; }
    .feedback-bar.err { background:#221212; border:1.5px solid #4a1f1f; }
    .fb-icon { font-size:1.1rem; flex-shrink:0; }
    .fb-body { flex:1; }
    .fb-title { font-size:0.88rem; font-weight:900; margin-bottom:2px; }
    .fb-title.ok { color:#88e04a; } .fb-title.err { color:#ff8080; }
    .fb-hint  { font-size:0.78rem; font-weight:600; color:var(--muted); line-height:1.5; }

    .why-panel { background:#14182a; border:1.5px solid rgba(67,97,238,.4); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:none; animation:slideIn .2s ease; }
    .why-panel.show { display:block; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .why-title { font-size:0.8rem; font-weight:900; color:#a0b4ff; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
    .why-steps { list-style:none; }
    .why-steps li { font-size:0.82rem; font-weight:700; color:var(--muted); padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05); line-height:1.5; }
    .why-steps li:last-child { border-bottom:none; color:#88e04a; }
    .why-steps li span { color:#a0b4ff; }

    .btn-row { display:flex; gap:10px; }
    .why-btn { flex-shrink:0; padding:16px 18px; border:2px solid var(--opt-brd); border-radius:999px; font-family:inherit; font-size:0.9rem; font-weight:800; cursor:pointer; background:var(--opt-bg); color:var(--muted); transition:all .15s; display:none; }
    .why-btn.show { display:block; }
    .why-btn:hover { border-color:#a0b4ff; color:#a0b4ff; }
    .why-btn.active { border-color:rgba(67,97,238,.7); background:rgba(67,97,238,.15); color:#a0b4ff; }
    .check-btn { flex:1; padding:16px; border:none; border-radius:999px; font-family:inherit; font-size:1rem; font-weight:900; cursor:pointer; background:#252737; color:var(--muted); transition:background .15s,color .15s; }
    .check-btn.ready    { background:var(--blue);  color:#fff; }
    .check-btn.ready:hover { background:#3451d1; }
    .check-btn.continue { background:var(--green); color:#fff; }
    .check-btn.continue:hover { background:var(--green-dk); }

    .results-wrap { text-align:center; display:none; padding:20px 0 40px; }
    .results-wrap.show { display:block; }
    .res-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:34px 28px 28px; }
    .res-emoji { font-size:3rem; margin-bottom:10px; }
    .res-title { font-size:1.4rem; font-weight:900; color:var(--text); margin-bottom:4px; }
    .res-level { font-size:0.75rem; font-weight:700; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.08em; }
    .res-score { font-size:2.8rem; font-weight:900; color:var(--green); margin:14px 0 2px; }
    .res-label { font-size:0.82rem; font-weight:700; color:var(--muted); margin-bottom:14px; }
    .res-msg   { font-size:0.88rem; font-weight:700; color:var(--muted); line-height:1.6; margin-bottom:22px; }
    .btn-retry  { background:var(--blue); color:#fff; font-family:inherit; font-size:0.95rem; font-weight:800; padding:14px 36px; border:none; border-radius:999px; cursor:pointer; transition:background .15s; display:block; width:100%; margin-bottom:10px; }
    .btn-retry:hover { background:#3451d1; }
    .btn-switch { background:none; border:1.5px solid var(--opt-brd); color:var(--muted); font-family:inherit; font-size:0.85rem; font-weight:700; padding:10px 24px; border-radius:999px; cursor:pointer; transition:all .15s; width:100%; margin-bottom:10px; }
    .btn-switch:hover { border-color:#a0b4ff; color:#a0b4ff; }
    .btn-home { background:none; border:1.5px solid var(--border); color:var(--muted); font-family:inherit; font-size:0.85rem; font-weight:700; padding:10px 24px; border-radius:999px; cursor:pointer; transition:all .15s; width:100%; }
    .btn-home:hover { border-color:#555870; color:var(--text); }

    footer { background:#0a0b10; color:rgba(255,255,255,.4); padding:16px 24px; text-align:center; font-size:0.75rem; font-weight:600; }
    footer a { color:rgba(255,255,255,.25); text-decoration:none; }
    footer a:hover { color:rgba(255,255,255,.7); }

    @media (max-width:400px) {
      .quiz-shell { padding:12px 12px 70px; }
      .tile-btn { min-width:50px; height:46px; font-size:0.88rem; }
    }
  </style>

<script>
const pick    = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => [...a].sort(() => Math.random() - .5);
const fmt     = v => Number.isInteger(v) ? String(v) : v.toFixed(1).replace(/\.0$/,'');

/* ═══════════════════════════════════════════
   CURVE DEFINITIONS
   Each curve is a real quadratic with exact intercepts.
   dir:'up' = opens upward, dir:'down' = opens downward.
   Intercepts, vertex are precomputed exactly.
   Interval properties precomputed for hard questions.
═══════════════════════════════════════════ */
const EASY_CURVES = [
  { // (x-1)(x-3) — classic upward parabola
    id:'e1', fn:x=>(x-1)*(x-3), dir:'up',
    xR:[-0.5,4.5], yR:[-2,5],
    yInt:3, xInt:[1,3], vertex:[2,-1],
    incInt:'x > 2', decInt:'x < 2',
    posInt:'x < 1 and x > 3', negInt:'1 < x < 3',
    incDistract:['x > 1','x > 3'],decDistract:['x < 1','x < 3'],
    posDistract:['1 < x < 3','x < 2'],negDistract:['x < 1 and x > 3','x > 2'],
  },
  { // -(x+1)(x-3) — downward parabola, roots at -1 and 3
    id:'e2', fn:x=>-(x+1)*(x-3), dir:'down',
    xR:[-2,4.5], yR:[-2,6],
    yInt:3, xInt:[-1,3], vertex:[1,4],
    incInt:'x < 1', decInt:'x > 1',
    posInt:'-1 < x < 3', negInt:'x < −1 and x > 3',
    incDistract:['x < -1','x < 3'],decDistract:['x > -1','x > 3'],
    posDistract:['x < −1 and x > 3','-1 < x < 1'],negDistract:['-1 < x < 3','x > 1'],
  },
  { // (x+1)(x-3) — roots at -1 and 3, y-int negative
    id:'e3', fn:x=>(x+1)*(x-3), dir:'up',
    xR:[-2,4.5], yR:[-5,4],
    yInt:-3, xInt:[-1,3], vertex:[1,-4],
    incInt:'x > 1', decInt:'x < 1',
    posInt:'x < −1 and x > 3', negInt:'−1 < x < 3',
    incDistract:['x > -1','x > 3'],decDistract:['x < -1','x < 3'],
    posDistract:['−1 < x < 3','x < 1'],negDistract:['x < −1 and x > 3','x > 1'],
  },
  { // -(x-1)(x-3) — downward, roots at 1 and 3
    id:'e4', fn:x=>-(x-1)*(x-3), dir:'down',
    xR:[-0.5,4.5], yR:[-2,3],
    yInt:-3, xInt:[1,3], vertex:[2,1],
    incInt:'x < 2', decInt:'x > 2',
    posInt:'1 < x < 3', negInt:'x < 1 and x > 3',
    incDistract:['x < 1','x < 3'],decDistract:['x > 1','x > 3'],
    posDistract:['x < 1 and x > 3','x < 2'],negDistract:['1 < x < 3','x > 2'],
  },
  { // (x-1)(x-5) — roots at 1 and 5, wider spread
    id:'e5', fn:x=>(x-1)*(x-5), dir:'up',
    xR:[0,6], yR:[-5,6],
    yInt:5, xInt:[1,5], vertex:[3,-4],
    incInt:'x > 3', decInt:'x < 3',
    posInt:'x < 1 and x > 5', negInt:'1 < x < 5',
    incDistract:['x > 1','x > 5'],decDistract:['x < 1','x < 5'],
    posDistract:['1 < x < 5','x < 3'],negDistract:['x < 1 and x > 5','x > 3'],
  },
];

const HARD_CURVES = [
  { // (x-1)(x-4) — vertex at non-integer (2.5, -2.25)
    id:'h1', fn:x=>(x-1)*(x-4), dir:'up',
    xR:[0,5], yR:[-3,5],
    yInt:4, xInt:[1,4], vertex:[2.5,-2.25],
    incInt:'x > 2.5', decInt:'x < 2.5',
    posInt:'x < 1 and x > 4', negInt:'1 < x < 4',
    incDistract:['x > 1','x > 4'],decDistract:['x < 1','x < 4'],
    posDistract:['1 < x < 4','x < 2.5'],negDistract:['x < 1 and x > 4','x > 2.5'],
  },
  { // -(x+2)(x-2) — symmetric, vertex at (0,4)
    id:'h2', fn:x=>-(x+2)*(x-2), dir:'down',
    xR:[-3.5,3.5], yR:[-2,5],
    yInt:4, xInt:[-2,2], vertex:[0,4],
    incInt:'x < 0', decInt:'x > 0',
    posInt:'−2 < x < 2', negInt:'x < −2 and x > 2',
    incDistract:['x < -2','x < 2'],decDistract:['x > -2','x > 2'],
    posDistract:['x < −2 and x > 2','x > 0'],negDistract:['−2 < x < 2','x < 0'],
  },
  { // (x+2)(x-4) — roots at -2 and 4
    id:'h3', fn:x=>(x+2)*(x-4), dir:'up',
    xR:[-3,5], yR:[-10,6],
    yInt:-8, xInt:[-2,4], vertex:[1,-9],
    incInt:'x > 1', decInt:'x < 1',
    posInt:'x < −2 and x > 4', negInt:'−2 < x < 4',
    incDistract:['x > -2','x > 4'],decDistract:['x < -2','x < 4'],
    posDistract:['−2 < x < 4','x < 1'],negDistract:['x < −2 and x > 4','x > 1'],
  },
  { // -(x+1)(x-4) — inverted, vertex at (1.5, 6.25)
    id:'h4', fn:x=>-(x+1)*(x-4), dir:'down',
    xR:[-2,5.5], yR:[-2,8],
    yInt:4, xInt:[-1,4], vertex:[1.5,6.25],
    incInt:'x < 1.5', decInt:'x > 1.5',
    posInt:'−1 < x < 4', negInt:'x < −1 and x > 4',
    incDistract:['x < -1','x < 4'],decDistract:['x > -1','x > 4'],
    posDistract:['x < −1 and x > 4','x < 1.5'],negDistract:['−1 < x < 4','x > 1.5'],
  },
  { // (x+2)(x-3) — roots at -2 and 3
    id:'h5', fn:x=>(x+2)*(x-3), dir:'up',
    xR:[-3,4.5], yR:[-7,5],
    yInt:-6, xInt:[-2,3], vertex:[0.5,-6.25],
    incInt:'x > 0.5', decInt:'x < 0.5',
    posInt:'x < −2 and x > 3', negInt:'−2 < x < 3',
    incDistract:['x > -2','x > 3'],decDistract:['x < -2','x < 3'],
    posDistract:['−2 < x < 3','x < 0.5'],negDistract:['x < −2 and x > 3','x > 0.5'],
  },
];

/* ═══════════════════════════════════════════
   SVG GRAPH BUILDER
═══════════════════════════════════════════ */
const PL=36, PB=28, PT=14, PR=16;

function gSize(xR,yR) {
  const xs=xR[1]-xR[0], ys=yR[1]-yR[0];
  const CW=Math.min(40,Math.floor((320-PL-PR)/xs));
  const CH=Math.min(28,Math.floor((252-PT-PB)/ys));
  return { CW,CH, W:PL+xs*CW+PR, H:PT+ys*CH+PB };
}

function buildSvg(curve, revealPts=[]) {
  const {fn,xR,yR}=curve;
  const [xMin,xMax]=xR, [yMin,yMax]=yR;
  const {CW,CH,W,H}=gSize(xR,yR);
  const sx=x=>PL+(x-xMin)*CW, sy=y=>PT+(yMax-y)*CH;
  const ac='rgba(255,255,255,0.5)';
  const cid='p'+Math.random().toString(36).slice(2,5);

  // Grid
  let grid='';
  for (let y=Math.ceil(yMin);y<=Math.floor(yMax);y++)
    grid+=`<line x1="${PL}" y1="${sy(y).toFixed(1)}" x2="${(W-PR).toFixed(1)}" y2="${sy(y).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
  for (let x=Math.ceil(xMin);x<=Math.floor(xMax);x++)
    grid+=`<line x1="${sx(x).toFixed(1)}" y1="${PT}" x2="${sx(x).toFixed(1)}" y2="${(H-PB).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;

  // Axes
  const yAx=sy(0)>=PT&&sy(0)<=H-PB?`<line x1="${PL}" y1="${sy(0).toFixed(1)}" x2="${(W-PR+8).toFixed(1)}" y2="${sy(0).toFixed(1)}" stroke="${ac}" stroke-width="2" marker-end="url(#m${cid})"/>`:'';
  const xAx=sx(0)>=PL&&sx(0)<=W-PR?`<line x1="${sx(0).toFixed(1)}" y1="${(H-PB+8).toFixed(1)}" x2="${sx(0).toFixed(1)}" y2="${PT}" stroke="${ac}" stroke-width="1.8" marker-end="url(#m${cid})"/>`:'';

  // Axis labels
  let lbl='';
  for (let y=Math.ceil(yMin);y<=Math.floor(yMax);y++) {
    if (y===0) continue;
    if (Math.abs(y)>9&&y%2!==0) continue; // skip odd labels for large ranges
    lbl+=`<text x="${PL-5}" y="${sy(y)+4}" text-anchor="end" fill="rgba(255,255,255,0.42)" font-size="11" font-family="Nunito,sans-serif" font-weight="700">${y}</text>`;
  }
  for (let x=Math.ceil(xMin);x<=Math.floor(xMax);x++) {
    if (x===0) continue;
    lbl+=`<text x="${sx(x)}" y="${H-PB+18}" text-anchor="middle" fill="rgba(255,255,255,0.42)" font-size="11" font-family="Nunito,sans-serif" font-weight="700">${x}</text>`;
  }
  lbl+=`<text x="${sx(xMin)<50?PL+2:sx(0)+6}" y="${PT+14}" font-size="12" font-weight="900" fill="rgba(255,255,255,0.55)" font-family="Nunito,sans-serif" font-style="italic">y</text>`;
  lbl+=`<text x="${W-PR+8}" y="${sy(0)+5}" font-size="12" font-weight="900" fill="rgba(255,255,255,0.55)" font-family="Nunito,sans-serif" font-style="italic">x</text>`;

  // Parabola path (evaluate directly — exact math, no approximation)
  const STEPS=160;
  const pathPts=[];
  for (let i=0;i<=STEPS;i++) {
    const x=xMin+(xMax-xMin)*i/STEPS;
    const y=fn(x);
    pathPts.push(`${sx(x).toFixed(1)},${sy(y).toFixed(1)}`);
  }
  const pathD='M '+pathPts.join(' L ');
  const curve_svg=`<defs>
    <marker id="m${cid}" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><polygon points="0 0,7 3,0 6" fill="${ac}"/></marker>
    <clipPath id="${cid}"><rect x="${PL}" y="${PT}" width="${W-PL-PR}" height="${H-PT-PB}"/></clipPath>
  </defs>
  <path d="${pathD}" fill="none" stroke="rgba(67,97,238,0.9)" stroke-width="2.8" stroke-linejoin="round" clip-path="url(#${cid})"/>`;

  // Reveal orange dots + labels
  let reveal='';
  for (const pt of revealPts) {
    const rx=sx(pt.x), ry=sy(pt.y);
    if (rx<PL||rx>W-PR||ry<PT||ry>H-PB) continue;
    reveal+=`<circle cx="${rx.toFixed(1)}" cy="${ry.toFixed(1)}" r="7" fill="#f39c12" stroke="#fff" stroke-width="1.5"/>`;
    // Label placement: for x-axis intercepts go above, y-axis intercept goes right
    const lx=pt.x===0?rx+12:rx, ly=pt.y===0?ry-14:ry-14;
    const anchor=pt.x===0?'start':'middle';
    reveal+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" fill="#f39c12" font-size="11" font-family="Nunito,sans-serif" font-weight="800">(${fmt(pt.x)}, ${fmt(pt.y)})</text>`;
  }

  return `<svg class="coord-svg" width="${W}" height="${H}">${grid}${yAx}${xAx}${lbl}${curve_svg}${reveal}</svg>`;
}

/* ═══════════════════════════════════════════
   TILE GENERATORS
═══════════════════════════════════════════ */
function makeTiles(correct, step, count=4) {
  // Put correct at random position in sorted tile list
  const pos = Math.floor(Math.random()*(count-1));
  const vals = Array.from({length:count},(_,i)=>+(correct+(i-pos)*step).toFixed(2));
  return vals.map(v=>Number.isInteger(v)?v:parseFloat(v.toFixed(2)));
}

function makeTilesFromSet(correct, extras, count=4) {
  // extras is array of candidate distractors
  const pool = shuffle([...new Set([...extras, correct])]);
  const chosen = [correct, ...pool.filter(v=>v!==correct).slice(0,count-1)];
  return chosen.sort((a,b)=>a-b);
}

/* ═══════════════════════════════════════════
   QUESTION GENERATORS
═══════════════════════════════════════════ */

// TYPE A — y-intercept: (0, ?)
function genYInt(curve) {
  const y=curve.yInt;
  const step=Number.isInteger(y)?1:0.5;
  const tiles=makeTiles(y,step,4);
  if(!tiles.includes(y)){tiles[1]=y;tiles.sort((a,b)=>a-b);}
  return {
    qtype:'y_int', curve,
    questionText:'Identify the point where the function crosses the y‑axis.',
    blanks:[{active:true,value:null,correct:y,fixed:null,label:'y'}],
    fixedLeft:null, fixedRight:null, // (0, ?) format
    tiles, isTextOpts:false,
    revealPts:[{x:0,y:y}],
    hint:`The y-intercept is where x = 0. Find where the curve meets the y-axis: (0, ${fmt(y)}).`,
    why:[`The <span>y-intercept</span> is where x = 0`,`Substitute x = 0: f(0) = <span>${fmt(y)}</span>`,`So the y-intercept is <span>(0, ${fmt(y)})</span>`],
  };
}

// TYPE B — x-intercepts: (?, 0) and (?, 0) — dual blank
function genXInts(curve) {
  const [r1,r2]=[...curve.xInt].sort((a,b)=>a-b);
  const step=Number.isInteger(r1)&&Number.isInteger(r2)?1:0.5;
  // Tiles: both roots + 2 distractors
  const dist = shuffle([r1-1,r1+1,r2-1,r2+1,(r1+r2)/2].filter(v=>v!==r1&&v!==r2)).slice(0,2);
  const tiles=[r1,r2,...dist].sort((a,b)=>a-b);
  return {
    qtype:'x_ints', curve,
    questionText:'Identify the points where the function crosses the x‑axis.',
    blanks:[
      {active:true, value:null, correct:r1, fixed:null, label:'x1'},
      {active:false,value:null, correct:r2, fixed:null, label:'x2'},
    ],
    tiles, isTextOpts:false,
    revealPts:[{x:r1,y:0},{x:r2,y:0}],
    hint:`The x-intercepts are where f(x) = 0: the roots are x = ${fmt(r1)} and x = ${fmt(r2)}.`,
    why:[`<span>x-intercepts</span> are where the curve crosses the x-axis (y = 0)`,`Set f(x) = 0: roots are <span>x = ${fmt(r1)}</span> and <span>x = ${fmt(r2)}</span>`,`So the x-intercepts are <span>(${fmt(r1)}, 0)</span> and <span>(${fmt(r2)}, 0)</span>`],
  };
}

// TYPE C — vertex/turning point: (?, ?)
function genVertex(curve) {
  const [vx,vy]=curve.vertex;
  const xStep=Number.isInteger(vx)?1:0.5, yStep=Number.isInteger(vy)?1:0.5;
  const xTiles=makeTiles(vx,xStep,4); if(!xTiles.includes(vx)){xTiles[1]=vx;xTiles.sort((a,b)=>a-b);}
  const yTiles=makeTiles(vy,yStep,4); if(!yTiles.includes(vy)){yTiles[1]=vy;yTiles.sort((a,b)=>a-b);}
  const dir=curve.dir==='up'?'minimum':'maximum';
  return {
    qtype:'vertex', curve,
    questionText:`Identify the ${dir} point (vertex) of the function.`,
    blanks:[
      {active:true, value:null, correct:vx, fixed:null, label:'x', tiles:xTiles},
      {active:false,value:null, correct:vy, fixed:null, label:'y', tiles:yTiles},
    ],
    tiles:xTiles, activeTiles:xTiles, isTextOpts:false,
    revealPts:[{x:vx,y:vy}],
    hint:`The vertex is the ${dir} point. It sits at (${fmt(vx)}, ${fmt(vy)}).`,
    why:[`For a parabola, the vertex is the <span>${dir} point</span>`,`The x-coordinate of the vertex = <span>${fmt(vx)}</span>`,`f(${fmt(vx)}) = <span>${fmt(vy)}</span> → vertex is <span>(${fmt(vx)}, ${fmt(vy)})</span>`],
  };
}

// TYPE D — interval (increasing/decreasing): text options
function genIncInterval(curve) {
  const opts=shuffle([curve.incInt,...curve.incDistract]).slice(0,3);
  if(!opts.includes(curve.incInt)){opts[0]=curve.incInt;}
  opts.sort();
  return {
    qtype:'interval', curve,
    questionText:`On which interval is the function <strong>increasing</strong>?`,
    correctOpt:curve.incInt, options:opts, isTextOpts:true,
    revealPts:[],
    hint:`A ${curve.dir==='up'?'upward':'downward'}-opening parabola ${curve.dir==='up'?'decreases then increases':'increases then decreases'} at its vertex x = ${fmt(curve.vertex[0])}.`,
    why:[`This parabola opens <span>${curve.dir==='up'?'upward':'downward'}</span>`,`Vertex at x = <span>${fmt(curve.vertex[0])}</span> — this is where the direction changes`,`The function is <span>increasing</span> where: <span>${curve.incInt}</span>`],
  };
}

function genDecInterval(curve) {
  const opts=shuffle([curve.decInt,...curve.decDistract]).slice(0,3);
  if(!opts.includes(curve.decInt)){opts[0]=curve.decInt;}
  opts.sort();
  return {
    qtype:'interval', curve,
    questionText:`On which interval is the function <strong>decreasing</strong>?`,
    correctOpt:curve.decInt, options:opts, isTextOpts:true,
    revealPts:[],
    hint:`The vertex is at x = ${fmt(curve.vertex[0])} — this is where the function changes direction.`,
    why:[`This parabola opens <span>${curve.dir==='up'?'upward':'downward'}</span>`,`Vertex at x = <span>${fmt(curve.vertex[0])}</span>`,`The function is <span>decreasing</span> where: <span>${curve.decInt}</span>`],
  };
}

function genFNeg(curve) {
  const opts=shuffle([curve.negInt,...curve.negDistract]).slice(0,3);
  if(!opts.includes(curve.negInt)){opts[0]=curve.negInt;}
  opts.sort();
  const [r1,r2]=[...curve.xInt].sort((a,b)=>a-b);
  return {
    qtype:'interval', curve,
    questionText:`For which values of x is <strong>f(x) &lt; 0</strong>?`,
    correctOpt:curve.negInt, options:opts, isTextOpts:true,
    revealPts:[],
    hint:`f(x) < 0 where the curve is <em>below</em> the x-axis. Look between the x-intercepts.`,
    why:[`f(x) < 0 where the curve is <span>below the x-axis</span>`,`The x-intercepts are at <span>${fmt(r1)}</span> and <span>${fmt(r2)}</span>`,`f(x) < 0 for: <span>${curve.negInt}</span>`],
  };
}

function genFPos(curve) {
  const opts=shuffle([curve.posInt,...curve.posDistract]).slice(0,3);
  if(!opts.includes(curve.posInt)){opts[0]=curve.posInt;}
  opts.sort();
  const [r1,r2]=[...curve.xInt].sort((a,b)=>a-b);
  return {
    qtype:'interval', curve,
    questionText:`For which values of x is <strong>f(x) &gt; 0</strong>?`,
    correctOpt:curve.posInt, options:opts, isTextOpts:true,
    revealPts:[],
    hint:`f(x) > 0 where the curve is <em>above</em> the x-axis.`,
    why:[`f(x) > 0 where the curve is <span>above the x-axis</span>`,`The x-intercepts are at <span>${fmt(r1)}</span> and <span>${fmt(r2)}</span>`,`f(x) > 0 for: <span>${curve.posInt}</span>`],
  };
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentLevel='easy';
let questions=[],qIdx=0;
let isAnswered=false,isLocked=false,score=0,whyOpen=false;
let blankValues=[null,null], activeBlank=0, selOpt=null;

function getRules(){ return currentLevel==='easy'?EASY_CURVES:HARD_CURVES; }
function setLevel(lvl){
  currentLevel=lvl;
  document.getElementById('btnEasy').className='level-btn'+(lvl==='easy'?' active-easy':'');
  document.getElementById('btnHard').className='level-btn'+(lvl==='hard'?' active-hard':'');
  initQuiz();
}
function switchLevel(){ setLevel(currentLevel==='easy'?'hard':'easy'); }

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderQuestion(q) {
  blankValues=[null,null]; activeBlank=0; selOpt=null;

  const svgHTML=buildSvg(q.curve);
  let bodyHTML='';

  if (!q.isTextOpts) {
    // Tile-based question: build answer display + tiles
    bodyHTML += buildAnsDisplay(q, 'blank') + buildTilesHTML(q);
  } else {
    // Text options question
    bodyHTML += `<div class="opts-list" id="optsList">
      ${q.options.map((opt,i)=>`<button class="opt-btn" onclick="selectOpt(${i})">${opt}</button>`).join('')}
    </div>`;
  }

  document.getElementById('qCard').innerHTML=`
    <p class="q-text">${q.questionText}</p>
    <div class="graph-wrap">${svgHTML}</div>
    ${bodyHTML}
    <div class="start-over-row"><button class="start-over-btn" onclick="initQuiz()">↺ Start over</button></div>`;
}

function buildAnsDisplay(q, state='blank') {
  const isSingle = q.qtype==='y_int';
  const isDual   = q.qtype==='x_ints';
  const isVertex = q.qtype==='vertex';

  function blankEl(idx, state='blank') {
    const v=blankValues[idx];
    let cls='ans-blank';
    if (idx===activeBlank&&!isLocked) cls+=' active';
    else if (v!==null) cls+=' filled';
    if (state==='correct-'+idx) cls='ans-blank correct-f';
    if (state==='wrong-'+idx)   cls='ans-blank wrong-f';
    const txt=v!==null?fmt(v):'?';
    const click=isLocked?'':` onclick="setActiveBlank(${idx})"`;
    return `<span class="${cls}" id="blank${idx}"${click}>${txt}</span>`;
  }

  let rows='';
  if (isSingle) {
    // (0 , ?)
    rows=`<div class="ans-row">
      <span class="ans-paren">(</span>
      <span class="ans-fixed">0</span>
      <span class="ans-comma"> , </span>
      ${blankEl(0,state)}
      <span class="ans-paren">)</span>
    </div>`;
  } else if (isDual) {
    // Two rows: (? , 0) and (? , 0)
    const [r1,r2]=q.blanks.map((b,i)=>blankEl(i,state));
    rows=`<div class="ans-row">
      <span class="ans-paren">(</span>${r1}<span class="ans-comma"> , </span><span class="ans-fixed">0</span><span class="ans-paren">)</span>
    </div>
    <div class="ans-row" style="margin-top:4px">
      <span class="ans-paren">(</span>${blankEl(1,state)}<span class="ans-comma"> , </span><span class="ans-fixed">0</span><span class="ans-paren">)</span>
    </div>`;
  } else if (isVertex) {
    // (? , ?)  — first blank is x, second is y
    rows=`<div class="ans-row">
      <span class="ans-paren">(</span>${blankEl(0,state)}<span class="ans-comma"> , </span>${blankEl(1,state)}<span class="ans-paren">)</span>
    </div>`;
  }
  return `<div class="ans-display" id="ansDisplay">${rows}</div>`;
}

function buildTilesHTML(q) {
  // For vertex: active blank determines which tile set to show
  const tiles = (q.qtype==='vertex' && activeBlank===1) ? q.blanks[1].tiles : q.tiles;
  return `<div class="tiles-row" id="tilesRow">
    ${tiles.map((v,i)=>`<button class="tile-btn" onclick="selectTile(${i})">${fmt(v)}</button>`).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════ */
function setActiveBlank(idx) {
  if (isLocked) return;
  activeBlank=idx;
  refreshAnsDisplay();
  // Also update tiles for vertex question
  const q=questions[qIdx];
  if (q.qtype==='vertex') {
    document.getElementById('tilesRow').innerHTML=
      (idx===1?q.blanks[1].tiles:q.tiles).map((v,i)=>`<button class="tile-btn" onclick="selectTile(${i})">${fmt(v)}</button>`).join('');
  }
}

function refreshAnsDisplay() {
  const q=questions[qIdx];
  document.getElementById('ansDisplay').innerHTML=buildAnsDisplay(q,'blank').match(/<div class="ans-display"[^>]*>([\s\S]*)<\/div>/)?.[1]||'';
  // Rebuild
  document.getElementById('ansDisplay').outerHTML=buildAnsDisplay(q,'blank');
}

function selectTile(i) {
  if (isLocked) return;
  const q=questions[qIdx];
  const tiles=(q.qtype==='vertex'&&activeBlank===1)?q.blanks[1].tiles:q.tiles;
  const val=tiles[i];
  blankValues[activeBlank]=val;

  // Advance active blank if both blanks exist
  const numBlanks=q.blanks.length;
  if (numBlanks>1&&activeBlank<numBlanks-1) activeBlank++;

  // Refresh display
  document.getElementById('ansDisplay').outerHTML=buildAnsDisplay(q,'blank');

  // Refresh tiles for vertex (new active blank might need different tiles)
  if (q.qtype==='vertex') {
    document.getElementById('tilesRow').innerHTML=
      (activeBlank===1?q.blanks[1].tiles:q.tiles).map((v,ii)=>`<button class="tile-btn" onclick="selectTile(${ii})">${fmt(v)}</button>`).join('');
  }

  // Check if all blanks filled
  const allFilled=q.blanks.every((_,ii)=>blankValues[ii]!==null);
  if (allFilled) document.getElementById('checkBtn').className='check-btn ready';
}

function selectOpt(i) {
  if (isLocked) return;
  selOpt=i;
  document.querySelectorAll('.opt-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  document.getElementById('checkBtn').className='check-btn ready';
}

/* ═══════════════════════════════════════════
   CHECK
═══════════════════════════════════════════ */
function checkAnswer() {
  const q=questions[qIdx];
  if (isAnswered){advanceQuestion();return;}

  if (!q.isTextOpts && !q.blanks.every((_,i)=>blankValues[i]!==null)) return;
  if (q.isTextOpts && selOpt===null) return;

  isAnswered=isLocked=true;
  let correct=false;

  if (q.qtype==='interval') {
    correct=selOpt!==null&&q.options[selOpt]===q.correctOpt;
    document.querySelectorAll('.opt-btn').forEach((b,i)=>{
      b.classList.add('locked');
      if(q.options[i]===q.correctOpt)b.classList.add('correct');
      else if(i===selOpt&&!correct)b.classList.add('wrong');
    });
  } else if (q.qtype==='y_int') {
    correct=blankValues[0]===q.blanks[0].correct;
    revealBlanks(q,[correct]);
  } else if (q.qtype==='x_ints') {
    // Order-insensitive: both values must match the two roots
    const vals=[blankValues[0],blankValues[1]].sort((a,b)=>a-b);
    const corr=[...q.blanks.map(b=>b.correct)].sort((a,b)=>a-b);
    correct=vals[0]===corr[0]&&vals[1]===corr[1];
    const b0ok=blankValues[0]===corr[0]||blankValues[0]===corr[1];
    const b1ok=blankValues[1]===corr[0]||blankValues[1]===corr[1];
    revealBlanks(q,[b0ok,b1ok]);
  } else if (q.qtype==='vertex') {
    const b0ok=blankValues[0]===q.blanks[0].correct;
    const b1ok=blankValues[1]===q.blanks[1].correct;
    correct=b0ok&&b1ok;
    revealBlanks(q,[b0ok,b1ok]);
  }

  // Redraw graph with reveal points
  if (q.revealPts.length) {
    document.querySelector('.graph-wrap').innerHTML=buildSvg(q.curve,q.revealPts);
  }

  if(correct){score++;document.getElementById('scoreDisp').textContent=score;}

  const bar=document.getElementById('feedbackBar');
  bar.className=`feedback-bar ${correct?'ok':'err'} show`;
  document.getElementById('fbIcon').textContent=correct?'✓':'✗';
  const te=document.getElementById('fbTitle');
  te.className=`fb-title ${correct?'ok':'err'}`;
  if (q.qtype==='interval') {
    te.textContent=correct?'Correct!':q.correctOpt;
  } else {
    const ans=q.revealPts.map(pt=>`(${fmt(pt.x)}, ${fmt(pt.y)})`).join(' and ');
    te.textContent=correct?'Correct!':`Answer: ${ans}`;
  }
  document.getElementById('fbHint').innerHTML=q.hint;

  document.getElementById('whyBtn').className='why-btn show';
  whyOpen=false; document.getElementById('whyPanel').className='why-panel';
  document.getElementById('pFill').style.width=(((qIdx+1)/10)*100)+'%';
  const btn=document.getElementById('checkBtn');
  btn.className='check-btn continue';
  btn.textContent=qIdx<9?'Continue →':'See Results →';
}

function revealBlanks(q, outcomes) {
  // Build a fresh display with correct-f / wrong-f classes
  const numBlanks=q.blanks.length;
  function blankEl(idx) {
    const ok=outcomes[idx];
    const v=ok?q.blanks[idx].correct:blankValues[idx];
    const cls=ok?'ans-blank correct-f':'ans-blank wrong-f';
    return `<span class="${cls}">${v!==null?fmt(v):'?'}</span>`;
  }
  let rows='';
  if (q.qtype==='y_int') {
    rows=`<div class="ans-row"><span class="ans-paren">(</span><span class="ans-fixed">0</span><span class="ans-comma"> , </span>${blankEl(0)}<span class="ans-paren">)</span></div>`;
  } else if (q.qtype==='x_ints') {
    const corr=[...q.blanks.map(b=>b.correct)].sort((a,b)=>a-b);
    // Show correct values in green regardless of which blank user used
    const v0ok=outcomes[0], v1ok=outcomes[1];
    rows=`<div class="ans-row"><span class="ans-paren">(</span><span class="ans-blank ${v0ok?'correct-f':'wrong-f'}">${fmt(blankValues[0])}</span><span class="ans-comma"> , </span><span class="ans-fixed">0</span><span class="ans-paren">)</span></div>
    <div class="ans-row" style="margin-top:4px"><span class="ans-paren">(</span><span class="ans-blank ${v1ok?'correct-f':'wrong-f'}">${fmt(blankValues[1])}</span><span class="ans-comma"> , </span><span class="ans-fixed">0</span><span class="ans-paren">)</span></div>`;
    if (!outcomes[0]||!outcomes[1]) {
      // Show correct answer hint below
      rows+=`<div style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:6px">Correct: (${fmt(corr[0])}, 0) and (${fmt(corr[1])}, 0)</div>`;
    }
  } else if (q.qtype==='vertex') {
    rows=`<div class="ans-row"><span class="ans-paren">(</span>${blankEl(0)}<span class="ans-comma"> , </span>${blankEl(1)}<span class="ans-paren">)</span></div>`;
    if (!outcomes[0]||!outcomes[1]) {
      rows+=`<div style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:6px">Correct: (${fmt(q.blanks[0].correct)}, ${fmt(q.blanks[1].correct)})</div>`;
    }
  }
  document.getElementById('ansDisplay').innerHTML=rows;
}

function advanceQuestion() {
  qIdx++;
  if(qIdx>=10){showResults();return;}
  blankValues=[null,null]; activeBlank=0; selOpt=null;
  isAnswered=isLocked=whyOpen=false;
  document.getElementById('qNum').textContent=qIdx+1;
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('checkBtn').className='check-btn';
  document.getElementById('checkBtn').textContent='Check';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('whyPanel').className='why-panel';
  renderQuestion(questions[qIdx]);
}

function toggleWhy(){
  whyOpen=!whyOpen;
  const p=document.getElementById('whyPanel'),b=document.getElementById('whyBtn');
  if(whyOpen){
    document.getElementById('whySteps').innerHTML=questions[qIdx].why.map(s=>`<li>${s}</li>`).join('');
    p.className='why-panel show';b.className='why-btn show active';b.textContent='Hide';
  } else {
    p.className='why-panel';b.className='why-btn show';b.textContent='Why?';
  }
}

function showResults(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('resultsWrap').className='results-wrap show';
  const pct=score/10;
  const [emoji,msg]=pct===1?['🏆','Perfect! You mastered intercepts and intervals!']
    :pct>=.8?['🎉','Excellent! Great understanding of function graphs.']
    :pct>=.6?['👍','Good effort! Review intercepts and the vertex.']
    :pct>=.4?['📚','Keep going — check where the curve crosses each axis.']
    :['💡','Tip: y-intercept = set x=0; x-intercepts = where y=0; vertex = the turning point.'];
  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resScore').textContent=`${score}/10`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resLevel').textContent=currentLevel==='easy'?'Easy Level':'Hard Level';
  document.getElementById('btnSwitch').textContent=currentLevel==='easy'?'Try Hard Level →':'Try Easy Level →';
}

/* ═══════════════════════════════════════════
   INIT — 4 curves × 3 question types = 12 → slice to 10
═══════════════════════════════════════════ */
function initQuiz(){
  qIdx=score=0; blankValues=[null,null]; activeBlank=0; selOpt=null;
  isAnswered=isLocked=whyOpen=false;
  const curves=shuffle(getRules()).slice(0,4);
  let qs=[];
  if (currentLevel==='easy') {
    for (const c of curves) qs.push(genYInt(c), genXInts(c), genVertex(c));
  } else {
    for (const c of curves) qs.push(genXInts(c), pick([genIncInterval,genDecInterval])(c), pick([genFNeg,genFPos])(c));
  }
  questions=qs.slice(0,10);
  ['qCard','checkBtn'].forEach(id=>document.getElementById(id).style.display='');
  document.getElementById('checkBtn').className='check-btn';
  document.getElementById('checkBtn').textContent='Check';
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('whyBtn').className='why-btn';
  document.getElementById('whyPanel').className='why-panel';
  document.getElementById('resultsWrap').className='results-wrap';
  document.getElementById('scoreDisp').textContent=0;
  document.getElementById('qNum').textContent=1;
  document.getElementById('pFill').style.width='0%';
  renderQuestion(questions[0]);
}

document.getElementById('checkBtn').addEventListener('click',checkAnswer);
initQuiz();
</script>
