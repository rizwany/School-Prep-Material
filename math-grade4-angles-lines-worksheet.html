  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --ink: #1a1f36; --muted: #5a6076; --accent: #4361EE; --accent-dark: #3451d1;

    body { font-family: 'Nunito', sans-serif; background-color: var(--bg); background-image: radial-gradient(circle, #E8EDF5 1.5px, transparent 1.5px); background-size: 20px 20px; color: var(--ink); min-height: 100vh; }
    header { background: var(--card); border-bottom: 2px solid var(--border); padding: 0 24px; }

    .breadcrumb span { margin: 0 6px; }

    .hero p { font-size: 0.95rem; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .controls { max-width: 860px; margin: 18px auto 0; padding: 0 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .diff-btn.active { background: var(--accent); color: #fff; }
    .btn { padding: 9px 18px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.88rem; border: 2px solid var(--border); cursor: pointer; background: var(--card); color: var(--ink); transition: all .15s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); }
    main { max-width: 860px; margin: 20px auto 60px; padding: 0 24px; display: flex; flex-direction: column; gap: 14px; }
    .score-banner { border-radius: var(--radius); padding: 18px 24px; display: none; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .score-banner.show { display: flex; }
    .score-banner.great { background: #e8faf4; border: 2px solid var(--green); }
    .score-banner.ok { background: #fff4e6; border: 2px solid var(--orange); }
    .score-banner.low { background: #fff0f0; border: 2px solid var(--red); }
    .score-text { font-size: 1.1rem; font-weight: 900; }
    .q-card { background: var(--card); border-radius: var(--radius); border: 2px solid var(--border); padding: 22px 24px; }
    .q-card.correct { border-color: var(--green); background: #f0fdf8; }
    .q-card.incorrect { border-color: var(--red); background: #fff5f5; }
    .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .q-num { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 900; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .q-text { font-size: 0.97rem; font-weight: 700; line-height: 1.5; }
    .q-input { width: 110px; padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--ink); outline: none; transition: border-color .15s; }
    .q-input:focus { border-color: var(--accent); }
    .radio-group { display: flex; gap: 10px; margin-top: 4px; }
    .radio-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 700; font-size: 0.9rem; padding: 8px 16px; border: 2px solid var(--border); border-radius: 8px; transition: all .15s; }
    .radio-label input { display: none; }
    .radio-label.selected { border-color: var(--accent); background: #eef1fd; color: var(--accent); }
    .select-input { padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--ink); outline: none; cursor: pointer; }

    .feedback.show { display: block; }
    .feedback.correct { color: #05a07a; }
    .feedback.incorrect { color: var(--red); }
    .submit-row { display: flex; justify-content: center; margin-top: 10px; }
    .btn-submit { padding: 14px 40px; border-radius: 12px; background: var(--accent); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.05rem; border: none; cursor: pointer; transition: background .15s; }
    .btn-submit:hover { background: var(--accent-dark); }
    footer { text-align: center; padding: 24px; font-size: 0.8rem; color: var(--muted); font-weight: 600; }

<script>
(function(){
  const STATS_KEY = 'ws_math_grade4_angles-lines_stats';
  let difficulty = 'easy';
  let questions = [];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rnd(0,arr.length-1)]; }

  function answersMatch(user, correct){
    if(user.trim().toLowerCase()===String(correct).toLowerCase()) return true;
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<0.001;
    return false;
  }

  function classifyAngle(deg){
    if(deg<90) return 'acute';
    if(deg===90) return 'right';
    if(deg<180) return 'obtuse';
    return 'straight';
  }

  /* ── generators ── */
  function makeClassifyQ(easy){
    const deg = easy
      ? pick([30,45,60,75,90,120,135,150])
      : pick([15,35,55,80,90,100,120,145,160,180]);
    const ans = classifyAngle(deg);
    const opts = easy ? ['acute','right','obtuse'] : ['acute','right','obtuse','straight'];
    return { text:`An angle measures ${deg}°. What type of angle is it?`, answer:ans, type:'select', options:opts };
  }

  function makeTFAngleQ(easy){
    const types = easy
      ? [{deg:45,type:'acute'},{deg:90,type:'right'},{deg:120,type:'obtuse'},{deg:60,type:'acute'},{deg:135,type:'obtuse'}]
      : [{deg:180,type:'straight'},{deg:90,type:'right'},{deg:35,type:'acute'},{deg:150,type:'obtuse'},{deg:180,type:'straight'}];
    const item = pick(types);
    const isTrue = rnd(0,1)===1;
    const wrongTypes = easy
      ? ['acute','right','obtuse'].filter(t=>t!==item.type)
      : ['acute','right','obtuse','straight'].filter(t=>t!==item.type);
    const shown = isTrue ? item.type : pick(wrongTypes);
    return { text:`True or False: An angle of ${item.deg}° is ${shown}.`, answer:(shown===item.type)?'True':'False', type:'radio' };
  }

  function makeMCAngleQ(easy){
    const deg = easy ? pick([30,60,90,120,150]) : pick([15,45,90,135,170,180]);
    const ans = classifyAngle(deg);
    const all = easy ? ['acute','right','obtuse'] : ['acute','right','obtuse','straight'];
    const opts = all.sort(()=>Math.random()-0.5);
    return { text:`Which best describes an angle of ${deg}°?`, answer:ans, type:'select', options:opts };
  }

  function makeSupplementaryQ(){
    const known = rnd(20,160);
    const missing = 180-known;
    return { text:`Two angles sit on a straight line. One angle is ${known}°. What is the other angle? (Angles on a straight line add up to 180°)`, answer:missing, type:'number' };
  }

  function makeLineTypeQ(){
    const scenarios = [
      {q:'Railway tracks run side by side and never cross.',ans:'parallel'},
      {q:'Two streets cross each other at a right angle.',ans:'perpendicular'},
      {q:'Two roads cross each other at an angle.',ans:'intersecting'},
      {q:'The two rails of a railway line.',ans:'parallel'},
      {q:'The corner of a room where two walls meet at 90°.',ans:'perpendicular'},
    ];
    const s = pick(scenarios);
    return { text:s.q+' What type of lines are described?', answer:s.ans, type:'select', options:['parallel','perpendicular','intersecting'] };
  }

  function makeRightAnglesQ(){
    const shapes = [
      {name:'square',rightAngles:4},{name:'rectangle',rightAngles:4},
      {name:'triangle',rightAngles:0},{name:'right triangle',rightAngles:1},
    ];
    const s = pick(shapes);
    return { text:`How many right angles does a ${s.name} have?`, answer:s.rightAngles, type:'number' };
  }

  function makeAngleRangeQ(){
    const items = [
      {q:'An acute angle is always less than ___°.',ans:90},
      {q:'An obtuse angle is always greater than ___°.',ans:90},
      {q:'A straight angle is always equal to ___°.',ans:180},
      {q:'A right angle is always equal to ___°.',ans:90},
    ];
    const item = pick(items);
    return { text:item.q, answer:item.ans, type:'number' };
  }

  function makeRealWorldAngleQ(){
    const items = [
      {q:'The corner of a book.',ans:'right','easy':true},
      {q:'The point of a sharp pencil tip.',ans:'acute','easy':true},
      {q:'A wide open door lying flat.',ans:'straight','easy':false},
      {q:'The angle in a roof that is wider than a corner.',ans:'obtuse','easy':true},
      {q:'The letter "T" where the top meets the stem.',ans:'right','easy':true},
    ];
    const filtered = difficulty==='easy' ? items.filter(i=>i.easy) : items;
    const item = pick(filtered);
    const opts = difficulty==='easy' ? ['acute','right','obtuse'] : ['acute','right','obtuse','straight'];
    return { text:`What type of angle is formed by: "${item.q}"`, answer:item.ans, type:'select', options:opts };
  }

  function makeDegreeEstimateQ(){
    const angles = [
      {desc:'An angle that looks like a thin slice of pizza',deg:30,type:'acute'},
      {desc:'An angle that looks like a quarter turn',deg:90,type:'right'},
      {desc:'An angle that is opened more than a book corner but less than a flat line',deg:120,type:'obtuse'},
    ];
    const a = pick(angles);
    const opts = ['acute','right','obtuse','straight'];
    return { text:`${a.desc} (approximately ${a.deg}°). What type of angle is it?`, answer:a.type, type:'select', options:opts };
  }

  function makeParallelTFQ(){
    const items = [
      {q:'Railway tracks are parallel.',ans:true},
      {q:'Two roads that cross are parallel.',ans:false},
      {q:'Parallel lines meet at exactly one point.',ans:false},
      {q:'The edges of a ruler are parallel.',ans:true},
    ];
    const item = pick(items);
    return { text:`True or False: ${item.q}`, answer:item.ans?'True':'False', type:'radio' };
  }

  const easyGenerators = [
    makeClassifyQ, makeTFAngleQ, makeMCAngleQ, makeLineTypeQ,
    makeRightAnglesQ, makeAngleRangeQ, makeRealWorldAngleQ, makeDegreeEstimateQ, makeParallelTFQ
  ];
  const hardGenerators = [
    makeClassifyQ, makeTFAngleQ, makeMCAngleQ, makeSupplementaryQ, makeLineTypeQ,
    makeRightAnglesQ, makeAngleRangeQ, makeRealWorldAngleQ, makeParallelTFQ, makeDegreeEstimateQ
  ];

  function generate(){
    const pool = difficulty==='easy' ? easyGenerators : hardGenerators;
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    questions = shuffled.slice(0,10).map(fn=>{
      try{ return fn(difficulty==='easy'); }catch(e){ return makeClassifyQ(difficulty==='easy'); }
    });
  }

  function setDiff(d){
    difficulty = d;
    document.getElementById('btn-easy').classList.toggle('active', d==='easy');
    document.getElementById('btn-hard').classList.toggle('active', d==='hard');
    newWorksheet();
  }

  function render(){
    const container = document.getElementById('questions');
    container.innerHTML = '';
    questions.forEach((q,i)=>{
      const card = document.createElement('div');
      card.className = 'q-card'; card.id = 'q-'+i;
      let inputHtml = '';
      if(q.type==='number'){
        inputHtml = `<input class="q-input" type="number" id="ans-${i}" placeholder="?" autocomplete="off" />`;
      } else if(q.type==='radio'){
        inputHtml = `<div class="radio-group">
          <label class="radio-label" id="rl-${i}-T"><input type="radio" name="q${i}" value="True" onchange="selectRadio(${i},'T')">True</label>
          <label class="radio-label" id="rl-${i}-F"><input type="radio" name="q${i}" value="False" onchange="selectRadio(${i},'F')">False</label>
        </div>`;
      } else {
        const opts = q.options.map(o=>`<option value="${o}">${o}</option>`).join('');
        inputHtml = `<select class="select-input" id="ans-${i}"><option value="">-- choose --</option>${opts}</select>`;
      }
      card.innerHTML = `<div class="q-header"><div class="q-num">${i+1}</div><div class="q-text">${q.text}</div></div>${inputHtml}<div class="feedback" id="fb-${i}"></div>`;
      container.appendChild(card);
    });
    document.getElementById('score-banner').classList.remove('show');
  }

  function selectRadio(i,val){
    document.getElementById('rl-'+i+'-T').classList.toggle('selected',val==='T');
    document.getElementById('rl-'+i+'-F').classList.toggle('selected',val==='F');
  }

  function getUserAnswer(i,q){
    if(q.type==='radio'){ const el=document.querySelector(`input[name="q${i}"]:checked`); return el?el.value:''; }
    return (document.getElementById('ans-'+i)||{value:''}).value;
  }

  function submitAll(){
    let correct=0;
    questions.forEach((q,i)=>{
      const user=getUserAnswer(i,q), card=document.getElementById('q-'+i), fb=document.getElementById('fb-'+i);
      if(!user){ fb.textContent='⚠ Please answer this question.'; fb.className='feedback show incorrect'; return; }
      if(answersMatch(user,q.answer)){ correct++; card.className='q-card correct'; fb.textContent='✓ Correct!'; fb.className='feedback show correct'; }
      else { card.className='q-card incorrect'; fb.textContent=`✗ Not quite. The answer is ${q.answer}.`; fb.className='feedback show incorrect'; }
    });
    const banner=document.getElementById('score-banner'), scoreText=document.getElementById('score-text');
    banner.classList.add('show');
    if(correct>=8){ banner.className='score-banner show great'; scoreText.textContent=`🎉 ${correct}/10 — Excellent work!`; }
    else if(correct>=5){ banner.className='score-banner show ok'; scoreText.textContent=`👍 ${correct}/10 — Good effort! Keep practising.`; }
    else { banner.className='score-banner show low'; scoreText.textContent=`💪 ${correct}/10 — Review the help page and try again!`; }
    saveStats(correct); banner.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function showAnswers(){ questions.forEach((q,i)=>{ const fb=document.getElementById('fb-'+i); fb.textContent=`Answer: ${q.answer}`; fb.className='feedback show incorrect'; }); }
  function shareResults(){ if(navigator.share){ navigator.share({title:'LearnBright',text:'I practised Angles & Lines on LearnBright!',url:location.href}); } else { navigator.clipboard.writeText(location.href).then(()=>alert('Link copied!')); } }
  function saveStats(score){ try{ const s=JSON.parse(localStorage.getItem(STATS_KEY)||'{"attempts":0,"totalScore":0}'); s.attempts++; s.totalScore+=score; localStorage.setItem(STATS_KEY,JSON.stringify(s)); }catch(e){} }
  function newWorksheet(){ generate(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  window.setDiff=setDiff; window.newWorksheet=newWorksheet; window.showAnswers=showAnswers;
  window.shareResults=shareResults; window.submitAll=submitAll; window.selectRadio=selectRadio;
  generate(); render();
})();
</script>
