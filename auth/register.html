<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Create a LearnPad account." />
  <title>Create Account | LearnPad</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4361EE;
      --ink: #1a1f36;
      --muted: #5a6076;
      --bg: #f4f6fb;
      --card: #ffffff;
      --border: #e2e6f0;
      --radius: 12px;
      --error: #dc2626;
      --success: #059669;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(26,31,54,0.06);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      margin-bottom: 22px;
    }
    .auth-logo img { height: 34px; width: auto; display: block; }
    .auth-logo span { font-weight: 900; font-size: 1.2rem; color: var(--accent); }
    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field { margin-bottom: 16px; }
    .hint {
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 600;
      margin-top: 5px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus { border-color: var(--accent); }
    button.primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.94rem;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 6px;
    }
    button.primary:hover { opacity: 0.9; }
    button.primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    button.google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-family: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background .15s;
    }
    button.google:hover { background: #f8f9fc; }
    button.google svg { width: 18px; height: 18px; }
    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }
    .footer-link a { color: var(--accent); font-weight: 800; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    #message {
      display: none;
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 700;
    }
    #message.error { display: block; background: #fef2f2; color: var(--error); }
    #message.success { display: block; background: #f0fdf4; color: var(--success); }
  </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PD85WRBD"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

  <div class="auth-card">
    <a class="auth-logo" href="../index.html">
      <img src="../logo.png" alt="LearnPad" />
    </a>
    <h1>Create your account</h1>
    <p class="subtitle">Sign up to get started</p>

    <div id="message"></div>

    <form id="registerForm">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        <p class="hint">At least 6 characters.</p>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="primary" id="registerBtn">Create Account</button>
    </form>

    <div class="divider">OR</div>

    <button type="button" class="google" id="googleBtn">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16 4 9.1 8.5 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.3-5.1l-6.6-5.6C29.6 34.9 27 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9 39.5 15.9 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l6.6 5.6C41.9 35.6 44 30.1 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Sign up with Google
    </button>

    <p class="footer-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    var messageEl = document.getElementById('message');
    var registerBtn = document.getElementById('registerBtn');
    var submitting = false;

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = type;
    }

    function syncUsername(name) {
      if (!name) return;
      try {
        localStorage.setItem('lp_username', name);
        localStorage.setItem('ws_username', name);
      } catch (e) {}
    }

    auth.onAuthStateChanged(function (user) {
      if (user && !submitting) {
        window.location.href = '../index.html';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('name').value.trim();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      submitting = true;
      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating account…';
      auth.createUserWithEmailAndPassword(email, password)
        .then(function (credential) {
          return credential.user.updateProfile({ displayName: name });
        })
        .then(function () {
          syncUsername(name);
          window.location.href = '../index.html';
        })
        .catch(function (error) {
          submitting = false;
          showMessage(error.message, 'error');
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        });
    });

    document.getElementById('googleBtn').addEventListener('click', function () {
      submitting = true;
      var provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(function (credential) {
          syncUsername(credential.user.displayName);
          window.location.href = '../index.html';
        })
        .catch(function (error) {
          submitting = false;
          showMessage(error.message, 'error');
        });
    });
  </script>
</body>
</html>
